# OpenMetadata Ingestion Workflow — ClickHouse Connector
# Usage: Import this workflow via OM UI → Settings → Services → Add Service → Database → ClickHouse
# Then trigger via: POST http://localhost:8585/api/v1/pipeline吸气ines/upload
# Schedule: hourly (0 * * * *)
# OM credentials: admin@open-metadata.org / admin

source:
  type: ClickHouse
  serviceName: Vietnam Air Quality ClickHouse
  sourceConfig:
    config:
      # Deduplication & freshness
      markDeletedTables: false
      # Database filter — only scan air_quality
      includeDatabases:
        - air_quality
      excludeDataNames:
        - system
        - _tmp
        - _bytes
      databaseFilterPattern: []
      # Table filter — include all layers, exclude system & temp tables
      tableFilterPattern: []
      # Sampling & profiling (lightweight for now)
      generateSampleData: false
      # Threading
      threads: 4
sink:
  type: metadata-rest
  config: {}
workflowConfig:
  openMetadataServerConfig:
    hostPort: http://openmetadata:8585/api
    authProvider: openmetadata
    # Connection retry config
    retryConfig:
      maxRetries: 3
      retryDelaySeconds: 5
  logger:
    level: INFO