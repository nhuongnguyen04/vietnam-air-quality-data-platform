apiVersion: 1

groups:
  - name: system-prometheus-alerts
    folder: System Alerts
    interval: 30s
    rules:
      - uid: sys-clickhouse-down-prom
        title: "ClickHouse Unreachable"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: up{job="clickhouse"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 300
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [1], type: lt }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "ClickHouse Unreachable"
          value: "{{ $values.B.Value | printf \"%.0f\" }}"
          description: "Check container logs -> docker logs clickhouse"
        labels:
          severity: critical
          channel: system

      - uid: sys-container-restart-prom
        title: "Container Restart Loop"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: changes(docker_container_start_time_seconds{service!=""}[5m])
              instant: true
              intervalMs: 1000
              legendFormat: "{{service}}"
              maxDataPoints: 300
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [3], type: gt }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "Container Restart Loop"
          value: "{{ $values.B.Value | printf \"%.0f\" }}"
          description: "Check logs -> docker logs {{ $labels.service }}"
        labels:
          severity: critical
          channel: system

      - uid: sys-container-oom-prom
        title: "Container OOM Killed"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: docker_container_oom_killed{service!=""}
              instant: true
              intervalMs: 1000
              legendFormat: "{{service}}"
              maxDataPoints: 300
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [0], type: gt }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "Container OOM Killed"
          value: "{{ $values.B.Value | printf \"%.0f\" }}"
          description: "Increase memory limit -> update docker-compose.yml mem_limit"
        labels:
          severity: critical
          channel: system

      - uid: sys-disk-warning-prom
        title: "Disk Space Warning"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.*|overlay|squashfs|nsfs|proc|sysfs|devtmpfs|devpts|securityfs|debugfs|tracefs|configfs|pstore|bpf|autofs|mqueue|hugetlbfs|rpc_pipefs", mountpoint!~"^/(run|snap)(/.*)?$|^/mnt/wsl/docker-desktop.*|^/init$"} / 1000000000) and on(instance, device, mountpoint, fstype) (node_filesystem_readonly == 0)
              instant: true
              intervalMs: 1000
              legendFormat: "{{mountpoint}}"
              maxDataPoints: 300
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [20], type: lt }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "Disk Space Warning on {{ $labels.mountpoint }}"
          value: "{{ $values.B.Value | printf \"%.2f GB free\" }}"
          description: "{{ $labels.mountpoint }} has less than 20GB free. Run: du -sh /path/* to find large dirs."
        labels:
          severity: warning
          channel: system

      - uid: sys-disk-critical-prom
        title: "Disk Space Critical"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.*|overlay|squashfs|nsfs|proc|sysfs|devtmpfs|devpts|securityfs|debugfs|tracefs|configfs|pstore|bpf|autofs|mqueue|hugetlbfs|rpc_pipefs", mountpoint!~"^/(run|snap)(/.*)?$|^/mnt/wsl/docker-desktop.*|^/init$"} / 1000000000) and on(instance, device, mountpoint, fstype) (node_filesystem_readonly == 0)
              instant: true
              intervalMs: 1000
              legendFormat: "{{mountpoint}}"
              maxDataPoints: 300
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [5], type: lt }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "CRITICAL: Disk Space on {{ $labels.mountpoint }}"
          value: "{{ $values.B.Value | printf \"%.2f GB free\" }}"
          description: "{{ $labels.mountpoint }} has less than 5GB free. Move data or increase disk IMMEDIATELY."
        labels:
          severity: critical
          channel: system

      - uid: sys-memory-high-prom
        title: "Host Memory >90% Used"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
              instant: true
              intervalMs: 1000
              maxDataPoints: 300
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [90], type: gt }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "Host Memory >90% Used"
          value: "{{ $values.B.Value | printf \"%.1f%%\" }}"
          description: "Check docker stats for high-memory containers."
        labels:
          severity: warning
          channel: system

      - uid: sys-dag-failures-prom
        title: "Airflow DAG Failure in Last 30m"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 1800, to: 0 }
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: airflow_dag_run_count{state="failed"}
              instant: true
              intervalMs: 1000
              legendFormat: "{{dag_id}}"
              maxDataPoints: 300
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [0], type: gt }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "Airflow DAG Failure: {{ $labels.dag_id }}"
          value: "{{ $values.B.Value | printf \"%.0f\" }}"
          description: "DAG {{ $labels.dag_id }} has failed run(s) in the last 30m. Check Airflow UI at http://localhost:8090."
        labels:
          severity: critical
          channel: system

      - uid: sys-no-recent-success-prom
        title: "No Successful DAG Run in >2 Hours"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: airflow_dag_run_count_seconds_ago{state="success"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 300
              range: false
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [7200], type: gt }
        noDataState: OK
        execErrState: Alerting
        for: 0m
        annotations:
          summary: "No Successful DAG Run in >2 Hours"
          value: "{{ $values.B.Value | printf \"%.0f seconds\" }}"
          description: "Check if Airflow scheduler is running: docker logs airflow-scheduler1"
        labels:
          severity: warning
          channel: system
