# Grafana Alert Rules — Vietnamese Overhaul
apiVersion: 1

groups:
  - name: air-quality-alerts-v2
    folder: Cảnh báo Chất lượng Không khí
    interval: 1m
    rules:

      # =============================================================
      # Rule 1 & 2 are now managed by Prometheus to prioritize infra monitoring reliability.
      # They are commented out here to avoid duplication.
      # =============================================================
      # - uid: dag-failure-critical
      # ... (Disabled)
      # - uid: clickhouse-down-critical
      # ... (Disabled)
      # =============================================================

      # =============================================================
      # Rule 3: AQI Critical (>200)
      # =============================================================
      - uid: aqi-critical-200
        title: "[CHẤT LƯỢNG][NGHIÊM TRỌNG] Chỉ số AQI nguy hại (>200)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickhouse-airquality
            model:
              rawSql: |
                SELECT province, district, MAX(current_aqi_us) AS aqi 
                FROM air_quality.dm_aqi_current_status 
                WHERE latest_hour >= NOW() - INTERVAL 2 HOUR
                GROUP BY province, district
          - refId: B
            datasourceUid: "-100"
            model: { type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [200], type: gt }
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "🔴 [CẢNH BÁO NGUY HẠI] AQI > 200"
          value: "{{ $values.B.Value }}"
        labels:
          severity: critical
          team: air-quality
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 4: Data Freshness (>3h)
      # =============================================================
      - uid: data-freshness-warning
        title: "[CHẤT LƯỢNG][CẢNH BÁO] Dữ liệu bị chậm cập nhật (>3 giờ)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickhouse-airquality
            model:
              rawSql: |
                SELECT source, MAX(lag_seconds) AS max_lag
                FROM air_quality.ingestion_control
                GROUP BY source
          - refId: B
            datasourceUid: "-100"
            model: { type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [10800], type: gt }
        noDataState: OK
        execErrState: OK
        for: 10m
        annotations:
          summary: "🟡 [CẢNH BÁO] Hệ thống chậm cập nhật dữ liệu"
          value: "{{ $values.B.Value }}"
        labels:
          severity: warning
          team: data-ops
        contactPoints: [telegram-critical]

      # =============================================================
      # Rules 5-8: Adopted Phantom Rules (Repairing Ghost States)
      # =============================================================
      - uid: station-stale-warning
        title: "[Advisory] Trạm dữ liệu bị gián đoạn (Adopted)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickhouse-airquality
            model:
              rawSql: |
                SELECT province, district, source, toString(last_seen) AS last_seen, MAX(lag_hours) AS lag_hours 
                FROM air_quality.dm_platform_data_health 
                WHERE health_status IN ('Stale', 'Offline')
                GROUP BY province, district, source, last_seen
          - refId: B
            datasourceUid: "-100"
            model: { type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [0], type: gt }
        noDataState: OK
        execErrState: Error
        for: 15m
        annotations:
          summary: "⚠️ [GIÁN ĐOẠN DỮ LIỆU] Trạm mất tín hiệu"
          value: "{{ $values.B.Value }}"
          last_seen: "{{ $labels.last_seen }}"
        labels:
          severity: warning

      - uid: aqi-warning-150
        title: "[Warning] Chỉ số AQI vượt ngưỡng 150 (Adopted)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickhouse-airquality
            model:
              rawSql: |
                SELECT province, district, MAX(current_aqi_us) AS aqi_us 
                FROM air_quality.dm_aqi_current_status 
                WHERE latest_hour >= NOW() - INTERVAL 3 HOUR
                GROUP BY province, district
          - refId: B
            datasourceUid: "-100"
            model: { type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [150], type: gt }
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: "🟠 [CẢNH BÁO] AQI vượt mức 150"
          value: "{{ $values.B.Value }}"
        labels:
          severity: warning

      - uid: pm25-warning-75
        title: "[Warning] Nồng độ PM2.5 vượt ngưỡng 75 µg/m³ (Adopted)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickhouse-airquality
            model:
              rawSql: |
                SELECT province, district, MAX(pm25) AS pm25_val 
                FROM air_quality.dm_aqi_current_status 
                WHERE latest_hour >= NOW() - INTERVAL 3 HOUR
                GROUP BY province, district
          - refId: B
            datasourceUid: "-100"
            model: { type: reduce, reducer: last, expression: A }
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [75], type: gt }
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: "🟠 [CẢNH BÁO] Bụi mịn PM2.5 cao (>75 µg/m³)"
          value: "{{ $values.B.Value }}"
        labels:
          severity: warning

      - uid: multi-source-divergence
        title: "[Diagnostic] Sai lệch dữ liệu giữa các nguồn (Adopted)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickhouse-airquality
            model:
              rawSql: |
                -- Legacy rule: Returning empty to stop errors until multi-source logic is restored
                SELECT province FROM air_quality.dm_aqi_current_status WHERE 1=0
          - refId: B
            datasourceUid: "-100"
            model:
              type: classic_conditions
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
        noDataState: OK
        execErrState: OK
        for: 1h
        annotations:
          summary: "Dữ liệu air quality giữa các nguồn tại {{ $labels.province }} có sự sai lệch lớn."
        labels:
          severity: diagnostic
