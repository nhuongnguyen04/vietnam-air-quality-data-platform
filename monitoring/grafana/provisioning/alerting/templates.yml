# Grafana Message Templates — Phase 08
# Two separate templates for two bots:
#
# telegram.aq.message  → Vietnamese, ASCII table, HTML parse_mode
#   Used by: telegram-air-quality contact point
#   Style: grouped province table in <pre> tags, khuyến cáo footer
#
# telegram.sys.message → English, structured block, HTML parse_mode
#   Used by: telegram-system contact point
#   Style: instance/service/duration block, action hint
#
# Template variable reference:
#   .Alerts            — slice of all firing alerts in group
#   .Status            — "firing" or "resolved"
#   .Labels.KEY        — alert label (province, district, instance, etc.)
#   .Annotations.value — value annotation from rule (set as $values.B)
#   .StartsAt          — alert start time
#   {{- ... -}}        — trim surrounding whitespace (important for Telegram)

apiVersion: 1
templates:
  # ──────────────────────────────────────────────────────────────────
  # Template 1: Air Quality Bot (Vietnamese, group chat)
  # ──────────────────────────────────────────────────────────────────
  - orgId: 1
    name: telegram_aq_format
    template: |
      {{ define "telegram.aq.message" -}}
      {{- if eq .Status "resolved" -}}
      ✅ <b>[ĐÃ KHẮC PHỤC]</b> Chất lượng không khí đã cải thiện

      Khu vực đã trở về bình thường:
      {{- range .Alerts }}
      📍 {{ if .Labels.province }}{{ .Labels.province }}{{ else }}Toàn quốc{{ end }}
      {{- end }}
      {{- else -}}
      {{- $first := index .Alerts 0 -}}
      {{- if eq $first.Labels.severity "critical" }}🔴{{ else }}🟠{{ end }} <b>[CẢNH BÁO CHẤT LƯỢNG KHÔNG KHÍ]</b>
      ──────────────────────────────
      <pre>
      {{- range .Alerts -}}
      📍 {{ if .Labels.province }}{{ printf "%-20s" .Labels.province }}{{ else }}{{ printf "%-20s" "Toàn quốc" }}{{ end }}{{ if .Annotations.value }}{{ .Annotations.value }}{{ else }}N/A{{ end }}
      {{ end -}}
      </pre>
      ──────────────────────────────
      {{- if eq $first.Labels.severity "critical" }}
      ⚠️ <b>Khuyến cáo:</b> Hạn chế tối đa ra ngoài. Ở trong nhà, đóng cửa sổ.
      {{- else }}
      ⚠️ <b>Khuyến cáo:</b> Người nhạy cảm nên hạn chế hoạt động ngoài trời kéo dài.
      {{- end }}
      {{- end }}
      {{- end }}

  # ──────────────────────────────────────────────────────────────────
  # Template 2: System Monitoring Bot (English, private admin chat)
  # ──────────────────────────────────────────────────────────────────
  - orgId: 1
    name: telegram_sys_format
    template: |
      {{ define "telegram.sys.message" -}}
      {{- if eq .Status "resolved" -}}
      {{- range .Alerts -}}
      RESOLVED: {{ .Labels.alertname }}
      {{- if .Labels.instance }}
      Instance: {{ .Labels.instance }}
      {{- end }}
      {{- if .Labels.name }}
      Target: {{ .Labels.name }}
      {{- end }}
      Status: back to normal
      {{ end -}}
      {{- else -}}
      {{- range .Alerts -}}
      {{- if eq .Labels.severity "critical" }}CRITICAL{{ else }}WARNING{{ end }}: {{ .Labels.alertname }}
      {{- if .Labels.instance }}
      Instance: {{ .Labels.instance }}
      {{- end }}
      {{- if .Labels.name }}
      Target: {{ .Labels.name }}
      {{- end }}
      {{- if .Labels.mountpoint }}
      Mountpoint: {{ .Labels.mountpoint }}
      {{- end }}
      {{- if .Labels.source }}
      Source: {{ .Labels.source }}
      {{- end }}
      {{- if .Annotations.value }}
      Value: {{ .Annotations.value }}
      {{- end }}
      {{- if .Annotations.description }}
      Action: {{ .Annotations.description }}
      {{- end }}
      {{ end -}}
      {{- end }}
      {{- end }}
