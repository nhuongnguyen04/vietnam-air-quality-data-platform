# Grafana Alerting Notification Policies — Phase 08
# Route alerts to correct bot using the `channel` label:
#   channel: air-quality → telegram-air-quality (AQ group, repeat 1h)
#   channel: system      → telegram-system (admin private, repeat 30m)
#
# group_wait: 2m  — collect all instances before first send
# group_interval: 5m — wait before sending updates to existing group
# All Grafana-native AQ rules must have: labels.channel: air-quality
# All Prometheus system rules must have: labels.channel: system

apiVersion: 1

policies:
  # Root policy — defaults to air quality bot
  - orgId: 1
    receiver: telegram-air-quality
    group_by: ['alertname']
    group_wait: 2m
    group_interval: 5m
    repeat_interval: 1h
    routes:
      # Route for Air Quality Bot (specific repeat_interval 1h)
      - receiver: telegram-air-quality
        matchers:
          - channel = air-quality
        continue: false
      # Route for System Bot (specific repeat_interval 30m)
      - receiver: telegram-system
        matchers:
          - channel = system
        repeat_interval: 30m
        continue: false
