# Grafana Alerting Contact Points — Phase 3.1
# IMPORTANT: chatid MUST be a string, not a number.
# Grafana's env-var substitution resolves ${VAR} before YAML parsing.
# A numeric chat ID like 5602934306 becomes a YAML integer, causing:
#   "json: cannot unmarshal number into Go struct field Config.chatid of type string"
# Solution: Use explicit string quoting to force YAML string type.

apiVersion: 1

contactPoints:
  - name: telegram-critical
    receivers:
      - uid: telegram-critical
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: '5602934306'
          message: '{{ template "telegram.message" . }}'
          parse_mode: 'HTML'
