# Grafana Dashboard Provider — File-based provisioning
# Dashboards located at: /etc/grafana/dashboards (mapped from grafana/provisioning/dashboard-files/)
apiVersion: 1
providers:
  - name: 'System Monitoring Dashboards'
    orgId: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboard-files
      foldersFromFilesStructure: true
