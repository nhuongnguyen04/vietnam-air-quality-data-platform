# Prometheus Alert Rules — Phase 08: System Rules
# 8 rules, all labelled channel: system → routes to telegram-system bot
#
# Labels added to ALL rules:
#   channel: system → notification policy routes to telegram-system
#   severity: critical|warning
#
# Note: sys-data-freshness (ingestion lag >3h) is a GRAFANA-NATIVE rule
# in alert-rules.yml (queries air_quality.ingestion_control via ClickHouse).
# It is NOT listed here to avoid duplication.

groups:
  - name: system-infrastructure
    interval: 30s
    rules:

      # ── Service uptime ──────────────────────────────────────────────
      - alert: sys-clickhouse-down
        expr: up{job="clickhouse"} == 0
        for: 2m
        labels:
          severity: critical
          channel: system
        annotations:
          summary: "ClickHouse Unreachable"
          description: "Check container logs → docker logs clickhouse"

      # ── Container health (Docker stats exporter) ───────────────────
      - alert: sys-container-restart
        expr: changes(docker_container_start_time_seconds{service!=""}[5m]) > 3
        for: 1m
        labels:
          severity: critical
          channel: system
        annotations:
          summary: "Container Restart Loop: {{ $labels.service }}"
          description: "Check logs → docker logs {{ $labels.service }}"

      - alert: sys-container-oom
        expr: docker_container_oom_killed{service!=""} > 0
        for: 0m
        labels:
          severity: critical
          channel: system
        annotations:
          summary: "Container OOM Killed: {{ $labels.service }}"
          description: "Increase memory limit → update docker-compose.yml mem_limit"

      # ── Resource exhaustion ─────────────────────────────────────────
      - alert: sys-disk-warning
        expr: node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.clnt"} < 20000000000
        for: 5m
        labels:
          severity: warning
          channel: system
        annotations:
          summary: "Disk Space Warning on {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} has < 20GB free. Run: du -sh /path/* to find large dirs."

      - alert: sys-disk-critical
        expr: node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.clnt"} < 5000000000
        for: 1m
        labels:
          severity: critical
          channel: system
        annotations:
          summary: "CRITICAL: Disk Space on {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} has < 5GB free. Move data or increase disk IMMEDIATELY."

      - alert: sys-memory-high
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
          channel: system
        annotations:
          summary: "Host Memory >90% Used"
          description: "Check docker stats for high-memory containers."

      # ── Airflow pipeline health ──────────────────────────────────
      - alert: sys-dag-failures
        expr: sum(increase(airflow_dag_run_count{state="failed"}[30m])) > 0
        for: 5m
        labels:
          severity: critical
          channel: system
        annotations:
          summary: "Airflow DAG Failures in Last 30m"
          description: "Check Airflow UI at http://localhost:8090 for failed DAGs."

      - alert: sys-no-recent-success
        expr: (time() - airflow_dag_run_count_seconds_ago{state="success"}) > 7200
        for: 10m
        labels:
          severity: warning
          channel: system
        annotations:
          summary: "No Successful DAG Run in >2 Hours"
          description: "Check if Airflow scheduler is running: docker logs airflow-scheduler1"
