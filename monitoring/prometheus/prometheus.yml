global:
  scrape_interval: 30s
  evaluation_interval: 30s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'grafana:3000'
      path_prefix: '/api/alertmanager/grafana'
      basic_auth:
        username: 'admin'
        password: 'admin123456' # Updated Grafana password

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  # ── Prometheus self-monitoring ────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Node Exporter — host CPU, RAM, disk, load, network ────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ── cAdvisor — container metrics ─────────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # ── PostgreSQL Exporter ───────────────────────────────────────────
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgres:5432/airflow'

  # ── ClickHouse built-in /metrics (port 9363) ───────────────────────
  # ClickHouse IP resolved separately — this target is 'down' due to WSL2 DNS limitations
  # Known limitation: clickhouse target requires manual network fix or alternative exporter
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'clickhouse:8123'
