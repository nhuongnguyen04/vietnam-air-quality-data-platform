# Vietnam Air Quality Data Platform — Lightweight Experience Edition
# ===================================================================
# Phiên bản này chỉ chứa ClickHouse + Streamlit Dashboard + Grafana.
# Phù hợp cho máy yếu, trải nghiệm nhanh, bảo mật tuyệt đối (không cần bất kỳ API Token nào).
#
# Cách chạy: docker compose -f docker-compose.experience.yml up -d

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12
    container_name: clickhouse-experience
    restart: unless-stopped
    ports:
      - 8123:8123
      - 9000:9000
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    mem_limit: 4g  # Giới hạn RAM an toàn cho máy khách (gốc là 9g)
    cpus: '2'
    volumes:
      - ./clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-seeds:/var/lib/clickhouse/user_files:ro  # Thư mục hạt giống dữ liệu Parquet
      - ./scripts/init-clickhouse.sql:/docker-entrypoint-initdb.d/01-init.sql  # Khởi tạo schema trước
      - ./scripts/import_data.sh:/docker-entrypoint-initdb.d/02-import.sh      # Tự động nạp dữ liệu Parquet sau
      - ./monitoring/clickhouse/config.d/logger.xml:/etc/clickhouse-server/config.d/logger.xml:ro
      - ./monitoring/clickhouse/config.d/system_logs_retention.xml:/etc/clickhouse-server/config.d/system_logs_retention.xml:ro
      - ./monitoring/clickhouse/config.d/storage_safety.xml:/etc/clickhouse-server/config.d/storage_safety.xml:ro
      - ./monitoring/clickhouse/config.d/memory_management.xml:/etc/clickhouse-server/config.d/memory_management.xml:ro
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-air_quality}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-experience_only}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
      - air-quality-network

  dashboard:
    build:
      context: .
      dockerfile: python_jobs/dashboard/Dockerfile
    image: streamlit-dashboard:latest
    container_name: streamlit-dashboard-experience
    restart: unless-stopped
    ports:
      - 8501:8501
    volumes:
      - ./python_jobs/dashboard:/app
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-experience_only}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-air_quality}
      - DASHBOARD_MODE=experience
      - STREAMLIT_SERVER_PORT=8501
    depends_on:
      clickhouse:
        condition: service_healthy
    mem_limit: 384m
    cpus: '0.25'
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:8501/_stcore/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
      - air-quality-network

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana-experience
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-experience_only}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-air_quality}
    depends_on:
      clickhouse:
        condition: service_healthy
    mem_limit: 384m
    cpus: '0.25'
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:3000/api/health
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
      - air-quality-network

networks:
  air-quality-network:
    name: air-quality-network
    driver: bridge

volumes:
  grafana-data:
