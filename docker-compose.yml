services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12
    container_name: clickhouse
    restart: unless-stopped
    ports:
    - 8123:8123
    - 9000:9000
    - 9440:9440
    - 9363:9363
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    mem_limit: 6g
    cpus: '2'
    volumes:
    - ./clickhouse-data:/var/lib/clickhouse
    - ./scripts/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
    - ./monitoring/clickhouse/config.d/prometheus_exporter.xml:/etc/clickhouse-server/config.d/prometheus_exporter.xml:ro
    - ./monitoring/clickhouse/config.d/logger.xml:/etc/clickhouse-server/config.d/logger.xml:ro
    - ./monitoring/clickhouse/config.d/system_logs_retention.xml:/etc/clickhouse-server/config.d/system_logs_retention.xml:ro
    - ./monitoring/clickhouse/config.d/storage_safety.xml:/etc/clickhouse-server/config.d/storage_safety.xml:ro
    - ./monitoring/clickhouse/config.d/memory_management.xml:/etc/clickhouse-server/config.d/memory_management.xml:ro
    environment:
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-webserver1
    restart: unless-stopped
    command: api-server
    group_add:
    - '1001'
    ports:
    - 8090:8080
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config:/opt/airflow/config:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./python_jobs:/opt/python/jobs:ro
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform
    - dbt-target:/opt/dbt/dbt_tranform/target
    - dbt-logs:/opt/dbt/dbt_tranform/logs
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=
    - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS=admin:admin,${AIRFLOW_ADMIN_USERNAME}:${AIRFLOW_ADMIN_PASSWORD}
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
    - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
    - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
    - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=8123
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - OM_ADMIN_USER=${OM_ADMIN_USER}
    - OM_ADMIN_PASSWORD=${OM_ADMIN_PASSWORD}
    - PYTHON_JOBS_DIR=/opt/python/jobs/
    # D-AQI-02 (Phase 6): AQICN removed — AQICN_API_TOKEN no longer used
    - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    - TOMTOM_API_KEY=${TOMTOM_API_KEY}
    - GDRIVE_ROOT_FOLDER_ID=${GDRIVE_ROOT_FOLDER_ID}
    - GDRIVE_CLIENT_ID=${GDRIVE_CLIENT_ID}
    - GDRIVE_CLIENT_SECRET=${GDRIVE_CLIENT_SECRET}
    - GDRIVE_REFRESH_TOKEN=${GDRIVE_REFRESH_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      airflow-scheduler:
        condition: service_started
      airflow-dag-processor:
        condition: service_started
      airflow-triggerer:
        condition: service_started
    mem_limit: 2g
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8080/api/v2/monitor/health
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-scheduler1
    restart: unless-stopped
    command: scheduler
    group_add:
    - '1001'
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config:/opt/airflow/config:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./python_jobs:/opt/python/jobs:ro
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform
    - dbt-target:/opt/dbt/dbt_tranform/target
    - dbt-logs:/opt/dbt/dbt_tranform/logs
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=
    - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS=admin:admin,${AIRFLOW_ADMIN_USERNAME}:${AIRFLOW_ADMIN_PASSWORD}
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
    - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
    - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
    - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=8123
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - OM_ADMIN_USER=${OM_ADMIN_USER}
    - OM_ADMIN_PASSWORD=${OM_ADMIN_PASSWORD}
    - PYTHON_JOBS_DIR=/opt/python/jobs
    # D-AQI-02 (Phase 6): AQICN removed — AQICN_API_TOKEN no longer used
    - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    - TOMTOM_API_KEY=${TOMTOM_API_KEY}
    - GDRIVE_ROOT_FOLDER_ID=${GDRIVE_ROOT_FOLDER_ID}
    - GDRIVE_CLIENT_ID=${GDRIVE_CLIENT_ID}
    - GDRIVE_CLIENT_SECRET=${GDRIVE_CLIENT_SECRET}
    - GDRIVE_REFRESH_TOKEN=${GDRIVE_REFRESH_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 4g
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8080/api/v2/monitor/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-dag-processor:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-dag-processor1
    restart: unless-stopped
    command: dag-processor
    group_add:
    - '1001'
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config:/opt/airflow/config:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./python_jobs:/opt/python/jobs:ro
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform
    - dbt-target:/opt/dbt/dbt_tranform/target
    - dbt-logs:/opt/dbt/dbt_tranform/logs
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=
    - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS=admin:admin,${AIRFLOW_ADMIN_USERNAME}:${AIRFLOW_ADMIN_PASSWORD}
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
    - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
    - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
    - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=8123
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - OM_ADMIN_USER=${OM_ADMIN_USER}
    - OM_ADMIN_PASSWORD=${OM_ADMIN_PASSWORD}
    - PYTHON_JOBS_DIR=/opt/python/jobs
    # D-AQI-02 (Phase 6): AQICN removed — AQICN_API_TOKEN no longer used
    - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    - TOMTOM_API_KEY=${TOMTOM_API_KEY}
    - GDRIVE_ROOT_FOLDER_ID=${GDRIVE_ROOT_FOLDER_ID}
    - GDRIVE_CLIENT_ID=${GDRIVE_CLIENT_ID}
    - GDRIVE_CLIENT_SECRET=${GDRIVE_CLIENT_SECRET}
    - GDRIVE_REFRESH_TOKEN=${GDRIVE_REFRESH_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 2g
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8080/api/v2/monitor/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-triggerer:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-triggerer1
    restart: unless-stopped
    command: triggerer
    group_add:
    - '1001'
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config:/opt/airflow/config:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./python_jobs:/opt/python/jobs:ro
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform
    - dbt-target:/opt/dbt/dbt_tranform/target
    - dbt-logs:/opt/dbt/dbt_tranform/logs
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=
    - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS=admin:admin,${AIRFLOW_ADMIN_USERNAME}:${AIRFLOW_ADMIN_PASSWORD}
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
    - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
    - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
    - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=8123
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - OM_ADMIN_USER=${OM_ADMIN_USER}
    - OM_ADMIN_PASSWORD=${OM_ADMIN_PASSWORD}
    - PYTHON_JOBS_DIR=/opt/python/jobs
    # D-AQI-02 (Phase 6): AQICN removed — AQICN_API_TOKEN no longer used
    - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    - TOMTOM_API_KEY=${TOMTOM_API_KEY}
    - GDRIVE_ROOT_FOLDER_ID=${GDRIVE_ROOT_FOLDER_ID}
    - GDRIVE_CLIENT_ID=${GDRIVE_CLIENT_ID}
    - GDRIVE_CLIENT_SECRET=${GDRIVE_CLIENT_SECRET}
    - GDRIVE_REFRESH_TOKEN=${GDRIVE_REFRESH_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 2g
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8080/api/v2/monitor/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  postgres:
    image: postgres:15
    container_name: airflow-postgres1
    restart: unless-stopped
    ports:
    - 5432:5432
    environment:
    - POSTGRES_USER=airflow
    - POSTGRES_PASSWORD=airflow
    - POSTGRES_DB=airflow
    volumes:
    - ./airflow/data/postgres:/var/lib/postgresql/data
    - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    mem_limit: 1g
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - pg_isready
      - -U
      - airflow
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
    
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    user: root
    container_name: airflow-init
    environment:
    - AIRFLOW_SKIP_DB_MIGRATE=true
    - OM_ADMIN_USER=${OM_ADMIN_USER}
    - OM_ADMIN_PASSWORD=${OM_ADMIN_PASSWORD}
    volumes:
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform
    - dbt-target:/opt/dbt/dbt_tranform/target
    - dbt-logs:/opt/dbt/dbt_tranform/logs
    command: >
      bash -c "mkdir -p /opt/airflow/logs /opt/dbt/dbt_tranform/logs /opt/dbt/dbt_tranform/target /opt/dbt/dbt_tranform/dbt_packages
      && chmod -R 777 /opt/airflow/logs /opt/dbt/dbt_tranform
      && echo 'Permissions setup complete.'"
    networks:
    - air-quality-network
  dashboard:
    build:
      context: .
      dockerfile: python_jobs/dashboard/Dockerfile
    image: streamlit-dashboard:latest
    container_name: streamlit-dashboard
    restart: unless-stopped
    ports:
    - 8501:8501
    volumes:
    - ./python_jobs/dashboard:/app
    environment:
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
    - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB:-air_quality}
    - STREAMLIT_SERVER_PORT=8501
    depends_on:
      clickhouse:
        condition: service_healthy
    mem_limit: 512m
    cpus: '0.5'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8501/_stcore/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    restart: unless-stopped
    ports:
    - 3000:3000
    volumes:
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    - grafana-data:/var/lib/grafana
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=admin123456
    - GF_AUTH_ANONYMOUS_ENABLED=true
    - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
    - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    - GF_SECURITY_ALLOW_EMBEDDING=true
    - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    # Alerting — unified alerting ON, legacy alerting OFF (Grafana 11.x)
    - GF_ALERTING_ENABLED=true
    - GF_UNIFIED_ALERTING_ENABLED=true
    - GF_UNIFIED_ALERTING_ALERTMANAGER_FOR=new
    - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
    - CLICKHOUSE_PORT=${CLICKHOUSE_PORT}
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - TELEGRAM_AQ_BOT_TOKEN=${TELEGRAM_AQ_BOT_TOKEN}
    - TELEGRAM_AQ_CHAT_ID=${TELEGRAM_AQ_CHAT_ID}
    - TELEGRAM_SYS_BOT_TOKEN=${TELEGRAM_SYS_BOT_TOKEN}
    - TELEGRAM_SYS_CHAT_ID=${TELEGRAM_SYS_CHAT_ID}
    depends_on:
      clickhouse:
        condition: service_healthy
    mem_limit: 512m
    cpus: '0.5'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:3000/api/health
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    ports:
    - 9090:9090
    volumes:
    - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
    - ./monitoring/prometheus/queries-postgresql.yaml:/queries.yaml:ro
    - prometheus-data:/prometheus
    command:
    - '--config.file=/etc/prometheus/prometheus.yml'
    - '--storage.tsdb.path=/prometheus'
    - '--storage.tsdb.retention.time=15d'
    - '--web.enable-lifecycle'
    mem_limit: 512m
    cpus: '0.25'
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - --spider
      - http://localhost:9090/-/healthy
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
    - air-quality-network
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: unless-stopped
    command:
    - '--path.procfs=/host/proc'
    - '--path.sysfs=/host/sys'
    - '--path.rootfs=/rootfs'
    - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    ports:
    - 9100:9100
    mem_limit: 128m
    cpus: '0.25'
    networks:
    - air-quality-network
  docker-stats-exporter:
    build:
      context: ./monitoring/docker-stats-exporter
      dockerfile: Dockerfile
    image: local/docker-stats-exporter:latest
    container_name: docker-stats-exporter
    restart: unless-stopped
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
    - 9888:9888
    mem_limit: 128m
    cpus: '0.25'
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - --spider
      - http://localhost:9888/healthz
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
    - air-quality-network
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
    - DATA_SOURCE_NAME=postgresql://airflow:airflow@postgres:5432/airflow?sslmode=disable
    command:
    - '--extend.query-path=/queries.yaml'
    volumes:
    - ./monitoring/prometheus/queries-postgresql.yaml:/queries.yaml:ro
    ports:
    - 9187:9187
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m
    cpus: '0.25'
    networks:
    - air-quality-network

  # ============================================================
  # Phase 4: OpenMetadata 1.12.4 Distributed Compose
  # ============================================================
  # Shared infra: postgres container (Airflow metadata) + elasticsearch container
  # PostgreSQL init scripts: ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.16.3
    container_name: openmetadata-elasticsearch
    restart: unless-stopped
    environment:
    - discovery.type=single-node
    - ES_JAVA_OPTS=-Xms1024m -Xmx1024m
    - xpack.security.enabled=false
    volumes:
    - ./openmetadata/elasticsearch-data:/usr/share/elasticsearch/data
    mem_limit: 2g
    cpus: '1'
    healthcheck:
      test:
      - CMD-SHELL
      - "curl -s http://localhost:9200/_cluster/health?pretty | grep status | grep -qE 'green|yellow' || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '5'
    networks:
    - air-quality-network

  execute-migrate-all:
    image: docker.getcollate.io/openmetadata/server:1.12.4
    container_name: execute_migrate_all
    command: "./bootstrap/openmetadata-ops.sh migrate"
    environment:
    - OPENMETADATA_CLUSTER_NAME=${OPENMETADATA_CLUSTER_NAME:-openmetadata}
    - SERVER_PORT=${SERVER_PORT:-8585}
    - SERVER_ADMIN_PORT=${SERVER_ADMIN_PORT:-8586}
    - LOG_LEVEL=INFO
    - MIGRATION_LIMIT_PARAM=${MIGRATION_LIMIT_PARAM:-1200}
    # Database configuration for postgresql
    - DB_DRIVER_CLASS=org.postgresql.Driver
    - DB_SCHEME=postgresql
    - DB_PARAMS=allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    - DB_USER=${POSTGRES_OM_USER:-openmetadata_user}
    - DB_USER_PASSWORD=${POSTGRES_OM_PASSWORD:-openmetadata_password}
    - DB_HOST=postgres
    - DB_PORT=5432
    - OM_DATABASE=${POSTGRES_OM_DB:-openmetadata_db}
    # Authentication
    - AUTHORIZER_CLASS_NAME=org.openmetadata.service.security.DefaultAuthorizer
    - AUTHORIZER_REQUEST_FILTER=org.openmetadata.service.security.JwtFilter
    - AUTHORIZER_ADMIN_PRINCIPALS=[admin]
    - AUTHORIZER_INGESTION_PRINCIPALS=[ingestion-bot]
    - AUTHORIZER_PRINCIPAL_DOMAIN=open-metadata.org
    - AUTHORIZER_ENFORCE_PRINCIPAL_DOMAIN=false
    - AUTHORIZER_ENABLE_SECURE_SOCKET=false
    - AUTHENTICATION_PROVIDER=basic
    - AUTHENTICATION_PUBLIC_KEYS=[http://localhost:8585/api/v1/system/config/jwks]
    - AUTHENTICATION_AUTHORITY=https://accounts.google.com
    - AUTHENTICATION_ENABLE_SELF_SIGNUP=true
    - AUTHENTICATION_CLIENT_TYPE=public
    # JWT
    - RSA_PUBLIC_KEY_FILE_PATH=./conf/public_key.der
    - RSA_PRIVATE_KEY_FILE_PATH=./conf/private_key.der
    - JWT_ISSUER=open-metadata.org
    - JWT_KEY_ID=Gb389a-9f76-gdjs-a92j-0242bk94356
    # ElasticSearch
    - ELASTICSEARCH_HOST=elasticsearch
    - ELASTICSEARCH_PORT=9200
    - ELASTICSEARCH_SCHEME=http
    - SEARCH_TYPE=elasticsearch
    # Pipeline
    - PIPELINE_SERVICE_CLIENT_ENDPOINT=http://om-ingestion:8080
    - SERVER_HOST_API_URL=http://openmetadata:8585/api
    - PIPELINE_SERVICE_CLIENT_VERIFY_SSL=no-ssl
    - PIPELINE_SERVICE_CLIENT_CLASS_NAME=org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient
    - AIRFLOW_USERNAME=admin
    - AIRFLOW_PASSWORD=admin
    - FERNET_KEY=jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=
    - SECRET_MANAGER=db
    - EVENT_MONITOR=prometheus
    - OPENMETADATA_HEAP_OPTS=-Xmx1G -Xms1G
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
    - air-quality-network

  openmetadata:
    image: docker.getcollate.io/openmetadata/server:1.12.4
    container_name: openmetadata
    restart: unless-stopped
    ports:
    - "8585:8585"
    - "8586:8586"
    environment:
    - OPENMETADATA_CLUSTER_NAME=${OPENMETADATA_CLUSTER_NAME:-openmetadata}
    - SERVER_PORT=8585
    - SERVER_ADMIN_PORT=8586
    - LOG_LEVEL=INFO
    # Database configuration for postgresql
    - DB_DRIVER_CLASS=org.postgresql.Driver
    - DB_SCHEME=postgresql
    - DB_PARAMS=allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    - DB_USER=${POSTGRES_OM_USER:-openmetadata_user}
    - DB_USER_PASSWORD=${POSTGRES_OM_PASSWORD:-openmetadata_password}
    - DB_HOST=postgres
    - DB_PORT=5432
    - OM_DATABASE=${POSTGRES_OM_DB:-openmetadata_db}
    # Authentication
    - AUTHORIZER_CLASS_NAME=org.openmetadata.service.security.DefaultAuthorizer
    - AUTHORIZER_REQUEST_FILTER=org.openmetadata.service.security.JwtFilter
    - AUTHORIZER_ADMIN_PRINCIPALS=[admin]
    - AUTHORIZER_INGESTION_PRINCIPALS=[ingestion-bot]
    - AUTHORIZER_PRINCIPAL_DOMAIN=open-metadata.org
    - AUTHORIZER_ENFORCE_PRINCIPAL_DOMAIN=false
    - AUTHORIZER_ENABLE_SECURE_SOCKET=false
    - AUTHENTICATION_PROVIDER=basic
    - AUTHENTICATION_PUBLIC_KEYS=[http://localhost:8585/api/v1/system/config/jwks]
    - AUTHENTICATION_AUTHORITY=https://accounts.google.com
    - AUTHENTICATION_ENABLE_SELF_SIGNUP=true
    - AUTHENTICATION_CLIENT_TYPE=public
    # JWT
    - RSA_PUBLIC_KEY_FILE_PATH=./conf/public_key.der
    - RSA_PRIVATE_KEY_FILE_PATH=./conf/private_key.der
    - JWT_ISSUER=open-metadata.org
    - JWT_KEY_ID=Gb389a-9f76-gdjs-a92j-0242bk94356
    # ElasticSearch
    - ELASTICSEARCH_HOST=elasticsearch
    - ELASTICSEARCH_PORT=9200
    - ELASTICSEARCH_SCHEME=http
    - SEARCH_TYPE=elasticsearch
    # Pipeline
    - PIPELINE_SERVICE_CLIENT_ENDPOINT=http://om-ingestion:8080
    - SERVER_HOST_API_URL=http://openmetadata:8585/api
    - PIPELINE_SERVICE_CLIENT_VERIFY_SSL=no-ssl
    - PIPELINE_SERVICE_CLIENT_CLASS_NAME=org.openmetadata.service.clients.pipeline.airflow.AirflowRESTClient
    - AIRFLOW_USERNAME=admin
    - AIRFLOW_PASSWORD=admin
    - FERNET_KEY=jJ/9sz0g0OHxsfxOoSfdFdmk3ysNmPRnH3TUAbz3IHA=
    - SECRET_MANAGER=db
    - EVENT_MONITOR=prometheus
    - OPENMETADATA_HEAP_OPTS=-Xmx1G -Xms1G
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      execute-migrate-all:
        condition: service_completed_successfully
    mem_limit: 2g
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - --spider
      - http://localhost:8586/healthcheck
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
    - air-quality-network

  om-ingestion:
    image: docker.getcollate.io/openmetadata/ingestion:1.12.4
    container_name: openmetadata-ingestion
    restart: unless-stopped
    entrypoint: /bin/bash
    command:
    - "/opt/airflow/ingestion_dependency.sh"
    ports:
    - "8080:8080"
    environment:
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__OPENMETADATA_AIRFLOW_APIS__DAG_GENERATED_CONFIGS=/opt/airflow/dag_generated_configs
    - DB_HOST=postgres
    - DB_PORT=5432
    - AIRFLOW_DB=${POSTGRES_OM_AIRFLOW_DB:-airflow_db}
    - DB_USER=${POSTGRES_OM_USER:-openmetadata_user}
    - DB_SCHEME=postgresql+psycopg2
    - DB_PASSWORD=${POSTGRES_OM_PASSWORD:-openmetadata_password}
    - AIRFLOW__CORE__PARALLELISM=4
    - GDRIVE_ROOT_FOLDER_ID=${GDRIVE_ROOT_FOLDER_ID}
    - GDRIVE_CLIENT_ID=${GDRIVE_CLIENT_ID}
    - GDRIVE_CLIENT_SECRET=${GDRIVE_CLIENT_SECRET}
    - GDRIVE_REFRESH_TOKEN=${GDRIVE_REFRESH_TOKEN}
    - PYTHONPATH=/opt/airflow/plugins
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - dbt-target:/opt/dbt-artifacts:ro
    - ./openmetadata/custom_connectors:/opt/airflow/plugins/custom_connectors
    - ./python_jobs/dashboard:/opt/airflow/plugins/dashboard:ro
    depends_on:
      postgres:
        condition: service_healthy
      openmetadata:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    mem_limit: 3g
    cpus: '3'
    healthcheck:
      test:
      - CMD-SHELL
      - "curl -f --silent http://localhost:8080/ > /dev/null || exit 1"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
    - air-quality-network

networks:
  air-quality-network:
    external: true
volumes:
  grafana-data: null
  prometheus-data: null
  dbt-target:
  dbt-logs:
