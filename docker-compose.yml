services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"      # HTTP interface (dùng cho client, dbt, superset)
      - "9000:9000"      # Native TCP (clickhouse-client)
      - "9440:9440"      # HTTPS nếu cần sau này
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    mem_limit: 3g
    cpus: '2'
    volumes:
      - ./clickhouse-data:/var/lib/clickhouse       # persistent data
      - ./scripts/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql  # auto run init script
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1     # cho phép quản lý user qua SQL
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - air-quality-network

  # ============================================
  # Airflow 3.1 Services
  # ============================================
  # Note: airflow-permissions service removed — bind mounts (./logs, ./dbt) preserve
  # host user ownership, so no init container needed. entrypoint.sh creates subdirs at
  # container startup (dag_processor, scheduler, triggerer, etc.).

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-webserver1
    restart: unless-stopped
    command: api-server
    group_add:
      - "1001"
    ports:
      - "8090:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/config:/opt/airflow/config:ro
      - ./airflow/logs:/opt/airflow/logs
      - ./python_jobs:/opt/python/jobs:ro
      - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
      - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      # ClickHouse connection
      - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
      # Environment variables for dbt
      - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      # Python Jobs directory
      - PYTHON_JOBS_DIR=/opt/python/jobs/
      - AQICN_API_TOKEN=${AQICN_API_TOKEN}
      - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      airflow-scheduler:
        condition: service_started
      airflow-dag-processor:
        condition: service_started
      airflow-triggerer:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - air-quality-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-scheduler1
    restart: unless-stopped
    command: scheduler
    group_add:
      - "1001"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/config:/opt/airflow/config:ro
      - ./airflow/logs:/opt/airflow/logs
      - ./python_jobs:/opt/python/jobs:ro
      - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
      - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      # ClickHouse connection
      - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
      # Environment variables for dbt
      - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      # Python Jobs directory
      - PYTHON_JOBS_DIR=/opt/python/jobs
      - AQICN_API_TOKEN=${AQICN_API_TOKEN}
      - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 512m
    cpus: '1'
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - air-quality-network

  airflow-dag-processor:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-dag-processor1
    restart: unless-stopped
    command: dag-processor
    group_add:
      - "1001"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/config:/opt/airflow/config:ro
      - ./airflow/logs:/opt/airflow/logs
      - ./python_jobs:/opt/python/jobs:ro
      - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
      - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      # ClickHouse connection
      - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
      # Environment variables for dbt
      - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      # Python Jobs directory
      - PYTHON_JOBS_DIR=/opt/python/jobs
      - AQICN_API_TOKEN=${AQICN_API_TOKEN}
      - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 512m
    cpus: '1'
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - air-quality-network

  airflow-triggerer:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-triggerer1
    restart: unless-stopped
    command: triggerer
    group_add:
      - "1001"
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      - ./airflow/config:/opt/airflow/config:ro
      - ./airflow/logs:/opt/airflow/logs
      - ./python_jobs:/opt/python/jobs:ro
      - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
      - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
      - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
      - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
      - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
      - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
      # ClickHouse connection
      - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
      # Environment variables for dbt
      - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
      # Python Jobs directory
      - PYTHON_JOBS_DIR=/opt/python/jobs
      - AQICN_API_TOKEN=${AQICN_API_TOKEN}
      - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 512m
    cpus: '1'
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - air-quality-network

  # PostgreSQL for Airflow metadata
  postgres:
    image: postgres:15
    container_name: airflow-postgres1
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - ./airflow/data/postgres:/var/lib/postgresql/data
    mem_limit: 1g
    cpus: '1'
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - air-quality-network

  # ============================================
  # Airflow Init Tool - Handles permissions
  # ============================================
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    user: root
    container_name: airflow-init
    environment:
      - AIRFLOW_SKIP_DB_MIGRATE=true
    volumes:
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
    command: >
      bash -c "mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins &&
      chown -R 50000:0 /opt/airflow/logs &&
      chmod -R 775 /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins &&
      echo 'Permissions setup complete.'"
    networks:
      - air-quality-network

