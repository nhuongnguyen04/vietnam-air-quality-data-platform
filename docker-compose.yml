services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12
    container_name: clickhouse
    restart: unless-stopped
    ports:
    - 8123:8123
    - 9000:9000
    - 9440:9440
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    mem_limit: 3g
    cpus: '2'
    volumes:
    - ./clickhouse-data:/var/lib/clickhouse
    - ./scripts/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - -q
      - localhost:8123/ping
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-webserver1
    restart: unless-stopped
    command: api-server
    group_add:
    - '1001'
    ports:
    - 8090:8080
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config:/opt/airflow/config:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./python_jobs:/opt/python/jobs:ro
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform:ro
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
    - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
    - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
    - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=8123
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - PYTHON_JOBS_DIR=/opt/python/jobs/
    - AQICN_API_TOKEN=${AQICN_API_TOKEN}
    - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      airflow-scheduler:
        condition: service_started
      airflow-dag-processor:
        condition: service_started
      airflow-triggerer:
        condition: service_started
    mem_limit: 512m
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8080/api/v2/monitor/health
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-scheduler1
    restart: unless-stopped
    command: scheduler
    group_add:
    - '1001'
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config:/opt/airflow/config:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./python_jobs:/opt/python/jobs:ro
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform:ro
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
    - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
    - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
    - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=8123
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - PYTHON_JOBS_DIR=/opt/python/jobs
    - AQICN_API_TOKEN=${AQICN_API_TOKEN}
    - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 512m
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8080/api/v2/monitor/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-dag-processor:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-dag-processor1
    restart: unless-stopped
    command: dag-processor
    group_add:
    - '1001'
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config:/opt/airflow/config:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./python_jobs:/opt/python/jobs:ro
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform:ro
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
    - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
    - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
    - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=8123
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - PYTHON_JOBS_DIR=/opt/python/jobs
    - AQICN_API_TOKEN=${AQICN_API_TOKEN}
    - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 512m
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8080/api/v2/monitor/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-triggerer:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    container_name: airflow-triggerer1
    restart: unless-stopped
    command: triggerer
    group_add:
    - '1001'
    volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/config:/opt/airflow/config:ro
    - ./airflow/logs:/opt/airflow/logs
    - ./python_jobs:/opt/python/jobs:ro
    - ./dbt/dbt_tranform:/opt/dbt/dbt_tranform:ro
    - /var/run/docker.sock:/var/run/docker.sock
    environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - AIRFLOW__CORE__ENABLE_AIRFLOW_TASKS_STDOUT=true
    - AIRFLOW__CORE__STRICT_DATABASE_EXPRESSIONS=false
    - AIRFLOW__CORE__EXECUTION_API_SERVER_URL=http://airflow-webserver:8080/execution/
    - AIRFLOW__API__SECRET_KEY=${AIRFLOW_API_SECRET_KEY}
    - AIRFLOW__API_AUTH__JWT_SECRET=${AIRFLOW_API_AUTH_JWT_SECRET}
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_WEBSERVER_SECRET_KEY}
    - AIRFLOW_CONN_CLICKHOUSE_DEFAULT=http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/?database=${CLICKHOUSE_DB}
    - DBT_PROFILES_DIR=/opt/dbt/dbt_tranform
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=8123
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - PYTHON_JOBS_DIR=/opt/python/jobs
    - AQICN_API_TOKEN=${AQICN_API_TOKEN}
    - OPENWEATHER_API_TOKEN=${OPENWEATHER_API_TOKEN}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    mem_limit: 512m
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8080/api/v2/monitor/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  postgres:
    image: postgres:15
    container_name: airflow-postgres1
    restart: unless-stopped
    ports:
    - 5432:5432
    environment:
    - POSTGRES_USER=airflow
    - POSTGRES_PASSWORD=airflow
    - POSTGRES_DB=airflow
    volumes:
    - ./airflow/data/postgres:/var/lib/postgresql/data
    - ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    mem_limit: 1g
    cpus: '1'
    healthcheck:
      test:
      - CMD
      - pg_isready
      - -U
      - airflow
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: my-airflow-custom:latest
    user: root
    container_name: airflow-init
    environment:
    - AIRFLOW_SKIP_DB_MIGRATE=true
    volumes:
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    command: 'bash -c "mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
      && chown -R 50000:0 /opt/airflow/logs && chmod -R 775 /opt/airflow/logs /opt/airflow/dags
      /opt/airflow/plugins && echo ''Permissions setup complete.''"

      '
    networks:
    - air-quality-network
  dashboard:
    build:
      context: .
      dockerfile: python_jobs/dashboard/Dockerfile
    image: streamlit-dashboard:latest
    container_name: streamlit-dashboard
    restart: unless-stopped
    ports:
    - 8501:8501
    volumes: []
    environment:
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-8123}
    - CLICKHOUSE_USER=${CLICKHOUSE_USER:-admin}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB:-air_quality}
    - STREAMLIT_SERVER_PORT=8501
    depends_on:
      clickhouse:
        condition: service_healthy
    mem_limit: 512m
    cpus: '0.5'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:8501/_stcore/health
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    restart: unless-stopped
    ports:
    - 3000:3000
    volumes:
    - ./grafana/provisioning:/etc/grafana/provisioning:ro
    - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    - grafana-data:/var/lib/grafana
    environment:
    - GF_AUTH_ANONYMOUS_ENABLED=true
    - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
    - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    - GF_SECURITY_ALLOW_EMBEDDING=true
    - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    - CLICKHOUSE_HOST=${CLICKHOUSE_HOST}
    - CLICKHOUSE_PORT=${CLICKHOUSE_PORT}
    - CLICKHOUSE_USER=${CLICKHOUSE_USER}
    - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    - TELEGRAM_WEBHOOK_URL=https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage
    - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    depends_on:
      clickhouse:
        condition: service_healthy
    mem_limit: 512m
    cpus: '0.5'
    healthcheck:
      test:
      - CMD
      - curl
      - --fail
      - http://localhost:3000/api/health
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    networks:
    - air-quality-network
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: unless-stopped
    ports:
    - 9090:9090
    volumes:
    - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ./prometheus/rules:/etc/prometheus/rules:ro
    - ./prometheus/queries-postgresql.yaml:/queries.yaml:ro
    - prometheus-data:/prometheus
    command:
    - '--config.file=/etc/prometheus/prometheus.yml'
    - '--storage.tsdb.path=/prometheus'
    - '--storage.tsdb.retention.time=15d'
    - '--web.enable-lifecycle'
    mem_limit: 512m
    cpus: '0.25'
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - --spider
      - http://localhost:9090/-/healthy
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
    - air-quality-network
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: unless-stopped
    command:
    - '--path.procfs=/host/proc'
    - '--path.sysfs=/host/sys'
    - '--path.rootfs=/rootfs'
    - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    ports:
    - 9100:9100
    mem_limit: 128m
    cpus: '0.25'
    networks:
    - air-quality-network
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    command:
    - '--housekeeping_interval=30s'
    - '--docker_only=true'
    - '--disable_metrics=percpu,sched,tcp,udp,hwcard_bus,textfile'
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    ports:
    - 8088:8080
    mem_limit: 256m
    cpus: '0.25'
    networks:
    - air-quality-network
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
    - DATA_SOURCE_NAME=postgresql://airflow:airflow@postgres:5432/airflow?sslmode=disable
    command:
    - '--extend.query-path=/queries.yaml'
    volumes:
    - ./prometheus/queries-postgresql.yaml:/queries.yaml:ro
    ports:
    - 9187:9187
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m
    cpus: '0.25'
    networks:
    - air-quality-network

  # ============================================================
  # Phase 4: OpenMetadata 1.12.4 Distributed Compose
  # ============================================================
  # Shared infra: postgres container (Airflow metadata) + elasticsearch container
  # PostgreSQL init scripts: ./postgres/init-scripts:/docker-entrypoint-initdb.d:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.16.3
    container_name: openmetadata-elasticsearch
    restart: unless-stopped
    environment:
    - discovery.type=single-node
    - ES_JAVA_OPTS=-Xms1g -Xmx1g
    - bootstrap.memory_lock=true
    - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
    - ./openmetadata/elasticsearch-data:/usr/share/elasticsearch/data
    mem_limit: 2g
    cpus: '1'
    healthcheck:
      test:
      - CMD-SHELL
      - "curl -f http://localhost:9200/_cluster/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '5'
    networks:
    - air-quality-network

  openmetadata:
    image: openmetadata/server:1.12.4
    container_name: openmetadata
    restart: unless-stopped
    ports:
    - "8585:8585"
    environment:
    - DB_BACKEND_TYPE=postgresql
    - POSTGRES_HOST=postgres
    - POSTGRES_PORT=5432
    - POSTGRES_DB=${POSTGRES_OM_DB:-openmetadata_db}
    - POSTGRES_USER=${POSTGRES_OM_USER:-openmetadata_user}
    - POSTGRES_PASSWORD=${POSTGRES_OM_PASSWORD:-openmetadata_password}
    - ELASTICSEARCH_HOST=elasticsearch
    - ELASTICSEARCH_PORT=9200
    - ELASTICSEARCH_SCHEME=http
    - SERVER_PORT=8585
    - AIRFLOW_HOST=om-ingestion
    - AIRFLOW_PORT=8080
    - LOGGER_FILE_NAME=openmetadata.log
    - LOG_LEVEL=INFO
    volumes:
    - ./openmetadata/data:/data
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    mem_limit: 2g
    cpus: '1'
    healthcheck:
      test:
      - CMD-SHELL
      - "curl -f http://localhost:8585/ || exit 1"
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
    - air-quality-network

  om-ingestion:
    image: openmetadata/ingestion:1.12.4
    container_name: openmetadata-ingestion
    restart: unless-stopped
    ports:
    - "8080:8080"
    environment:
    - DB_BACKEND=postgresql
    - POSTGRES_HOST=postgres
    - POSTGRES_PORT=5432
    - POSTGRES_DB=${POSTGRES_OM_DB:-openmetadata_db}
    - POSTGRES_USER=${POSTGRES_OM_USER:-openmetadata_user}
    - POSTGRES_PASSWORD=${POSTGRES_OM_PASSWORD:-openmetadata_password}
    - OPENMETADATA_URL=http://openmetadata:8585
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_OM_USER:-openmetadata_user}:${POSTGRES_OM_PASSWORD:-openmetadata_password}@postgres:5432/${POSTGRES_OM_DB:-openmetadata_db}
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./openmetadata/ingestion-configs:/ingestion-configs:ro
    - ./dbt/dbt_tranform/target:/opt/dbt-artifacts:ro
    depends_on:
      postgres:
        condition: service_healthy
      openmetadata:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    mem_limit: 1g
    cpus: '1'
    healthcheck:
      test:
      - CMD-SHELL
      - "curl -f http://localhost:8080/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '5'
    networks:
    - air-quality-network

networks:
  air-quality-network:
    external: true
volumes:
  grafana-data: null
  prometheus-data: null
