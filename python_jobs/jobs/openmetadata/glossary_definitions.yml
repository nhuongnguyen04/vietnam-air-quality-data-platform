glossaries:
  - name: AirQuality
    display_name: Air Quality Glossary
    description: >
      Standard vocabulary for air quality metrics used in Vietnam Air Quality
      Data Platform. Covers AQI calculation, pollutants, data quality tiers,
      and alert thresholds.
    terms:
      - name: AQI
        display_name: Air Quality Index
        description: >
          Composite air quality index on a 0–500 scale. Higher values indicate
          worse air quality. Categories: Good (0–50), Moderate (51–100),
          Unhealthy for Sensitive Groups (101–150), Unhealthy (151–200), Very
          Unhealthy (201–300), Hazardous (301–500). Based on US EPA standard.
          Used in fct_air_quality_summary_hourly and dm_aqi_current_status.
      - name: PM25
        display_name: PM2.5 - Fine Particulate Matter
        description: >
          Airborne particles <= 2.5 micrometers diameter. Primary health risk
          in Vietnamese urban areas. WHO guideline: < 5 ug/m3 annual mean,
          < 15 ug/m3 24-hour mean. Primary pollutant in Hanoi and HCMC. Used in
          stg_aqiin__measurements and stg_openweather__measurements. D-AQI-02
          (Phase 6): AQICN + Sensors.Community removed.
      - name: PM10
        display_name: PM10 - Coarse Particulate Matter
        description: >
          Airborne particles <= 10 micrometers diameter. Generated by
          construction, agriculture, dust. WHO guideline: < 15 ug/m3 annual
          mean, < 45 ug/m3 24-hour mean. Common in Vietnamese industrial
          provinces.
      - name: Ozone
        display_name: O3 - Ground-Level Ozone
        description: >
          Secondary pollutant formed by NOx + VOCs + sunlight via photochemical
          reactions. Peak levels in afternoon (12:00-18:00). WHO 8-hour
          guideline: < 100 ug/m3. Monitored via OpenWeather o3 parameter.
      - name: NO2
        display_name: NO2 - Nitrogen Dioxide
        description: >
          Traffic-related pollutant and respiratory irritant. Primary source:
          vehicle emissions, power plants. WHO 1-hour guideline: < 200 ug/m3.
          High in Hanoi and HCMC traffic corridors.
      - name: SO2
        display_name: SO2 - Sulfur Dioxide
        description: >
          Primarily from fossil fuel combustion (coal power plants, heavy
          industry). Affects respiratory system. WHO 10-minute guideline:
          < 500 ug/m3. Relevant in northern Vietnamese industrial zones.
      - name: CO
        display_name: CO - Carbon Monoxide
        description: >
          Colorless, odorless gas from incomplete combustion (vehicles,
          cooking, heating). Affects blood oxygen carrying capacity at high
          concentrations. WHO 8-hour guideline: < 4 mg/m3 (approx. 3.5 ppm).
          Monitored via OpenWeather co parameter.
