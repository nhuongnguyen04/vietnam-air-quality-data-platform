dashboard:
  name: "Phân tích Chất lượng Không khí Việt Nam"
  description: "Vietnam Air Quality Data Platform - Main Streamlit Dashboard"
  service_name: "streamlit_aqi_dashboard"
  pages:
    - filename: "1_Overview.py"
      name: "Overview"
      display_name: "Tổng quan"
      description: "Trang Tổng quan (Overview) cung cấp cái nhìn toàn diện về chất lượng không khí tại Việt Nam."
      source_tables: 
        - "fct_air_quality_ward_level_hourly"
        - "fct_air_quality_summary_daily"
    - filename: "2_Pollutants.py"
      name: "Pollutants"
      display_name: "Chất ô nhiễm"
      description: "Phân tích chi tiết nồng độ các chất ô nhiễm."
      source_tables: 
        - "fct_air_quality_summary_daily"
        - "dm_pollutant_source_fingerprint"
        - "dm_aqi_compliance_standards"
    - filename: "3_Source_Comparison.py"
      name: "Source_Comparison"
      display_name: "So sánh nguồn"
      description: "So sánh dữ liệu chất lượng không khí giữa các nguồn."
      source_tables: 
        - "fct_air_quality_summary_daily"
        - "dm_platform_data_health"
    - filename: "4_Historical_Trend.py"
      name: "Historical_Trend"
      display_name: "Xu hướng lịch sử"
      description: "Phân tích xu hướng chất lượng không khí theo thời gian."
      source_tables: 
        - "dm_air_quality_overview_daily"
        - "dm_air_quality_overview_monthly"
        - "dm_aqi_temporal_patterns"
    - filename: "5_Alerts.py"
      name: "Alerts"
      display_name: "Cảnh báo"
      description: "Hệ thống cảnh báo ngưỡng chất lượng không khí xấu."
      source_tables: 
        - "dm_aqi_current_status"
        - "dm_aqi_compliance_standards"
        - "dm_aqi_health_impact_summary"
        - "dm_platform_data_health"
    - filename: "6_Traffic_Impact.py"
      name: "Traffic_Impact"
      display_name: "Ảnh hưởng Giao thông"
      description: "Đánh giá tác động của mật độ giao thông đến chất lượng không khí."
      source_tables: 
        - "dm_traffic_hourly_trend"
        - "dm_traffic_pollution_correlation_daily"
    - filename: "7_Health_Risk.py"
      name: "Health_Risk"
      display_name: "Rủi ro Sức khỏe"
      description: "Phân tích mức độ rủi ro sức khỏe cộng đồng."
      source_tables: 
        - "dm_regional_health_risk_ranking"
    - filename: "8_Status.py"
      name: "Status"
      display_name: "Trạng thái Hệ thống"
      description: "Trạng thái các trạm quan trắc và luồng dữ liệu."
      source_tables: 
        - "dm_platform_data_health"
    - filename: "9_Weather_Impact.py"
      name: "Weather_Impact"
      display_name: "Ảnh hưởng Thời tiết"
      description: "Mối liên hệ giữa khí tượng (nhiệt độ, độ ẩm) và AQI."
      source_tables:
        - "dm_weather_pollution_correlation_daily"
        - "dm_weather_hourly_trend"
    - filename: "10_Ask_Data.py"
      name: "Ask_Data"
      display_name: "Ask Data"
      description: "Trang hỏi dữ liệu tự nhiên với lượng preview SQL trước khi thực thi trên bề mặt analytics được phê duyệt."
      source_tables:
        - "dm_air_quality_national_summary"
        - "dm_air_quality_overview_daily"
        - "dm_air_quality_overview_hourly"
        - "dm_air_quality_overview_monthly"
        - "dm_aqi_current_status"
        - "dm_aqi_compliance_standards"
        - "dm_aqi_health_impact_summary"
        - "dm_aqi_temporal_patterns"
        - "dm_platform_data_health"
        - "dm_pollutant_source_fingerprint"
        - "dm_regional_health_risk_ranking"
        - "dm_traffic_hourly_trend"
        - "dm_traffic_pollution_correlation_daily"
        - "dm_weather_hourly_trend"
        - "dm_weather_pollution_correlation_daily"
        - "fct_air_quality_summary_hourly"
        - "fct_air_quality_summary_daily"
        - "fct_air_quality_summary_monthly"
        - "fct_air_quality_province_level_hourly"
        - "fct_air_quality_province_level_daily"
        - "fct_air_quality_province_level_monthly"
        - "fct_air_quality_ward_level_hourly"
        - "fct_air_quality_ward_level_daily"
        - "fct_air_quality_ward_level_monthly"
        - "fct_aqi_weather_traffic_unified"
