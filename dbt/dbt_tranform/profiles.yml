# dbt profiles.yml for Vietnam Air Quality Data Platform
# This file is used by dbt to connect to ClickHouse

dbt_tranform:
  target: production
  outputs:
    dev:
      type: clickhouse
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'admin') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', 'admin123456') }}"
      database: "{{ env_var('CLICKHOUSE_DB', 'air_quality') }}"
      schema: "{{ env_var('CLICKHOUSE_DB', 'air_quality') }}"
      threads: 4
      timeout: 300
      retry_count: 3
      retry_timeout: 60
      compression: lz4
      
    production:
      type: clickhouse
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'admin') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', 'admin123456') }}"
      database: "{{ env_var('CLICKHOUSE_DB', 'air_quality') }}"
      schema: "{{ env_var('CLICKHOUSE_DB', 'air_quality') }}"
      threads: 4
      timeout: 300
      retry_count: 3
      retry_timeout: 60
      compression: lz4
