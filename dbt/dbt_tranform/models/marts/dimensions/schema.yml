version: 2

models:
  - name: dim_locations
    description: "Dimension table: unified station/location metadata — ReplacingMergeTree. Stores all known stations from AQICN, OpenWeather, Sensors.Community with latest attributes. Primary join key for fact tables."
    columns:
      - name: station_id
        description: "Unified station key: AQICN_*, SENSORSCM_*, openweather:*"
        tests:
          - unique
          - not_null

      - name: source
        description: "Data source: aqicn, openweather, sensorscm"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['aqicn', 'openweather', 'sensorscm']

      - name: station_name
        description: "Human-readable station name"
        tests:
          - not_null

      - name: latitude
        description: "Station latitude (WGS84)"
        tests:
          - not_null

      - name: longitude
        description: "Station longitude (WGS84)"
        tests:
          - not_null

      - name: city
        description: "City name"
        tests:
          - not_null

      - name: province
        description: "Province name"
        tests:
          - not_null

      - name: location_type
        description: "Station type: KTTV, KCN, Chi cục BVMT, Other, city_centroid, community"
        tests:
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality classification: research, city_centroid, community"
        tests:
          - not_null

      - name: is_active
        description: "Whether the station is currently active"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true]

      - name: first_seen
        description: "Earliest ingest_time for this station"
        tests:
          - not_null

      - name: last_seen
        description: "Latest ingest_time for this station (also used as version column for ReplacingMergeTree)"
        tests:
          - not_null

  - name: dim_time
    description: "Dimension table: time/date dimension from seed_dim_time.csv. Contains date-level and hour-level attributes for Vietnam timezone."
    columns:
      - name: datetime_hour
        description: "Datetime at hour boundary (UTC)"
        tests:
          - unique
          - not_null

      - name: date
        description: "Date portion (toDate(datetime_hour))"
        tests:
          - not_null

      - name: day_of_week
        description: "Day of week name: Monday, Tuesday, ..."
        tests:
          - not_null

      - name: hour_of_day
        description: "Hour of day (0-23)"
        tests:
          - not_null

      - name: is_weekend
        description: "True if Saturday or Sunday"
        tests:
          - not_null

      - name: month
        description: "Month number (1-12)"
        tests:
          - not_null

      - name: year
        description: "Year (e.g. 2025)"
        tests:
          - not_null

      - name: vietnam_tz_offset
        description: "Vietnam timezone offset in seconds (+25200 for +07:00)"
        tests:
          - not_null

  - name: dim_pollutants
    description: "Dimension table: EPA AQI pollutant reference from pollutants.csv seed. ReplacingMergeTree stores latest breakpoint rows."
    columns:
      - name: pollutant_key
        description: "Standardized pollutant identifier"
        tests:
          - not_null

      - name: display_name
        description: "Human-readable pollutant name"
        tests:
          - not_null

      - name: unit
        description: "EPA standard unit for this pollutant"
        tests:
          - not_null

      - name: epa_aqi_bp_lo
        description: "EPA AQI breakpoint lower bound"
        tests:
          - not_null

      - name: epa_aqi_bp_hi
        description: "EPA AQI breakpoint upper bound"
        tests:
          - not_null

      - name: conc_bp_lo
        description: "Concentration breakpoint lower bound"
        tests:
          - not_null

      - name: conc_bp_hi
        description: "Concentration breakpoint upper bound"
        tests:
          - not_null

      - name: health_effects
        description: "Health advisory text for this AQI range"
        tests:
          - not_null