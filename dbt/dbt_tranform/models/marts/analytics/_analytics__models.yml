version: 2

models:
  - name: fct_traffic_pollution_correlation_daily
    description: "Daily correlation statistics between traffic and PM2.5 by province and location type."
    columns:
      - name: province
        tests:
          - not_null
      - name: location_type
        tests:
          - not_null
          - accepted_values:
              values: ['Urban', 'Industrial', 'Rural']
      - name: pm25_daily_avg
        tests:
          - not_null
          - range:
              min_value: 0
      - name: congestion_daily_avg
        tests:
          - not_null
          - range:
              min_value: 0
      - name: pollution_density_index
        tests:
          - range:
              min_value: 0

  - name: dm_aqi_weather_traffic_unified
    description: "The core unified dataset for dashboards, joining AQI, weather, traffic, and population data."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [station_name, datetime_hour]
    columns:
      - name: station_name
        tests:
          - not_null
      - name: datetime_hour
        tests:
          - not_null
      - name: aqi_us
        tests:
          - range:
              min_value: 0
              max_value: 500
      - name: pm25
        tests:
          - range:
              min_value: 0
