version: 2

models:
  - name: dm_aqi_current_status
    description: |
      Latest air quality status per ward_code (current conditions for real-time dashboard).

      **Grain:** One row per (province, ward_code) — the most recent reading per ward.

      **Business Rules:**
      - Uses `argMax(col, datetime_hour)` to select the latest value for each column
      - Incremental: only processes ward_codes with new data since last run
      - ReplacingMergeTree ensures only one record per (province, ward_code)

      **Downstream consumers:** Streamlit overview page, real-time status cards, alert triggers
    meta:
      openmetadata:
        tier: Tier.Tier1
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Gold
    columns:
      - name: province
        description: Province name.
      - name: ward_code
        description: Ward identifier.
      - name: region_3
        description: 3-region classification.
      - name: region_8
        description: 8-region classification.
      - name: latitude
        description: Latitude of the ward.
      - name: longitude
        description: Longitude of the ward.
      - name: latest_hour
        description: UTC timestamp of the most recent reading.
        tags:
          - NonSensitive
      - name: current_aqi_us
        description: Most recent US AQI value.
        meta:
          openmetadata:
            glossary:
              - AirQuality.AQI
      - name: current_aqi_vn
        description: Most recent Vietnam AQI value.
        meta:
          openmetadata:
            glossary: ["AirQuality.AQI"]
      - name: pm25
        description: Most recent PM2.5 concentration.
        meta:
          openmetadata:
            glossary: ["AirQuality.PM25"]
      - name: pm10
        description: Most recent PM10 concentration.
        meta:
          openmetadata:
            glossary: ["AirQuality.PM10"]
      - name: main_pollutant
        description: Dominant pollutant at the most recent hour.
      - name: data_source
        description: Always 'consolidated' for this model.
      - name: ingest_time
        description: Timestamp of the most recent upstream ingestion.
        tags:
          - NonSensitive

  - name: dm_platform_data_health
    description: |
      Data freshness and availability status for each monitoring station/ward_code.

      **Grain:** One row per (province, ward_code, source) — current health status per data source per ward.

      **Business Rules:**
      - lag_hours = hours since the most recent reading from this source at this ward_code
      - health_status derived from lag_hours:
        - 'Fresh': ≤1 hour (green)
        - 'Delayed': 1–3 hours (yellow)
        - 'Stale': 3–24 hours (orange)
        - 'Offline': >24 hours (red)
      - is_reliable = TRUE if lag_hours ≤ 3 hours

      **Downstream consumers:** Data quality dashboard tab, alerting on stale/offline sources, SLA reporting
    meta:
      openmetadata:
        tier: Tier.Tier1
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Gold
    columns:
      - name: province
        description: Province name.
      - name: ward_code
        description: Ward identifier.
      - name: source
        description: Data source name (aqiin or openweather).
      - name: last_reading_at
        description: UTC timestamp of the latest reading from this source.
        tags:
          - NonSensitive
      - name: lag_hours
        description: Number of hours since the last reading.
      - name: health_status
        description: Status string based on lag (Fresh, Delayed, Stale, Offline).
      - name: is_reliable
        description: Boolean flag for data reliability (lag ≤ 3 hours).

  - name: dm_aqi_compliance_standards
    description: |
      Daily compliance assessment against WHO guidelines and Vietnam national standards (TCVN 05:2023).

      **Grain:** One row per (date, province, ward_code) — compliance flags for each location-day.

      **Business Rules:**
      - WHO daily PM2.5 guideline: 15 µg/m³ (24-hour mean)
      - WHO daily PM10 guideline: 45 µg/m³ (24-hour mean)
      - Vietnam TCVN 05:2023 daily PM2.5: 50 µg/m³
      - Vietnam TCVN 05:2023 daily PM10: 100 µg/m³
      - compliance_status derived from pm25_avg:
        - 'Good/Safe': pm25_avg ≤ 15
        - 'Warning (WHO Breach)': 15 < pm25_avg ≤ 50
        - 'Unhealthy (TCVN Breach)': pm25_avg > 50
      - Incremental: processes only new daily records

      **Reference Standards:**
      - WHO Global Air Quality Guidelines (2021)
      - TCVN 05:2023/BTNMT — QCVN 05:2023/BTNMT (Vietnamese national standard)

      **Downstream consumers:** Compliance dashboard, regulatory reporting, health advisory triggers
    columns:
      - name: date
        description: Calendar date.
        tags:
          - NonSensitive
      - name: province
        description: Province name.
      - name: ward_code
        description: Empty compatibility column; traffic correlation is computed at province-hour grain.
      - name: region_3
        description: Vietnam 3-region classification.
      - name: region_8
        description: Vietnam 8-region classification.
      - name: pm25_avg
        description: Daily mean PM2.5 concentration.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: pm10_avg
        description: Daily mean PM10 concentration.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM10
      - name: who_pm25_breach
        description: Boolean flag for WHO PM2.5 guideline breach (>15 µg/m³).
      - name: who_pm10_breach
        description: Boolean flag for WHO PM10 guideline breach (>45 µg/m³).
      - name: tcvn_pm25_breach
        description: Boolean flag for TCVN PM2.5 standard breach (>50 µg/m³).
      - name: tcvn_pm10_breach
        description: Boolean flag for TCVN PM10 standard breach (>100 µg/m³).
      - name: compliance_status
        description: Categorical status based on WHO/TCVN breaches.
      - name: ingest_time
        description: Latest upstream ingest timestamp.
        tags:
          - NonSensitive

    meta:
      openmetadata:
        tier: Tier.Tier1
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Gold
  - name: dm_aqi_health_impact_summary
    description: |
      Daily health risk assessment based on AQI categories and dominant pollutant health effects.

      **Grain:** One row per (date, province, ward_code) — aggregated health risk metrics per location-day.

      **Business Rules:**
      - aqi_category assigned per hour based on final_aqi_us:
        - 'Good': 0–50
        - 'Moderate': 51–100
        - 'Unhealthy for Sensitive Groups': 101–150
        - 'Unhealthy': 151–200
        - 'Very Unhealthy': 201–300
        - 'Hazardous': >300
      - high_risk_hours: count of hours where aqi_category ∈ ('Unhealthy', 'Very Unhealthy', 'Hazardous')
      - high_risk_exposure_pct: proportion of the day in high-risk conditions
      - primary_health_advice: most common health advisory text from EPA breakpoints for this day

      **Downstream consumers:** Health impact dashboard, public health alerts, sensitive group warnings
    columns:
      - name: date
        description: Calendar date.
        tags:
          - NonSensitive
      - name: province
        description: Province name.
      - name: ward_code
        description: Ward identifier.
      - name: region_3
        description: Vietnam 3-region classification.
      - name: region_8
        description: Vietnam 8-region classification.
      - name: total_hours
        description: Number of hourly readings in the day.
      - name: high_risk_hours
        description: Number of hours in the day with unhealthy AQI.
      - name: high_risk_exposure_pct
        description: Percentage of day in high-risk categories.
      - name: primary_health_advice
        description: Dominant health advisory message based on peak pollution.
      - name: ingest_time
        description: Latest upstream ingest timestamp.
        tags:
          - NonSensitive

    meta:
      openmetadata:
        tier: Tier.Tier1
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Gold
  - name: dm_aqi_temporal_patterns
    description: |
      Time-of-day and day-of-week air quality patterns per province.

      **Grain:** One row per (province, hour_of_day, day_of_week) — seasonal and weekly patterns.

      **Business Rules:**
      - Aggregates all historical data to compute average AQI and PM2.5/PM10 for each hour×day combination
      - SummingMergeTree accumulates readings over time
      - Used for anomaly detection (compare current readings vs. typical pattern)
      - reading_count tracks sample size for confidence estimation

      **Downstream consumers:** Anomaly detection, pattern comparison charts, "Is this normal?" dashboard feature
    columns:
      - name: province
        description: Province name.
      - name: region_3
        description: Vietnam 3-region classification.
      - name: region_8
        description: Vietnam 8-region classification.
      - name: hour_of_day
        description: Hour (0-23).
        tags:
          - NonSensitive
      - name: day_of_week
        description: Day of week (1-7, where 1 is Monday).
        tags:
          - NonSensitive
      - name: avg_aqi_us
        description: Historical average US AQI for this time slot.
        meta:
          openmetadata:
            glossary:
              - AirQuality.AQI
      - name: avg_aqi_vn
        description: Historical average Vietnam AQI for this time slot.
        meta:
          openmetadata:
            glossary:
              - AirQuality.AQI
      - name: avg_pm25
        description: Historical average PM2.5 for this time slot.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: avg_pm10
        description: Historical average PM10 for this time slot.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM10
      - name: reading_count
        description: Number of historical readings contributing to the average.
      - name: ingest_time
        description: Latest ingest timestamp included in the pattern.
        tags:
          - NonSensitive

    meta:
      openmetadata:
        tier: Tier.Tier1
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Gold
  - name: dm_pollutant_source_fingerprint
    description: |
      Probabilistic source attribution based on PM2.5/PM10 ratio analysis.

      **Grain:** One row per (date, province, ward_code) — source classification per ward-day.

      **Business Rules:**
      - pm25_pm10_ratio = avg(pm25) / avg(pm10):
        - Ratio > 0.6: Combustion/Traffic source (fine particles from vehicle emissions, power plants)
        - Ratio < 0.4: Dust/Construction source (coarse particles from road dust, building activities)
        - Ratio 0.4–0.6: Mixed source
      - Incremental: processes new daily records

      **Downstream consumers:** Source analysis dashboard, industrial permit monitoring, traffic policy evaluation
    columns:
      - name: date
        description: Calendar date.
        tags:
          - NonSensitive
      - name: province
        description: Province name.
      - name: ward_code
        description: Ward identifier.
      - name: region_3
        description: Vietnam 3-region classification.
      - name: region_8
        description: Vietnam 8-region classification.
      - name: pm25
        description: "Daily average PM2.5 concentration."
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: pm10
        description: "Daily average PM10 concentration."
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM10
      - name: pm25_pm10_ratio
        description: Ratio of PM2.5 to PM10 concentration.
      - name: probable_source
        description: Most likely source category (Combustion/Traffic, Dust/Construction, or Mixed).
      - name: ingest_time
        description: Latest upstream ingest timestamp.
        tags:
          - NonSensitive

    meta:
      openmetadata:
        tier: Tier.Tier1
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Gold
  - name: dm_regional_health_risk_ranking
    description: |
      National health risk ranking of provinces based on population-weighted PM2.5 exposure.

      **Grain:** One row per province (static table, regenerated daily via incremental).

      **Business Rules:**
      - time_weighted_pm25: Average PM2.5 concentration across all stations in the province
      - total_exposure_index_m: PM2.5 × provincial_population / 1,000,000 — "population exposure mass" in tonnes
      - risk_category:
        - 'CRITICAL': avg_pm25 > 50 µg/m³
        - 'HIGH RISK': 35–50 µg/m³
        - 'MODERATE': 15–35 µg/m³
        - 'LOW': <15 µg/m³
      - national_risk_rank: Rank within all provinces (1 = highest risk)
      - location_type derived from province name:
        - Urban: Ha Noi, Ho Chi Minh, Da Nang, Hai Phong, Can Tho
        - Industrial: Binh Duong, Dong Nai, Ba Ria - Vung Tau, Bac Ninh, Bac Giang, Hung Yen
        - Rural: all other provinces

      **Downstream consumers:** Risk ranking dashboard, priority province targeting, public health resource allocation
    columns:
      - name: province
        description: Province name.
      - name: region_3
        description: Vietnam 3-region classification.
      - name: region_8
        description: Vietnam 8-region classification.
      - name: population
        description: Total population of the province.
      - name: time_weighted_pm25
        description: Average PM2.5 concentration (30-day window).
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: total_exposure_index_m
        description: Population-weighted exposure index (PM2.5 × Population / 1M).
      - name: risk_category
        description: Health risk category (CRITICAL, HIGH, MODERATE, LOW).
      - name: national_risk_rank
        description: Ranking of the province by population exposure (1 = highest risk).

    meta:
      openmetadata:
        tier: Tier.Tier1
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Gold
  - name: dm_traffic_pollution_correlation_daily
    description: |
      Daily observational co-movement statistics between traffic congestion and PM2.5 pollution by province and location type.

      **Grain:** One row per province per day — computed from province-hour AQI and TomTom overlap.

      **Business Rules:**
      - location_type derived from province:
        - 'Urban': major municipalities (Ha Noi, HCMC, Da Nang, Hai Phong, Can Tho)
        - 'Industrial': manufacturing provinces (Binh Duong, Dong Nai, etc.)
        - 'Rural': all others
      - pm25_daily_avg: Average PM2.5 across overlapped province-hour observations
      - congestion_daily_avg: Average TomTom congestion ratio across overlapped province-hour observations
      - pm25_congestion_uplift: PM2.5 difference between high- and low-congestion hours; NULL unless sample thresholds are met
      - traffic_pollution_impact_score: Observational PM2.5 x congestion co-movement score, not causal attribution

      **Downstream consumers:** Traffic co-movement dashboard, urban planning exploratory analysis
    columns:
      - name: date
        description: Calendar date.
        tags:
          - NonSensitive
      - name: province
        description: Province name.
      - name: ward_code
        description: Ward identifier.
      - name: region_3
        description: Vietnam 3-region classification.
      - name: region_8
        description: Vietnam 8-region classification.
      - name: location_type
        description: Urban, Industrial, or Rural.
      - name: pm25_daily_avg
        description: Daily average PM2.5 in province.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: pm10_daily_avg
        description: Daily average PM10 in province.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM10
      - name: congestion_daily_avg
        description: Daily average traffic congestion ratio.
      - name: sum_pm25
        description: Sum of PM2.5 for aggregation.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: sum_pm10
        description: Sum of PM10 for aggregation.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM10
      - name: total_hours
        description: Total hours contributing to the daily average.
      - name: avg_traffic_ward_count
        description: Average number of wards with traffic data per hour.
      - name: avg_positive_traffic_ward_count
        description: Average number of wards with non-zero congestion per hour.
      - name: avg_traffic_coverage_ratio
        description: Average hourly traffic coverage ratio for the province-day.
      - name: low_congestion_threshold
        description: Province-day 25th percentile congestion threshold.
      - name: high_congestion_threshold
        description: Province-day 75th percentile congestion threshold.
      - name: pm25_low_congestion_avg
        description: Average PM2.5 during low-congestion hours.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: pm25_high_congestion_avg
        description: Average PM2.5 during high-congestion hours.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: low_congestion_hours
        description: Number of province-hour observations in the low-congestion band.
      - name: high_congestion_hours
        description: Number of province-hour observations in the high-congestion band.
      - name: pm25_congestion_uplift
        description: PM2.5 uplift during high-congestion hours versus low-congestion hours; NULL when total/high/low sample thresholds are not met.
        meta:
          openmetadata:
            glossary:
              - AirQuality.PM25
      - name: traffic_pollution_impact_score
        description: Observational co-movement score (PM2.5 × congestion), not a causal impact estimate.
      - name: traffic_contribution_pct
        description: Deprecated compatibility column; always NULL because causal traffic attribution is not estimated in this mart.
      - name: dbt_updated_at
        description: Timestamp of the latest dbt processing run.
        tags:
          - NonSensitive

    meta:
      openmetadata:
        tier: Tier.Tier1
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Gold
  - name: dm_weather_pollution_correlation_daily
    description: |
      Daily correlation statistics between meteorological conditions (wind, temp, humidity) and PM2.5 pollution.

      **Grain:** One row per (date, province, ward_code).

      **Business Rules:**
      - stagnant_air_probability: % of day with wind < 1.0 m/s
      - wind_dispersal_risk_index: pm25 / wind_speed (higher = higher risk)
      - weather_influence_pct: PM2.5 difference between stagnant and dispersive conditions

      **Downstream consumers:** Weather impact analysis, stagnation forecasting
    columns:
