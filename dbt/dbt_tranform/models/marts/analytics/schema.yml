version: 2

models:
  - name: mart_analytics__forecast_accuracy
    description: "Forecast accuracy analytics — pre-computed forecast vs actual comparison with accuracy scores. Incremental: 90-day window. Source: int_forecast_accuracy."
    columns:
      - name: station_id
        description: "AQICN station ID (plain numeric, no prefix)"
        tests:
          - not_null

      - name: pollutant
        description: "Pollutant being forecasted: pm25, pm10"
        tests:
          - not_null

      - name: forecast_date
        description: "Date for which the forecast was made"
        tests:
          - not_null

      - name: forecast_measurement_time
        description: "Datetime of the measurement this forecast applies to"
        tests:
          - not_null

      - name: forecast_avg
        description: "Average forecast value"
        tests:
          - not_null

      - name: forecast_max
        description: "Maximum forecast value"
        tests:
          - not_null

      - name: forecast_min
        description: "Minimum forecast value"
        tests:
          - not_null

      - name: forecast_lead_days
        description: "Number of days ahead the forecast was made"
        tests:
          - not_null

      - name: actual_measurement_time
        description: "Date of the actual measurement"
        tests:
          - not_null

      - name: actual_value
        description: "Actual average measurement value on that date"
        tests:
          - not_null

      - name: absolute_error
        description: "Absolute difference: |forecast_avg - actual_value|"
        tests:
          - not_null

      - name: percentage_error
        description: "Percentage error (Nullable if actual_value = 0)"
        tests: []

      - name: mae
        description: "Mean Absolute Error for this station/pollutant"
        tests:
          - not_null

      - name: rmse
        description: "Root Mean Squared Error for this station/pollutant"
        tests:
          - not_null

      - name: forecast_accuracy_score
        description: "Accuracy score 0-100: ≤10% error → 100, ≤20% → 80, ≤30% → 60, ≤50% → 40, else → 20"
        tests:
          - not_null

      - name: accuracy_category
        description: "Accuracy tier: High (≥80), Medium (≥60), Low (≥40), Very Low (<40)"
        tests:
          - not_null
          - accepted_values:
              values: ['High', 'Medium', 'Low', 'Very Low']

  - name: mart_analytics__geographic
    description: "Geographic analytics — city and province level AQI aggregates. Source: mart_air_quality__daily_summary joined with dim_locations."
    columns:
      - name: date
        description: "Date of the aggregate"
        tests:
          - not_null

      - name: province
        description: "Province name"
        tests:
          - not_null

      - name: city
        description: "City name (Nullable for province-level aggregates without city)"
        tests:
          - not_null

      - name: avg_aqi
        description: "Average AQI across all stations in this city/region"
        tests:
          - not_null

      - name: max_aqi
        description: "Maximum AQI across all stations in this city/region"
        tests:
          - not_null

      - name: min_aqi
        description: "Minimum AQI across all stations in this city/region"
        tests:
          - not_null

      - name: station_count
        description: "Number of distinct stations in this city/region"
        tests:
          - not_null

      - name: pollution_level_category
        description: "Human-readable AQI category: Good, Moderate, Unhealthy for Sensitive Groups, Unhealthy, Very Unhealthy, Hazardous"
        tests:
          - not_null

  - name: mart_analytics__trends
    description: "Trend analysis — 7/30/90-day moving averages and WoW/MoM/YoY comparisons per station. Source: mart_air_quality__daily_summary."
    columns:
      - name: unified_station_id
        description: "Station key"
        tests:
          - not_null

      - name: date
        description: "Date of this row"
        tests:
          - not_null

      - name: aqi_value
        description: "Daily average AQI (from mart_air_quality__daily_summary)"
        tests:
          - not_null

      - name: aqi_7d_ma
        description: "7-day moving average of AQI"
        tests:
          - not_null

      - name: aqi_30d_ma
        description: "30-day moving average of AQI"
        tests:
          - not_null

      - name: aqi_90d_ma
        description: "90-day moving average of AQI"
        tests:
          - not_null

      - name: aqi_7d_ago
        description: "AQI value 7 days ago"
        tests:
          - not_null

      - name: aqi_30d_ago
        description: "AQI value 30 days ago"
        tests:
          - not_null

      - name: aqi_365d_ago
        description: "AQI value 365 days ago"
        tests:
          - not_null

      - name: wow_change
        description: "Week-over-week absolute change in AQI (Nullable)"
        tests: []

      - name: mom_change
        description: "Month-over-month absolute change in AQI (Nullable)"
        tests: []

      - name: yoy_change
        description: "Year-over-year absolute change in AQI (Nullable)"
        tests: []

      - name: wow_change_pct
        description: "Week-over-week percentage change (Nullable)"
        tests: []

      - name: mom_change_pct
        description: "Month-over-month percentage change (Nullable)"
        tests: []

      - name: yoy_change_pct
        description: "Year-over-year percentage change (Nullable)"
        tests: []
