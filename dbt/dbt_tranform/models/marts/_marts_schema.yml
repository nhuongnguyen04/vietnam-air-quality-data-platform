version: 2

models:
  - name: fct_hourly_aqi
    description: "Hourly fact table with AggregatingMergeTree; query via fct_hourly_aqi_final"
    config:
      column_name_equivalence:
        datetime_hour: datetime_hour
        station_id: station_id
        pollutant: pollutant
    columns:
      - name: datetime_hour
        description: "Top of hour timestamp (UTC)"
        tests:
          - not_null
      - name: station_id
        description: "Source-prefixed station ID"
        tests:
          - not_null
      - name: pollutant
        description: "Pollutant name"
        tests:
          - not_null

  - name: fct_hourly_aqi_final
    description: "Query layer view for fct_hourly_aqi; exposes normalized_aqi using -Merge functions"
    columns:
      - name: normalized_aqi
        description: "Normalized AQI using EPA canonical breakpoints"
      - name: dominant_pollutant
        description: "Dominant pollutant for this station-hour"
      - name: exceedance_count_150
        description: "Count of readings above AQI 150"
      - name: exceedance_count_200
        description: "Count of readings above AQI 200"

  - name: fct_daily_aqi_summary
    description: "Daily fact summary with AggregatingMergeTree; query via fct_daily_aqi_summary_final"
    columns:
      - name: date
        description: "Date"
        tests:
          - not_null
      - name: station_id
        description: "Station ID"
        tests:
          - not_null

  - name: fct_daily_aqi_summary_final
    description: "Query layer view for fct_daily_aqi_summary"
    columns:
      - name: avg_aqi
        description: "Daily average AQI"
      - name: dominant_pollutant
        description: "Dominant pollutant for the day"

  - name: fact_aqi_alerts
    description: "AQI threshold breach events (normalized_aqi > 150 and > 200)"
    columns:
      - name: station_id
        description: "Station ID"
        tests:
          - not_null
      - name: datetime_hour
        description: "Hour of breach"
        tests:
          - not_null
      - name: threshold_breached
        description: "Threshold breached: '150' or '200'"
      - name: normalized_aqi
        description: "AQI value at breach time"

  - name: fact_aqi_alerts_final
    description: "Query layer view for fact_aqi_alerts"

  - name: dim_locations
    description: "Station dimension: deduped across all sources with sensor_quality_tier"
    columns:
      - name: station_id
        description: "Source-prefixed station ID"
        tests:
          - not_null
          - unique
      - name: source
        description: "Source: aqicn | openweather | sensorscm"
      - name: station_name
        description: "Station name"
      - name: latitude
        description: "Latitude"
      - name: longitude
        description: "Longitude"
      - name: city
        description: "City"
      - name: province
        description: "Province"
      - name: location_type
        description: "Location type"
      - name: sensor_quality_tier
        description: "Sensor quality tier: research | city_centroid | community"
      - name: is_active
        description: "Whether station is active"

  - name: dim_pollutants
    description: "Pollutant dimension: EPA AQI breakpoint data for 6 primary pollutants"
    columns:
      - name: pollutant_key
        description: "Pollutant key (pm25, pm10, o3, no2, co, so2)"
        tests:
          - not_null
          - unique
      - name: epa_aqi_bp_lo
        description: "EPA AQI breakpoint low"
      - name: epa_aqi_bp_hi
        description: "EPA AQI breakpoint high"

  - name: mart_air_quality__dashboard
    description: "Pre-joined dashboard mart: daily AQI + station metadata for Superset"
    columns:
      - name: date
        description: "Date"
      - name: station_id
        description: "Station ID"
      - name: avg_aqi
        description: "Average AQI for the day"
      - name: dominant_pollutant
        description: "Dominant pollutant"

  - name: mart_air_quality__alerts
    description: "Alert view: threshold breach events (wrapper around fact_aqi_alerts_final)"
    columns:
      - name: station_id
        description: "Station ID"
      - name: threshold_breached
        description: "Threshold: '150' or '200'"
