version: 2

models:
  - name: dim_administrative_units
    description: |
      Canonical administrative dimension for Vietnam used across all marts.

      **Grain:** One row per ward_code.

      **Purpose:**
      - Standardize ward/province naming
      - Provide regional rollups (3-region and 8-region schemes)
      - Provide geospatial and demographic context for joins
    columns:
      - name: ward_code
        description: Stable ward identifier used as the primary geographic key.
        tests:
          - not_null
          - unique
      - name: ward_name
        description: Official ward name.
      - name: province
        description: Province containing the ward.
      - name: region_3
        description: Vietnam 3-region classification (North, Central, South).
      - name: region_8
        description: Vietnam 8-region economic/administrative classification.
      - name: latitude
        description: Latitude of the ward centroid.
      - name: longitude
        description: Longitude of the ward centroid.
      - name: population
        description: Projected population for the ward.
      - name: area_km2
        description: Ward land area in square kilometers.

  - name: fct_air_quality_summary_hourly
    description: |
      Source-level hourly AQI fact table before ward/province consolidation.

      **Grain:** One row per (province, ward_code, datetime_hour, source).

      **Purpose:**
      - Pivot pollutant rows into hourly metric columns
      - Preserve source-level values and source weighting
      - Provide base input for ward/province aggregation layers
    columns:
      - name: datetime_hour
        description: UTC hour bucket for the measurement.
      - name: date
        description: Calendar date derived from datetime_hour.
      - name: province
        description: Province of the ward/station.
      - name: ward_code
        description: Ward identifier for geographic rollups.
      - name: region_3
        description: 3-region classification derived from province.
      - name: region_8
        description: 8-region classification derived from province.
      - name: source
        description: Upstream source name (for example aqiin or openweather).
      - name: source_weight
        description: Weight used when blending multiple sources.
      - name: final_aqi_us
        description: Hourly AQI based on US standard for the source record.
      - name: final_aqi_vn
        description: Hourly AQI based on Vietnam standard for the source record.
      - name: pm25_value
        description: Hourly PM2.5 concentration (ug/m3).
      - name: pm10_value
        description: Hourly PM10 concentration (ug/m3).
      - name: co_value
        description: Hourly CO concentration.
      - name: no2_value
        description: Hourly NO2 concentration.
      - name: so2_value
        description: Hourly SO2 concentration.
      - name: o3_value
        description: Hourly O3 concentration.
      - name: pm25_aqi
        description: PM2.5 AQI contribution under Vietnam breakpoint logic.
      - name: pm10_aqi
        description: PM10 AQI contribution under Vietnam breakpoint logic.
      - name: co_aqi
        description: CO AQI contribution under Vietnam breakpoint logic.
      - name: no2_aqi
        description: NO2 AQI contribution under Vietnam breakpoint logic.
      - name: so2_aqi
        description: SO2 AQI contribution under Vietnam breakpoint logic.
      - name: o3_aqi
        description: O3 AQI contribution under Vietnam breakpoint logic.
      - name: dominant_pollutant_us
        description: Pollutant with highest AQI under US standard at this hour.
      - name: dominant_pollutant_vn
        description: Pollutant with highest AQI under Vietnam standard at this hour.
      - name: ingest_time
        description: Latest ingest timestamp among contributing source rows.

  - name: fct_air_quality_ward_level_hourly
    description: |
      Harmonized ward-level hourly air quality by blending source-level records.

      **Grain:** One row per (province, ward_code, datetime_hour).

      **Business rules:**
      - Weighted average using source_weight from hourly summary
      - Main pollutant derived from highest sub-AQI among six criteria pollutants
    columns:
      - name: ward_code
        description: Ward identifier.
        tests:
          - not_null
      - name: datetime_hour
        description: UTC hour bucket.
        tests:
          - not_null
      - name: date
        description: Calendar date corresponding to datetime_hour.
      - name: province
        description: Province containing the ward.
      - name: region_3
        description: 3-region classification.
      - name: region_8
        description: 8-region classification.
      - name: avg_aqi_us
        description: Source-weighted ward AQI under US standard.
      - name: avg_aqi_vn
        description: Source-weighted ward AQI under Vietnam standard.
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500
      - name: pm25_avg
        description: Source-weighted PM2.5 concentration.
      - name: pm10_avg
        description: Source-weighted PM10 concentration.
      - name: co_avg
        description: Source-weighted CO concentration.
      - name: no2_avg
        description: Source-weighted NO2 concentration.
      - name: so2_avg
        description: Source-weighted SO2 concentration.
      - name: o3_avg
        description: Source-weighted O3 concentration.
      - name: pm25_aqi
        description: Source-weighted PM2.5 AQI component.
      - name: pm10_aqi
        description: Source-weighted PM10 AQI component.
      - name: co_aqi
        description: Source-weighted CO AQI component.
      - name: no2_aqi
        description: Source-weighted NO2 AQI component.
      - name: so2_aqi
        description: Source-weighted SO2 AQI component.
      - name: o3_aqi
        description: Source-weighted O3 AQI component.
      - name: main_pollutant
        description: Pollutant contributing the largest AQI component at this hour.
      - name: last_ingested_at
        description: Latest upstream ingest timestamp for the ward-hour record.

