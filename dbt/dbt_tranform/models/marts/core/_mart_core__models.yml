version: 2

models:
  - name: dim_administrative_units
    description: "Centralized dimension table for administrative units in Vietnam."
    columns:
      - name: ward_code
        tests:
          - not_null
          - unique
      - name: ward_name
      - name: province
      - name: region_3
      - name: region_8

  - name: fct_air_quality_ward_level_hourly
    description: "Standardized hourly air quality at ward level."
    columns:
      - name: ward_code
        tests:
          - not_null
      - name: datetime_hour
        tests:
          - not_null
      - name: avg_aqi_vn
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500

  - name: fct_air_quality_ward_level_daily
    description: "Standardized daily air quality at ward level."
    columns:
      - name: ward_code
      - name: date
      - name: avg_aqi_vn

  - name: fct_air_quality_province_level_hourly
    description: "Standardized hourly air quality at province level."
    columns:
      - name: province
      - name: datetime_hour