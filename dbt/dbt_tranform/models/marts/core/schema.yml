version: 2

models:
  - name: fct_hourly_aqi_state
    description: "AggregatingMergeTree — internal storage for hourly AQI aggregates (binary state). NOT for direct SELECT. Use fct_hourly_aqi view instead. Incremental: 2-hour lookback window."
    columns:
      - name: datetime_hour
        description: "Hour-aligned timestamp (toStartOfHour of measurement timestamp)"
        tests:
          - not_null

      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: pollutant
        description: "Pollutant name (standardized)"
        tests:
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality tier from dim_locations lookup"
        tests:
          - not_null

      - name: source
        description: "Data source"
        tests:
          - not_null

  - name: fct_hourly_aqi
    description: "Public view over fct_hourly_aqi_state — reads binary aggregate state via *Merge() functions and exposes readable values."
    columns:
      - name: datetime_hour
        description: "Hour-aligned measurement timestamp"
        tests:
          - not_null

      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: pollutant
        description: "Pollutant name (standardized)"
        tests:
          - not_null

      - name: avg_value
        description: "Average pollutant value across all readings in the hour"
        tests:
          - not_null

      - name: normalized_aqi
        description: "Average AQI value across all readings in the hour. Nullable when no standard pollutants are available."
        tests:
          - not_null:
              config:
                where: "normalized_aqi IS NOT NULL"

      - name: measurement_count
        description: "Number of individual measurements in this hour"
        tests:
          - not_null

      - name: max_value
        description: "Maximum pollutant value in this hour"
        tests:
          - not_null

      - name: min_value
        description: "Minimum pollutant value in this hour"
        tests:
          - not_null

      - name: exceedance_count_150
        description: "Count of measurements with AQI > 150"
        tests:
          - not_null

      - name: exceedance_count_200
        description: "Count of measurements with AQI > 200"
        tests:
          - not_null

      - name: invalid_count
        description: "Count of measurements with quality_flag != 'valid'"
        tests:
          - not_null

      - name: avg_aqi_reported
        description: "Average AQI as reported by the source (Nullable)"
        tests: []

      - name: dominant_pollutant
        description: "Pollutant with the highest AQI value in this hour. Nullable when no standard pollutants are available."
        tests:
          - not_null:
              config:
                where: "normalized_aqi IS NOT NULL"

      - name: sensor_quality_tier
        description: "Sensor quality classification"
        tests:
          - not_null

      - name: source
        description: "Data source"
        tests:
          - not_null

  - name: fct_daily_aqi_summary_state
    description: "AggregatingMergeTree — internal storage for daily AQI aggregates. NOT for direct SELECT. Use fct_daily_aqi_summary view instead. Incremental: 3-day lookback."
    columns:
      - name: date
        description: "Date of the aggregate"
        tests:
          - not_null

      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality tier"
        tests:
          - not_null

      - name: source
        description: "Data source"
        tests:
          - not_null

  - name: fct_daily_aqi_summary
    description: "Public view over fct_daily_aqi_summary_state — reads binary state and returns readable daily aggregates per station."
    columns:
      - name: date
        description: "Date of the daily aggregate"
        tests:
          - not_null

      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: avg_aqi
        description: "Daily average AQI"
        tests:
          - not_null

      - name: avg_value
        description: "Daily average pollutant value (mean of pollutant-level averages)"
        tests:
          - not_null

      - name: min_aqi
        description: "Daily minimum AQI"
        tests:
          - not_null

      - name: max_aqi
        description: "Daily maximum AQI"
        tests:
          - not_null

      - name: hourly_count
        description: "Total hourly readings contributing to this daily aggregate"
        tests:
          - not_null

      - name: exceedance_count_150
        description: "Total hourly readings with AQI > 150"
        tests:
          - not_null

      - name: exceedance_count_200
        description: "Total hourly readings with AQI > 200"
        tests:
          - not_null

      - name: dominant_pollutant
        description: "Pollutant with the highest AQI for most of the day. Nullable when no standard pollutants are available (e.g., sensorscm sensors reporting non-standard data)."
        tests:
          - not_null:
              config:
                where: "avg_aqi > 0"

  - name: fact_aqi_alerts
    description: "Alert records whenever any station/hour/pollutant has normalized AQI > 150 or > 200. Incremental: append-only keyed on station_id || datetime_hour || threshold_breached."
    columns:
      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: datetime_hour
        description: "Hour in which the threshold was breached"
        tests:
          - not_null

      - name: threshold_breached
        description: "AQI threshold breached: '150' or '200'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['150', '200']

      - name: normalized_aqi
        description: "AQI value at the time of breach"
        tests:
          - not_null

      - name: dominant_pollutant
        description: "Pollutant driving the high AQI"
        tests:
          - not_null

      - name: source
        description: "Data source"
        tests:
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality classification"
        tests:
          - not_null

      - name: created_at
        description: "Timestamp when this alert record was created"
        tests:
          - not_null

  - name: fact_aqi_alerts_final
    description: "Public view exposing fact_aqi_alerts — same columns, no transformation."
    columns:
      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: datetime_hour
        description: "Hour in which the threshold was breached"
        tests:
          - not_null

      - name: threshold_breached
        description: "AQI threshold breached: '150' or '200'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['150', '200']

      - name: normalized_aqi
        description: "AQI value at the time of breach"
        tests:
          - not_null

      - name: dominant_pollutant
        description: "Pollutant driving the high AQI"
        tests:
          - not_null

      - name: source
        description: "Data source"
        tests:
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality classification"
        tests:
          - not_null

      - name: created_at
        description: "Timestamp when this alert record was created"
        tests:
          - not_null

  - name: mart_air_quality__hourly
    description: "Public view alias exposing fct_hourly_aqi — same column set, backward compatibility. This view selects all columns directly from fct_hourly_aqi via SELECT *."
    columns:
      - name: datetime_hour
        description: "Hour-aligned measurement timestamp"
        tests:
          - not_null

      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: pollutant
        description: "Pollutant name (standardized)"
        tests:
          - not_null

      - name: avg_value
        description: "Average pollutant value in the hour"
        tests:
          - not_null

      - name: normalized_aqi
        description: "Average AQI in the hour. Nullable when no standard pollutants are available."
        tests:
          - not_null:
              config:
                where: "normalized_aqi IS NOT NULL"

      - name: measurement_count
        description: "Number of measurements in this hour"
        tests:
          - not_null

      - name: max_value
        description: "Maximum pollutant value in this hour"
        tests:
          - not_null

      - name: min_value
        description: "Minimum pollutant value in this hour"
        tests:
          - not_null

      - name: exceedance_count_150
        description: "Count of measurements with AQI > 150"
        tests:
          - not_null

      - name: exceedance_count_200
        description: "Count of measurements with AQI > 200"
        tests:
          - not_null

      - name: invalid_count
        description: "Count of measurements with quality_flag != 'valid'"
        tests:
          - not_null

      - name: avg_aqi_reported
        description: "Average AQI as reported by the source (Nullable)"
        tests: []

      - name: dominant_pollutant
        description: "Dominant pollutant for this hour. Nullable when no standard pollutants are available."
        tests:
          - not_null:
              config:
                where: "normalized_aqi IS NOT NULL"

      - name: sensor_quality_tier
        description: "Sensor quality classification: research | city_centroid | community"
        tests:
          - not_null

      - name: source
        description: "Data source: aqicn | openweather | sensorscm"
        tests:
          - not_null

  - name: mart_air_quality__daily_summary
    description: "Public view alias over fct_daily_aqi_summary — renames station_id to unified_station_id for backward compatibility. Adds source and sensor_quality_tier from fct_hourly_aqi lookup."
    columns:
      - name: date
        description: "Date of the daily aggregate"
        tests:
          - not_null

      - name: unified_station_id
        description: "Station key (unified namespace)"
        tests:
          - not_null

      - name: avg_aqi
        description: "Daily average AQI"
        tests:
          - not_null

      - name: max_aqi
        description: "Daily maximum AQI"
        tests:
          - not_null

      - name: min_aqi
        description: "Daily minimum AQI"
        tests:
          - not_null

      - name: hourly_count
        description: "Number of hourly readings"
        tests:
          - not_null

      - name: exceedance_count_150
        description: "Hourly readings with AQI > 150"
        tests:
          - not_null

      - name: exceedance_count_200
        description: "Hourly readings with AQI > 200"
        tests:
          - not_null

      - name: dominant_pollutant
        description: "Dominant pollutant for this day. Nullable when no standard pollutants are available."
        tests:
          - not_null:
              config:
                where: "avg_aqi > 0"

      - name: sensor_quality_tier
        description: "Sensor quality classification from fct_hourly_aqi lookup: research | city_centroid | community"
        tests:
          - not_null

      - name: source
        description: "Data source: aqicn | openweather | sensorscm"
        tests:
          - not_null

  - name: mart_air_quality__dashboard
    description: "Dashboard view: daily AQI summary with station metadata — joined with dim_locations."
    columns:
      - name: date
        description: "Date of the daily aggregate"
        tests:
          - not_null

      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: station_name
        description: "Human-readable station name"
        tests:
          - not_null

      - name: latitude
        description: "Station latitude (WGS84)"
        tests:
          - not_null

      - name: longitude
        description: "Station longitude (WGS84)"
        tests:
          - not_null

      - name: city
        description: "City name"
        tests:
          - not_null

      - name: province
        description: "Province name"
        tests:
          - not_null

      - name: source
        description: "Data source"
        tests:
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality classification"
        tests:
          - not_null

      - name: avg_aqi
        description: "Daily average AQI"
        tests:
          - not_null

      - name: min_aqi
        description: "Daily minimum AQI"
        tests:
          - not_null

      - name: max_aqi
        description: "Daily maximum AQI"
        tests:
          - not_null

      - name: hourly_count
        description: "Number of hourly readings"
        tests:
          - not_null

      - name: exceedance_count_150
        description: "Hourly readings with AQI > 150"
        tests:
          - not_null

      - name: exceedance_count_200
        description: "Hourly readings with AQI > 200"
        tests:
          - not_null

      - name: dominant_pollutant
        description: "Dominant pollutant for this day. Nullable when no standard pollutants are available."
        tests:
          - not_null:
              config:
                where: "avg_aqi > 0"

  - name: mart_air_quality__stations
    description: "Public view alias over dim_locations — exposes all station metadata."
    columns:
      - name: station_id
        description: "Unified station key"
        tests:
          - unique
          - not_null

      - name: source
        description: "Data source"
        tests:
          - not_null

      - name: station_name
        description: "Human-readable station name"
        tests:
          - not_null

      - name: latitude
        description: "Station latitude (WGS84)"
        tests:
          - not_null

      - name: longitude
        description: "Station longitude (WGS84)"
        tests:
          - not_null

      - name: city
        description: "City name"
        tests:
          - not_null

      - name: province
        description: "Province name"
        tests:
          - not_null

      - name: location_type
        description: "Station type"
        tests:
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality classification"
        tests:
          - not_null

      - name: is_active
        description: "Active status"
        tests:
          - not_null

      - name: first_seen
        description: "First time this station was seen"
        tests:
          - not_null

      - name: last_seen
        description: "Last time this station was seen"
        tests:
          - not_null

  - name: mart_air_quality__alerts
    description: "Public view alias over fact_aqi_alerts_final — same columns."
    columns:
      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: datetime_hour
        description: "Hour in which the threshold was breached"
        tests:
          - not_null

      - name: threshold_breached
        description: "AQI threshold breached: '150' or '200'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['150', '200']

      - name: normalized_aqi
        description: "AQI value at the time of breach"
        tests:
          - not_null

      - name: dominant_pollutant
        description: "Pollutant driving the high AQI"
        tests:
          - not_null

      - name: source
        description: "Data source"
        tests:
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality classification"
        tests:
          - not_null

      - name: created_at
        description: "Timestamp when alert was created"
        tests:
          - not_null