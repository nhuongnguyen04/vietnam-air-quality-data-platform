version: 2

sources:
  - name: aqiin
    description: "AQI.in web scraper — Vietnam air quality dashboard (~540 monitoring stations). Source: httpx widget scraper on aqi.in. D-AQI-02 (Phase 6): Primary air quality source."
    database: air_quality
    schema: air_quality
    tables:
      - name: raw_aqiin_measurements
        description: "Real-time AQI + 6 pollutants scraped from aqi.in Vietnam dashboard"
        columns:
          - name: source
          - name: ingest_time
          - name: ingest_batch_id
          - name: ingest_date
          - name: station_id
          - name: station_name
          - name: province
          - name: timestamp_utc
          - name: parameter
          - name: value
          - name: aqi_reported
          - name: unit
            description: "Unit: µg/m³ for pollutants, ppm for CO, ppb for NO2/O3/SO2, °C for temp, % for humidity"
          - name: quality_flag
            description: "Data quality flag: valid (always 'valid' for AQI.in community sensors)"
          - name: raw_payload

      - name: raw_aqiin_stations
        description: "AQI.in station metadata (station name, province, source URL slug)"
        columns:
          - name: source
          - name: ingest_time
          - name: ingest_batch_id
          - name: ingest_date
          - name: station_id
          - name: station_name
          - name: province
          - name: url
          - name: raw_payload

  - name: openweather
    description: "OpenWeather Air Pollution API — city-centroid air quality data. 62 Vietnam provinces. D-AQI-02 (Phase 6): Secondary air quality source alongside AQI.in."
    database: air_quality
    schema: air_quality
    tables:
      - name: raw_openweather_measurements
        description: "Raw OpenWeather air pollution readings — pm25, pm10, o3, no2, so2, co, nh3, no"
        columns:
          - name: station_id
            description: "Station ID in format openweather:{city}:{lat}:{lon}"
            tests:
              - not_null
          - name: city_name
            description: "City name"
            tests:
              - not_null
          - name: timestamp_utc
            description: "Measurement timestamp in UTC"
            tests:
              - not_null
          - name: parameter
            description: "Pollutant parameter (pm25, pm10, o3, no2, so2, co, nh3, no)"
          - name: value
            description: "Pollutant concentration value"
          - name: aqi_reported
            description: "OpenWeather AQI on 1-5 scale (1=good, 5=very poor)"
          - name: quality_flag
            description: "Data quality flag: valid | implausible"
