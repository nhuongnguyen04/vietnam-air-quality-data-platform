version: 2

models:
  - name: int_unified__measurements
    description: "Unified measurements combining AQICN, OpenWeather, and Sensors.Community with standardized canonical schema"
    columns:
      - name: station_id
        description: "Source-prefixed station ID (AQICN_*, OPENWEATHER_*, SENSORSCM_*)"
        tests:
          - not_null
      - name: timestamp_utc
        description: "Measurement timestamp in UTC"
        tests:
          - not_null
      - name: parameter
        description: "Standardized pollutant name"
        tests:
          - not_null
      - name: value
        description: "Pollutant concentration value"
        tests:
          - not_null
      - name: unit
        description: "Unit of measurement"
      - name: quality_flag
        description: "Data quality flag"
      - name: aqi_reported
        description: "AQI as reported by source (Nullable — Sensors.Community has no AQI)"
      - name: source
        description: "Source: aqicn | openweather | sensorscm"
        tests:
          - accepted_values:
              values: ['aqicn', 'openweather', 'sensorscm']
      - name: ingest_time
        description: "Ingestion timestamp"

  - name: int_unified__stations
    description: "Unified station/location dimension — deduped across 3 sources with sensor_quality_tier"
    columns:
      - name: station_id
        description: "Source-prefixed station ID"
        tests:
          - not_null
      - name: source
        description: "Source: aqicn | openweather | sensorscm"
        tests:
          - accepted_values:
              values: ['aqicn', 'openweather', 'sensorscm']
      - name: station_name
        description: "Station name"
      - name: latitude
        description: "Latitude"
      - name: longitude
        description: "Longitude"
      - name: province
        description: "Province"
      - name: city
        description: "City"
      - name: location_type
        description: "Location type: KTTV, KCN, Chi cục BVMT, city_centroid, Other"
      - name: sensor_quality_tier
        description: "Sensor quality tier: research (AQICN) | city_centroid (OpenWeather) | community (Sensors.Community)"
      - name: is_active
        description: "Whether station is active"
      - name: first_seen
        description: "First seen timestamp"
      - name: last_seen
        description: "Last seen timestamp"

  - name: int_aqi_calculations
    description: "AQI calculations based on US EPA canonical formula with dominant pollutant identification"
    columns:
      - name: source
        description: "Source system"
      - name: station_id
        description: "Source-prefixed station ID"
        tests:
          - not_null
      - name: timestamp_utc
        description: "Measurement timestamp in UTC"
        tests:
          - not_null
      - name: parameter
        description: "Standardized pollutant name"
        tests:
          - not_null
      - name: value
        description: "Pollutant concentration value"
      - name: unit
        description: "Unit of measurement"
      - name: quality_flag
        description: "Data quality flag"
      - name: aqi_value
        description: "Calculated AQI value using EPA breakpoints"
      - name: aqi_category
        description: "AQI category (Good, Moderate, Unhealthy for Sensitive Groups, Unhealthy, Very Unhealthy, Hazardous)"
      - name: is_dominant_pollutant
        description: "Flag indicating if this is the dominant pollutant for the station-hour"
      - name: aqi_calculation_method
        description: "Calculation method: 'epa_canonical'"
      - name: ingest_time
        description: "Ingestion timestamp"

  - name: int_forecast_accuracy
    description: "Forecast accuracy metrics comparing AQICN forecasts with actual measurements"
    columns:
      - name: station_id
        description: "Station ID"
        tests:
          - not_null
      - name: pollutant
        description: "Pollutant name"
        tests:
          - not_null
      - name: forecast_date
        description: "Forecast date"
        tests:
          - not_null
      - name: absolute_error
        description: "Absolute error between forecast and actual"
      - name: mae
        description: "Mean Absolute Error"
      - name: rmse
        description: "Root Mean Square Error"

  - name: int_data_quality
    description: "Data quality metrics including missing data rates, freshness, and outlier detection"
    columns:
      - name: unified_station_id
        description: "Station ID"
        tests:
          - not_null
      - name: measurement_date
        description: "Measurement date"
        tests:
          - not_null
      - name: missing_data_rate
        description: "Percentage of missing data"
      - name: data_freshness_hours
        description: "Hours since last measurement"
      - name: overall_data_quality_score
        description: "Overall data quality score"
