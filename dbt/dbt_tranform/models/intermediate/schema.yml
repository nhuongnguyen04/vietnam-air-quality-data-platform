version: 2

models:
  - name: int_unified__measurements
    description: >
      D-AQI-02 (Phase 6): Unified measurement layer — UNION ALL of AQI.in (~540 stations)
      and OpenWeather (62 Vietnam provinces). Standardized column names and pollutant names.
      AQI values and calibration factors applied in int_aqi_calculations.
    columns:
      - name: station_id
        description: "Station key: AQIIN_{slug} or openweather:{city}:{lat}:{lon}"
        tests:
          - not_null

      - name: timestamp_utc
        description: "Measurement timestamp in UTC"
        tests:
          - not_null

      - name: parameter
        description: "Standardized pollutant name: pm25, pm10, co, o3, no2, so2, temp, hum"
        tests:
          - not_null

      - name: value
        description: "Pollutant concentration value in source unit"
        tests:
          - not_null

      - name: unit
        description: "Unit of measurement: µg/m³ for PM, ppb for O3/NO2/SO2, ppm for CO, °C for temp, % for hum"
        tests:
          - not_null

      - name: quality_flag
        description: "Data quality flag: valid (always 'valid' for AQI.in; valid|implausible for OpenWeather)"
        tests:
          - not_null

      - name: aqi_reported
        description: "AQI as reported by the source (UInt16 from AQI.in; Nullable from OpenWeather)"
        tests: []

      - name: source
        description: "Data source: aqiin or openweather (D-AQI-02: Phase 6)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['aqiin', 'openweather']

      - name: ingest_time
        description: "Timestamp when the record was ingested"
        tests:
          - not_null

  - name: int_unified__stations
    description: >
      D-AQI-02 (Phase 6): Unified station metadata — UNION ALL of AQI.in (~540 stations)
      and OpenWeather (62 provinces). Aggregated first_seen/last_seen timestamps.
    columns:
      - name: station_id
        description: "Unified station key: AQIIN_{slug} or openweather:{city}:{lat}:{lon}"
        tests:
          - not_null

      - name: source
        description: "Data source: aqiin or openweather (D-AQI-02: Phase 6)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['aqiin', 'openweather']

      - name: station_name
        description: "Human-readable station name"
        tests:
          - not_null

      - name: latitude
        description: "Station latitude (WGS84) — empty string for AQI.in (not available)"
        tests: []

      - name: longitude
        description: "Station longitude (WGS84) — empty string for AQI.in (not available)"
        tests: []

      - name: province
        description: "Province name"
        tests:
          - not_null

      - name: city
        description: "City name (same as province for AQI.in)"
        tests:
          - not_null

      - name: location_type
        description: "Station type: community (AQI.in) or city_centroid (OpenWeather)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['community', 'city_centroid']

      - name: sensor_quality_tier
        description: "Sensor quality tier: community (AQI.in) or city_centroid (OpenWeather)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['community', 'city_centroid']

      - name: is_active
        description: "Whether the station is currently active — always true"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true]

      - name: first_seen
        description: "Earliest ingest_time for this station"
        tests:
          - not_null

      - name: last_seen
        description: "Latest ingest_time for this station"
        tests:
          - not_null

  - name: int_aqi_calculations
    description: >
      D-AQI-02 (Phase 6): AQI calculations using EPA piecewise breakpoint formula —
      applied per pollutant. Calibration factor from stg_source_calibration is applied
      before AQI computation. Max AQI across pollutants per station/hour is the dominant AQI.
    columns:
      - name: source
        description: "Data source: aqiin or openweather"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['aqiin', 'openweather']

      - name: station_id
        description: "Station key"
        tests:
          - not_null

      - name: timestamp_utc
        description: "Measurement timestamp in UTC"
        tests:
          - not_null

      - name: parameter
        description: "Pollutant name (standardized)"
        tests:
          - not_null

      - name: value
        description: "Original measurement value (before calibration)"
        tests:
          - not_null

      - name: unit
        description: "Unit of measurement"
        tests:
          - not_null

      - name: quality_flag
        description: "Data quality flag"
        tests:
          - not_null

      - name: aqi_reported
        description: "AQI as reported by the source (Nullable)"
        tests: []

      - name: aqi_value
        description: "Calculated AQI using EPA piecewise formula (Nullable — null if no matching pollutant breakpoints)"
        tests: []

      - name: aqi_category
        description: "AQI category derived from aqi_value: Good, Moderate, Unhealthy for Sensitive Groups, Unhealthy, Very Unhealthy, Hazardous, Unknown."
        tests:
          - not_null:
              config:
                where: "parameter IN ('pm25', 'pm10', 'o3', 'no2', 'so2', 'co')"

      - name: is_dominant_pollutant
        description: "True if this pollutant has the maximum AQI in the hour (the dominant pollutant)"
        tests:
          - not_null

      - name: aqi_calculation_method
        description: "Method used: epa_piecewise"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['epa_piecewise']

      - name: ingest_time
        description: "Timestamp when the record was ingested"
        tests:
          - not_null

  - name: int_daily_actuals__aqicn
    description: >
      D-AQI-02 (Phase 6): Daily aggregated actuals from unified source (AQI.in + OpenWeather).
      Pre-materialized to avoid ClickHouse correlated subquery limitation in JOINs.
      Joins on: station_id + pollutant + measurement_date.
    columns:
      - name: station_id
        description: "Station key (AQIIN_* or openweather:*)"
        tests:
          - not_null

      - name: pollutant
        description: "Standardized pollutant name"
        tests:
          - not_null

      - name: measurement_date
        description: "Date of the measurement"
        tests:
          - not_null

      - name: avg_value
        description: "Average of all measurements for this pollutant on this date"
        tests:
          - not_null

      - name: max_value
        description: "Maximum measurement value for this pollutant on this date"
        tests:
          - not_null

      - name: min_value
        description: "Minimum measurement value for this pollutant on this date"
        tests:
          - not_null

      - name: reading_count
        description: "Number of individual measurements contributing to this daily aggregate"
        tests:
          - not_null

  - name: int_data_quality
    description: >
      D-AQI-02 (Phase 6): Data quality metrics per station per day —
      missing data rate, freshness score, outlier detection. Derived from int_unified__measurements.
    columns:
      - name: unified_station_id
        description: "Unified station key"
        tests:
          - not_null

      - name: source
        description: "Source: aqiin or openweather"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['aqiin', 'openweather']

      - name: measurement_date
        description: "Date of the measurement period"
        tests:
          - not_null

      - name: total_measurements
        description: "Total number of measurements expected"
        tests:
          - not_null

      - name: non_null_measurements
        description: "Number of measurements with non-null values"
        tests:
          - not_null

      - name: missing_measurements
        description: "Number of missing/null measurements"
        tests:
          - not_null

      - name: missing_data_rate
        description: "Percentage of missing data (0-100)"
        tests:
          - not_null

      - name: unique_pollutants
        description: "Count of distinct pollutants measured"
        tests:
          - not_null

      - name: earliest_measurement
        description: "Timestamp of the earliest measurement"
        tests:
          - not_null

      - name: latest_measurement
        description: "Timestamp of the latest measurement"
        tests:
          - not_null

      - name: data_freshness_hours
        description: "Hours since the latest measurement"
        tests:
          - not_null

      - name: freshness_score
        description: "Score (20-100) based on data freshness: ≤2h=100, ≤6h=80, ≤24h=60, ≤48h=40, else=20"
        tests:
          - not_null

      - name: overall_data_quality_score
        description: "Weighted composite score: 60 + freshness_score * 0.4"
        tests:
          - not_null

      - name: is_outlier
        description: "True if data_freshness_hours > 48 OR missing_data_rate > 50"
        tests:
          - not_null

  - name: int_forecast_accuracy
    description: >
      D-AQI-02 (Phase 6) + D-01 (Phase 01.1): Forecast ingestion removed.
      This model returns empty — kept as schema placeholder.
      Dashboard Forecast → Historical Trend (uses int_unified__measurements actuals).
    columns:
      - name: station_id
        description: "Station key (always NULL — model is inactive)"
        tests: []
      - name: pollutant
        description: "Pollutant (always NULL — model is inactive)"
        tests: []
      - name: forecast_date
        description: "Forecast date (always NULL)"
        tests: []
      - name: forecast_measurement_time
        description: "Measurement datetime (always NULL)"
        tests: []
      - name: forecast_avg
        description: "Average forecast value (always NULL)"
        tests: []
      - name: forecast_max
        description: "Max forecast value (always NULL)"
        tests: []
      - name: forecast_min
        description: "Min forecast value (always NULL)"
        tests: []
      - name: forecast_lead_days
        description: "Lead days (always NULL)"
        tests: []
      - name: actual_measurement_time
        description: "Actual measurement time (always NULL)"
        tests: []
      - name: actual_value
        description: "Actual value (always NULL)"
        tests: []
      - name: absolute_error
        description: "Absolute error (always NULL)"
        tests: []
      - name: percentage_error
        description: "Percentage error (always NULL)"
        tests: []
      - name: mae
        description: "MAE (always NULL)"
        tests: []
      - name: rmse
        description: "RMSE (always NULL)"
        tests: []
      - name: forecast_accuracy_score
        description: "Accuracy score (always NULL)"
        tests: []