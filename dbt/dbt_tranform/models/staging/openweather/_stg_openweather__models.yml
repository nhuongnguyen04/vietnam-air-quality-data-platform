version: 2

models:
  - name: stg_openweather__measurements
    description: |
      Deduplicated air pollution measurements from OpenWeather Air Pollution API.

      **Grain:** One row per (ward_code, timestamp_utc, parameter) — deduplicated to the latest ingest.

      **Business Rules:**
      - OpenWeather provides air pollution data mapped to specific ward_codes.
      - quality_flag is hardcoded to 'valid' since OpenWeather API provides quality-checked data.
      - Only air quality parameters retained: co, no2, o3, pm25, pm10, so2.

      **Source:** OpenWeather Air Pollution API (https://openweathermap.org/api/air-pollution)
      **Coverage:** All configured wards in Vietnam.
    columns:
      - name: source
        description: |
          Source identifier. Always 'openweather' for records from this model.
      - name: ward_code
        description: |
          Standardized ward code for the measurement point.
        tests:
          - not_null
      - name: ward_name
        description: |
          Name of the ward/commune.
      - name: province
        description: |
          Province name.
        tests:
          - not_null
      - name: timestamp_utc
        description: |
          UTC timestamp of the OpenWeather forecast or actual reading.
        tests:
          - not_null
      - name: parameter
        description: |
          Pollutant code from OpenWeather Air Pollution API.
          Values: co, no2, o3, pm25, pm10, so2, no, nh3.
        tests:
          - not_null
          - accepted_values:
              values: ['co', 'no2', 'o3', 'pm10', 'pm25', 'so2', 'no', 'nh3']
      - name: value
        description: |
          Concentration value in µg/m³.
        tests:
          - not_null
      - name: aqi_reported
        description: |
          AQI value as computed and returned by OpenWeather API (scale 1-5).
        meta:
          openmetadata:
            glossary:
              - AirQuality.AQI
      - name: quality_flag
        description: |
          Data quality flag. Hardcoded to 'valid'.
      - name: ingest_time
        description: |
          Timestamp when the record was written to ClickHouse.

        tags:
          - NonSensitive
    meta:
      openmetadata:
        tier: Tier.Tier3
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Bronze
  - name: stg_openweather__meteorology
    description: |
      Deduplicated meteorological measurements from OpenWeather Weather API.

      **Grain:** One row per (ward_code, timestamp_utc) — deduplicated to the latest ingest per ward per hour.

      **Business Rules:**
      - Timestamps rounded to the start of the hour (toStartOfHour).
      - Raw weather is ingested once per OpenWeather cluster/city.
      - Each ward is assigned to a cluster using the same 0.2-degree grid logic as ingestion.
      - Downstream models can join directly on `(ward_code, timestamp_utc)`.

      **Source:** OpenWeather Current Weather API
    columns:
      - name: source
        description: |
          Source identifier. Always 'openweather' for this model.
      - name: ward_code
        description: |
          Unique identifier for the administrative ward receiving the cluster weather assignment.
        tests:
          - not_null
      - name: ward_name
        description: |
          Human-readable ward name.
      - name: province
        description: |
          Province name.
        tests:
          - not_null
      - name: latitude
        description: |
          Latitude of the measurement point.
      - name: longitude
        description: |
          Longitude of the ward centroid used for weather assignment.
      - name: timestamp_utc
        description: |
          UTC timestamp rounded to the start of the hour.
        tests:
          - not_null
      - name: temp
        description: |
          Temperature in Celsius.
        tests:
          - not_null
          - range:
              min_value: -10
              max_value: 60
      - name: temp_min
        description: |
          Minimum temperature at the moment of measurement.
      - name: temp_max
        description: |
          Maximum temperature at the moment of measurement.
      - name: feels_like
        description: |
          Physically felt temperature in Celsius.
      - name: humidity
        description: |
          Relative humidity percentage (0–100).
        tests:
          - range:
              min_value: 0
              max_value: 100
      - name: pressure
        description: |
          Atmospheric pressure in hPa.
      - name: visibility_meters
        description: |
          Visibility in meters.
      - name: wind_speed
        description: |
          Wind speed in meters per second.
      - name: wind_deg
        description: |
          Wind direction in degrees.
      - name: clouds_all
        description: |
          Cloudiness percentage.
      - name: ingest_time
        description: |
          Timestamp when the record was written to ClickHouse.
        tags:
          - NonSensitive
      - name: dbt_updated_at
        description: |
          Timestamp when dbt last processed this record.
          Added by dbt for audit purposes.
        tags:
          - NonSensitive
    meta:
      openmetadata:
        tier: Tier.Tier3
        domain: AirQuality
        owners:
          - air-quality-team
        tags:
          - Certification.Bronze
