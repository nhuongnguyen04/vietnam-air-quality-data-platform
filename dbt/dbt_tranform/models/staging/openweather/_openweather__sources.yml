version: 2

sources:
  - name: openweather
    description: "OpenWeather Air Pollution API — Secondary air quality source."
    database: air_quality
    schema: air_quality
    tables:
      - name: raw_openweather_measurements
        description: "Raw OpenWeather air pollution readings"
      - name: raw_openweather_meteorology
        description: "Raw OpenWeather weather readings (Temp, Wind, Hum)"

  - name: tomtom
    description: "TomTom Traffic API — Congestion and speed data."
    database: air_quality
    schema: air_quality
    tables:
      - name: raw_tomtom_traffic
        description: "Raw TomTom traffic flow readings (3rd-hourly samples)"
      - name: raw_tomtom_traffic_hourly
        description: "Calculated 1-hourly traffic (Python-interpolated)"
