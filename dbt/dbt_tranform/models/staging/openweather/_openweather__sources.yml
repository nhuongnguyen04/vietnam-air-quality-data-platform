version: 2

sources:
  - name: openweather
    description: |
      OpenWeather data products — Air Pollution API (measurements) and Weather API (meteorology).

      **Data Sources:**
      - Air Pollution API: https://openweathermap.org/api/air-pollution (forecast + history)
      - Weather API: https://openweathermap.org/current (current conditions + 5-day/3-hour forecast)

      **Coverage:** 62 Vietnam provinces (city-level centroids from OpenWeather city database)

      **Ingestion:** Python job `python_jobs/jobs/openweather/ingest_measurements.py`
      **Update Frequency:** Every 15 minutes (hourly forecast refreshed; historical updated daily)

      **Granularity:**
      - Province-level (city centroid), NOT station-level
      - Meteorological data has no station-level granularity from OpenWeather
      - District-level detail comes from AQI.in or TomTom only

      **Authentication:** Requires `OPENWEATHER_API_TOKEN` environment variable

      **Rate Limits:**
      - Air Pollution: 60 requests/minute (rate limiter enforced in ingestion job)
      - Weather: 60 requests/minute
      - Free tier: 1,000,000 calls/month

      **Caveats:**
      - OpenWeather coordinates are city centroids, not province geographic centers
      - Province naming may differ from internal conventions (e.g., "Hanoi" vs "Ha Noi")
      - Air Pollution and Weather APIs are separate — joined on province and timestamp
    database: air_quality
    schema: air_quality
    tables:
      - name: raw_openweather_measurements
        description: |
          Air pollution measurements from OpenWeather Air Pollution API (current + forecast + history).

          **Grain:** One row per (ward_code, timestamp_utc, parameter) per ingest run.

          **Data Types:**
          - Current: real-time pollution readings
          - Forecast: hourly forecasts up to 4 days ahead
          - History: historical actual readings (updated daily)

          **Parameters:** co (µg/m³), no2 (µg/m³), o3 (µg/m³), pm25 (µg/m³), pm10 (µg/m³), so2 (µg/m³)

          **Caveats:**
          - Historical data ingestion may lag by 24–48 hours
          - Forecast data in this table is predictive, not actual measurements

          **Freshness:**
          - warn_after: 12 hours
          - error_after: 24 hours
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: raw_loaded_at

        meta:
          openmetadata:
            tier: Tier.Tier3
            domain: AirQuality
            owners:
              - air-quality-team
            tags:
              - Certification.Bronze
        columns:
          - name: source
            description: "Source identifier. Always 'openweather'."
          - name: ingest_time
            description: "Upstream OpenWeather batch timestamp carried in the CSV payload."
            tags:
              - NonSensitive
          - name: raw_loaded_at
            description: "Warehouse load timestamp set when the sync job inserted the row into ClickHouse."
            tags:
              - NonSensitive
          - name: raw_sync_run_id
            description: "Identifier of the Google Drive sync batch that loaded the row into ClickHouse raw."
          - name: raw_sync_started_at
            description: "Batch-level sync start timestamp for the Google Drive sync run that inserted the row."
            tags:
              - NonSensitive
          - name: raw_source_file_name
            description: "Google Drive CSV filename used to load the row into the raw table."
          - name: raw_source_file_id
            description: "Google Drive file identifier used to load the row into the raw table."
          - name: ingest_batch_id
            description: "Unique identifier for the ingestion batch run."
          - name: ingest_date
            description: "Materialized date of ingestion for partitioning."
          - name: ward_code
            description: "Vietnam administrative ward code."
            tests:
              - not_null
          - name: ward_name
            description: "Ward name from geocoding metadata."
          - name: province_name
            description: "Province name from geocoding metadata."
          - name: latitude
            description: "Latitude of the ward centroid."
          - name: longitude
            description: "Longitude of the ward centroid."
          - name: timestamp_utc
            description: "Observation timestamp (rounded to hour)."
            tests:
              - not_null
          - name: parameter
            description: "Pollutant code (pm25, pm10, co, no2, o3, so2)."
            meta:
              openmetadata:
                glossary: ["AirQuality.PM25", "AirQuality.PM10", "AirQuality.CO", "AirQuality.NO2", "AirQuality.Ozone", "AirQuality.SO2"]
          - name: value
            description: "Pollutant concentration in µg/m³."
          - name: aqi_reported
            description: "AQI reported by OpenWeather (standard index)."
            meta:
              openmetadata:
                glossary:
                  - AirQuality.AQI
          - name: quality_flag
            description: "Data quality indicator ('valid', etc)."
          - name: raw_payload
            description: "Serialized raw API response."
      - name: raw_openweather_meteorology
        description: |
          Meteorological measurements from OpenWeather Weather API (current + forecast).

          **Grain:** One row per (weather_cluster, timestamp_utc) per ingest run.

          **Data Types:**
          - Current: real-time weather observations
          - Forecast: 5-day/3-hour forecast

          **Fields:** temp (°C), feels_like, humidity (%), pressure (hPa), wind_speed (m/s), wind_deg (°), clouds_all (%)

          **Caveats:**
          - Timestamp is rounded to 3-hour intervals for forecast data
          - Current weather is stored at cluster/city granularity, not ward granularity
          - Ward-level expansion is handled in dbt using the same spatial grid logic as ingestion

          **Freshness:**
          - warn_after: 6 hours
          - error_after: 12 hours
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 12, period: hour}
        loaded_at_field: raw_loaded_at
        meta:
          openmetadata:
            tier: Tier.Tier3
            domain: AirQuality
            owners:
              - air-quality-team
            tags:
              - Certification.Bronze
        columns:
          - name: source
            description: "Source identifier. Always 'openweather'."
          - name: ingest_time
            description: "Upstream OpenWeather batch timestamp carried in the CSV payload."
            tags:
              - NonSensitive
          - name: raw_loaded_at
            description: "Warehouse load timestamp set when the sync job inserted the row into ClickHouse."
            tags:
              - NonSensitive
          - name: raw_sync_run_id
            description: "Identifier of the Google Drive sync batch that loaded the row into ClickHouse raw."
          - name: raw_sync_started_at
            description: "Batch-level sync start timestamp for the Google Drive sync run that inserted the row."
            tags:
              - NonSensitive
          - name: raw_source_file_name
            description: "Google Drive CSV filename used to load the row into the raw table."
          - name: raw_source_file_id
            description: "Google Drive file identifier used to load the row into the raw table."
          - name: ingest_batch_id
            description: "Unique identifier for the ingestion batch run."
          - name: ingest_date
            description: "Materialized date of ingestion for partitioning."
          - name: province_name
            description: "Province name."
          - name: weather_cluster
            description: "Unique identifier for the spatial weather grid cell."
          - name: cluster_lat
            description: "Latitude of the grid cell centroid."
          - name: cluster_lon
            description: "Longitude of the grid cell centroid."
          - name: timestamp_utc
            description: "Observation timestamp."
            tests:
              - not_null
          - name: temp
            description: "Temperature in Celsius."
          - name: feels_like
            description: "Apparent temperature in Celsius."
          - name: temp_min
            description: "Minimum observed temperature in the hour."
          - name: temp_max
            description: "Maximum observed temperature in the hour."
          - name: pressure
            description: "Atmospheric pressure in hPa."
          - name: humidity
            description: "Relative humidity percentage."
          - name: visibility
            description: "Visibility distance in meters."
          - name: wind_speed
            description: "Wind speed in m/s."
          - name: wind_deg
            description: "Wind direction in degrees."
          - name: clouds_all
            description: "Cloud cover percentage."
          - name: raw_payload
            description: "Serialized raw API response."
