version: 2

models:
  - name: stg_aqiin__measurements
    description: >
      Staged AQI.in air quality measurements for Vietnam.
      Cleans duplicate rows, normalizes parameter names (pm25, pm10, co, so2, no2, o3, temp, hum).
      Each row represents one pollutant reading at one timestamp.
    config:
      tags: ["source:aqiin", "layer:staging"]

    columns:
      - name: source
        description: Data source identifier (always 'aqiin')
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['aqiin']

      - name: station_id
        description: >
          Unique station identifier from aqi.in URL slug.
          Format: province/location (e.g. 'ha-noi/hanoi', 'bac-ninh/bac-ninh')
        tests:
          - not_null
          - unique:
              name: unique_aqiin_station_timestamp_parameter
              config:
                where: "parameter_clean IN ('pm25', 'pm10', 'co')"

      - name: station_name
        description: Human-readable station name
        tests:
          - not_null

      - name: province
        description: Raw province name from URL

      - name: province_clean
        description: Normalized province name (without '-province' suffix)
        tests:
          - not_null

      - name: timestamp_utc
        description: Measurement timestamp in UTC
        tests:
          - not_null

      - name: measurement_date
        description: Date portion of measurement timestamp
        tests:
          - not_null

      - name: parameter_clean
        description: >
          Normalized pollutant parameter. Values: pm25, pm10, co, so2, no2, o3, temp, hum
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pm25', 'pm10', 'co', 'so2', 'no2', 'o3', 'temp', 'hum']

      - name: value
        description: Measurement value
        tests:
          - not_null

      - name: aqi_reported
        description: AQI value as reported by aqi.in for this reading

      - name: unit
        description: "Unit of measurement: µg/m³ for pollutants, ppm for CO, ppb for NO2/O3/SO2/NH3, °C for temp, % for humidity"

      - name: quality_flag
        description: "Data quality flag: valid (always 'valid' for AQI.in community sensors — D-AQI-01)"

      - name: raw_payload
        description: Raw JSON payload from source for debugging

      - name: ingest_time
        description: When this record was ingested into ClickHouse
        tests:
          - not_null

      - name: ingest_batch_id
        description: Unique batch identifier for this ingestion run

  - name: stg_aqiin__stations
    description: >
      Deduplicated AQI.in station metadata.
      Each station has one row with latest known name, coordinates, and source URL.
    config:
      tags: ["source:aqiin", "layer:staging"]

    columns:
      - name: station_id
        description: Unique station identifier (URL slug)
        tests:
          - not_null
          - unique

      - name: station_name
        description: Human-readable station name
        tests:
          - not_null

      - name: province
        description: Province name from URL slug

      - name: province_clean
        description: Normalized province name

      - name: latitude
        description: Station latitude (if available)

      - name: longitude
        description: Station longitude (if available)

      - name: last_ingest_time
        description: When this station was last updated

      - name: total_ingestions
        description: Total number of times this station has been updated

      - name: source_url
        description: Direct URL to this station's dashboard on aqi.in

  - name: stg_openweather__measurements
    description: "Staged OpenWeather Air Pollution measurements — unit-converted to EPA standard units. Station IDs use raw format: openweather:{city}:{lat}:{lon}."
    columns:
      - name: source
        description: "Data source identifier, always 'openweather'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['openweather']

      - name: station_id
        description: "Station key in format openweather:{city}:{lat}:{lon}"
        tests:
          - not_null

      - name: station_name
        description: "City name used as station name for display"
        tests:
          - not_null

      - name: city
        description: "City name (same as station_name for OpenWeather)"
        tests:
          - not_null

      - name: province
        description: "Province name (same as station_name/city)"
        tests:
          - not_null

      - name: latitude
        description: "City centroid latitude"
        tests:
          - not_null

      - name: longitude
        description: "City centroid longitude"
        tests:
          - not_null

      - name: timestamp_utc
        description: "Measurement timestamp in UTC"
        tests:
          - not_null

      - name: parameter
        description: "Standardized pollutant name: pm25, pm10, o3, no2, so2, co, nh3, no"
        tests:
          - not_null

      - name: value
        description: "Pollutant concentration value, converted to EPA standard units (µg/m³ or ppb or ppm)"
        tests:
          - not_null

      - name: unit
        description: "Unit of measurement: µg/m³ for PM, ppb for O3/NO2/SO2/NH3/NO, ppm for CO"
        tests:
          - not_null

      - name: quality_flag
        description: "Data quality flag: valid or implausible"
        tests:
          - not_null

      - name: aqi_reported
        description: "OpenWeather AQI on 1-5 scale (Nullable). Nullable is valid."
        tests: []

      - name: ingest_time
        description: "Timestamp when the record was ingested"
        tests:
          - not_null

      - name: raw_payload
        description: "Full raw JSON payload from OpenWeather API"
        tests:
          - not_null

      - name: city_name
        description: "City name (alias for station_name for downstream compatibility)"
        tests:
          - not_null

  - name: stg_pollutants__parameters
    description: "Staged pollutant reference data from EPA AQI breakpoint table (pollutants.csv seed). Used for AQI calculation and display in dashboards."
    columns:
      - name: pollutant_key
        description: "Standardized pollutant identifier: pm25, pm10, o3, no2, so2, co"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pm25', 'pm10', 'o3', 'no2', 'so2', 'co']

      - name: display_name
        description: "Human-readable pollutant name"
        tests:
          - not_null

      - name: unit
        description: "EPA standard unit for this pollutant"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['µg/m³', 'ppb', 'ppm']

      - name: epa_aqi_bp_lo
        description: "EPA AQI breakpoint lower bound"
        tests:
          - not_null

      - name: epa_aqi_bp_hi
        description: "EPA AQI breakpoint upper bound"
        tests:
          - not_null

      - name: conc_bp_lo
        description: "Concentration breakpoint lower bound"
        tests:
          - not_null

      - name: conc_bp_hi
        description: "Concentration breakpoint upper bound"
        tests:
          - not_null

      - name: health_effects
        description: "Health advisory text for this AQI range"
        tests:
          - not_null

  - name: stg_source_calibration
    description: "Staged source calibration factors for AQI computation. openweather grid-model values are calibrated vs AQICN ground truth."
    columns:
      - name: source
        description: "Data source: aqicn, openweather, sensorscm"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['aqicn', 'openweather', 'sensorscm']

      - name: parameter
        description: "Pollutant key this calibration applies to"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['pm25', 'pm10', 'o3', 'no2', 'so2', 'co']

      - name: calibration_factor
        description: "Multiplicative correction factor applied before AQI calculation"
        tests:
          - not_null

      - name: calibration_method
        description: "Method used to derive the calibration factor"
        tests:
          - not_null

      - name: notes
        description: "Free-text notes about the calibration"
        tests:
          - not_null
