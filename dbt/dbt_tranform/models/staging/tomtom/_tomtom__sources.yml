version: 2

sources:
  - name: tomtom
    description: |
      TomTom Traffic API — real-time and historical traffic congestion data.

      **Data Source:** TomTom Traffic API (https://developer.tomtom.com/traffic-api)
      **Coverage:** Major urban areas in Vietnam — Hanoi, Ho Chi Minh City, Da Nang, Hai Phong, Can Tho
      **Ingestion:** Python job with TomTom Search API for geocoding station metadata
      **Update Frequency:** Hourly aggregation from TomTom real-time traffic flow endpoints

      **Station Naming Convention:** Same as AQI.in — "Ward, District, Province, Vietnam"

      **Data Provided:**
      - Real-time traffic flow: congestion index at specific locations
      - Historical traffic: aggregated hourly averages
      - Geocoding: lat/lon for each monitoring location (via TomTom Search API)

      **Authentication:** Requires TomTom API key (TOMTOM_API_KEY environment variable)

      **Caveats:**
      - Coverage limited to major cities — rural provinces have no traffic data
      - Traffic data represents TomTom user population, not all vehicles on the road
      - TomTom does not provide PM2.5 or other pollutant data — correlation with air quality is analytical, not direct
    database: air_quality
    schema: air_quality
    tables:
      - name: raw_tomtom_traffic_hourly
        description: |
          Hourly aggregated traffic congestion data from TomTom.

          **Grain:** One row per (station_name, hour_utc) — aggregated from raw TomTom flow API responses.

          **Aggregation Method:**
          - Raw data: real-time congestion at 5-minute intervals
          - Aggregation: hourly average of congestion_ratio values
          - Quality flag: set based on completeness of hourly data

          **Fields:**
          - station_name: location identifier (geocoded from TomTom Search API)
          - hour_utc: start of the hour being measured
          - congestion_ratio: average congestion for this hour
          - data_quality_flag: 'complete' (full hour), 'partial' (>50% coverage), 'sparse' (<50%)

          **Freshness:**
          - warn_after: 6 hours
          - error_after: 12 hours
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 12, period: hour}
        loaded_at_field: updated_at
        columns:
          - name: station_name
            description: |
              Traffic monitoring location name.
              Format: "Ward, District, Province, Vietnam"
              Geocoded via TomTom Search API to derive lat/lon.
            tests:
              - not_null
          - name: hour_utc
            description: |
              UTC timestamp for the start of the hour (e.g., 2026-04-13 10:00:00).
              Represents the measurement window for this aggregation period.
            tests:
              - not_null
          - name: congestion_ratio
            description: |
              Average traffic congestion ratio for this hour.
              Formula: (current travel time - free flow travel time) / free flow travel time
              - 0.00 = free flow
              - 0.50 = 50% longer than free flow
              - 1.00 = 100% longer (doubled)
              Source: TomTom Traffic Flow API
            tests:
              - not_null
          - name: updated_at
            description: |
              Timestamp when this hourly aggregation was computed and written.
              Used for freshness monitoring and deduplication.
      - name: raw_tomtom_traffic
        description: |
          Ward-centric traffic flow data from TomTom.

          **Grain:** One row per (ward_code, timestamp_utc, traffic_source) per ingest run.

          **Fields:**
          - source: always 'tomtom'
          - traffic_source: 'api', 'interpolated', or 'offpeak_model'
          - ward_code / ward_name / province_name: administrative location metadata
          - latitude / longitude: geocoded monitoring point
          - current_speed / free_flow_speed: speed measurements in km/h
          - current_travel_time / free_flow_travel_time: travel time measurements in seconds
          - confidence: TomTom confidence score
          - road_closure: boolean road closure indicator
          - raw_payload: raw API payload or interpolation trace

          **Freshness:**
          - warn_after: 6 hours
          - error_after: 12 hours
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 12, period: hour}
        loaded_at_field: ingest_time
        columns:
          - name: source
            description: "Source identifier. Always 'tomtom'."
          - name: traffic_source
            description: "Origin of the record: 'api', 'interpolated', or 'offpeak_model'."
          - name: ward_code
            description: "Vietnam administrative ward code."
            tests:
              - not_null
          - name: ward_name
            description: "Ward name from TomTom location metadata."
          - name: province_name
            description: "Province name from TomTom location metadata."
          - name: latitude
            description: "Latitude of the monitoring point."
          - name: longitude
            description: "Longitude of the monitoring point."
          - name: timestamp_utc
            description: "Observation timestamp."
            tests:
              - not_null
          - name: current_speed
            description: "Current traffic speed in km/h."
          - name: free_flow_speed
            description: "Free-flow speed in km/h."
          - name: current_travel_time
            description: "Current travel time in seconds."
          - name: free_flow_travel_time
            description: "Free-flow travel time in seconds."
          - name: confidence
            description: "Measure of data quality (0.0 to 1.0)."
          - name: road_closure
            description: "Boolean indicating whether the road is closed."
          - name: traffic_source
            description: "Source of traffic data: 'api', 'interpolated', or 'offpeak_model'."
          - name: raw_payload
            description: "Serialized TomTom API response or interpolation trace."
          - name: ingest_time
            description: "Timestamp when the record was ingested."
