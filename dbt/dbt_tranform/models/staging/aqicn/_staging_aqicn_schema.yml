version: 2

models:
  - name: stg_aqicn__measurements
    description: "Staged AQICN measurements — Vietnam-filtered, deduplicated, canonical schema"
    columns:
      - name: source
        description: "Source identifier: 'aqicn'"
        tests:
          - not_null
      - name: station_id
        description: "Source-prefixed station ID (e.g., AQICN_1583)"
        tests:
          - not_null
      - name: timestamp_utc
        description: "Measurement timestamp in UTC (parsed from Unix timestamp)"
        tests:
          - not_null
      - name: parameter
        description: "Standardized pollutant name (pm25, pm10, o3, no2, so2, co)"
        tests:
          - not_null
      - name: value
        description: "Pollutant concentration value"
        tests:
          - not_null
      - name: unit
        description: "Unit of measurement: µg/m³ (pm25, pm10), ppb (o3, no2, so2), ppm (co)"
      - name: quality_flag
        description: "Data quality flag: 'valid' for this source"
      - name: aqi_reported
        description: "AQI value as reported by AQICN (aggregated)"
      - name: ingest_time
        description: "Ingestion timestamp"
      - name: raw_payload
        description: "Full original JSON payload for audit"

  - name: stg_aqicn__stations
    description: "Staged AQICN station metadata — Vietnam-filtered, deduplicated"
    columns:
      - name: station_id
        description: "AQICN station ID (numeric index)"
        tests:
          - not_null
          - unique
      - name: station_name
        description: "Station name with location info"
      - name: latitude
        description: "Latitude as Float64"
      - name: longitude
        description: "Longitude as Float64"
      - name: province
        description: "Province extracted from station name"
      - name: city
        description: "City extracted from station name"
      - name: location_type
        description: "Location type: KTTV, KCN, Chi cục BVMT, Other"
      - name: location_key
        description: "Source-prefixed unique location ID: AQICN_{station_id}"
      - name: sensor_quality_tier
        description: "Sensor quality tier: 'research'"
