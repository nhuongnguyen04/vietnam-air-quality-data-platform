version: 2

models:
  - name: stg_aqicn__measurements
    description: "Staged AQICN measurements for Vietnam — cleaned, timezone-corrected, pollutant-standardized. PM2.5/PM10 in µg/m³, CO in ppm. Only Vietnam stations (city_location or station_name contains 'Vietnam')."
    columns:
      - name: source
        description: "Data source identifier, always 'aqicn'"
        tests:
          - not_null
          - accepted_values:
              values: ['aqicn']

      - name: station_id
        description: "Unique station key prefixed with 'AQICN_', e.g. AQICN_1583. NOTE: not globally unique — each station has multiple rows (one per pollutant per timestamp). Use composite key (station_id, timestamp_utc, parameter) for uniqueness."
        tests:
          - not_null

      - name: station_name
        description: "Human-readable station name from AQICN"
        tests:
          - not_null

      - name: latitude
        description: "Latitude of the station (WGS84)"
        tests:
          - not_null

      - name: longitude
        description: "Longitude of the station (WGS84)"
        tests:
          - not_null

      - name: timestamp_utc
        description: "Measurement timestamp corrected to UTC"
        tests:
          - not_null

      - name: parameter
        description: "Standardized pollutant name: pm25, pm10, o3, no2, so2, co, pm1. AQICN may also return weather metadata (temperature, humidity, pressure, wind_speed, dew_point) — these are passed through as-is and excluded from accepted_values test."
        tests:
          - not_null
          - accepted_values:
              values: ['pm25', 'pm10', 'o3', 'no2', 'so2', 'co', 'pm1']
              config:
                where: "parameter IN ('pm25', 'pm10', 'o3', 'no2', 'so2', 'co', 'pm1')"

      - name: value
        description: "Pollutant concentration value in the corresponding unit"
        tests:
          - not_null

      - name: unit
        description: "Unit of measurement: µg/m³ for PM, ppb for O3/NO2/SO2, ppm for CO"
        tests:
          - not_null
          - accepted_values:
              values: ['µg/m³', 'ppb', 'ppm', 'unknown']

      - name: quality_flag
        description: "Data quality flag — always 'valid' in this model"
        tests:
          - not_null
          - accepted_values:
              values: ['valid']

      - name: aqi_reported
        description: "AQI value as reported by AQICN (Nullable). Nullable is valid — AQICN may not report AQI for all measurements."
        tests: []

      - name: ingest_time
        description: "Timestamp when the record was ingested into ClickHouse"
        tests:
          - not_null

      - name: raw_payload
        description: "Full raw JSON payload from AQICN API for audit/debugging"
        tests:
          - not_null

  - name: stg_aqicn__stations
    description: "Staged AQICN station metadata — deduplicated by station_id (latest ingest_time wins). Parses province/city from station_name. Only Vietnam stations."
    columns:
      - name: source
        description: "Data source identifier"
        tests:
          - not_null
          - accepted_values:
              values: ['aqicn']

      - name: station_id
        description: "Unique station ID from AQICN API (uid field)"
        tests:
          - unique
          - not_null

      - name: station_name
        description: "Station name with location details (province/city)"
        tests:
          - not_null

      - name: city_url
        description: "AQICN city URL slug"
        tests:
          - not_null

      - name: city_location
        description: "Full city/location string from AQICN API"
        tests:
          - not_null

      - name: latitude
        description: "Station latitude (WGS84)"
        tests:
          - not_null

      - name: longitude
        description: "Station longitude (WGS84)"
        tests:
          - not_null

      - name: province
        description: "Province name extracted from station_name (split on '/', first part)"
        tests:
          - not_null

      - name: city
        description: "City name extracted from station_name (split on '/', second part without ', Vietnam')"
        tests:
          - not_null

      - name: location_type
        description: "Station type inferred from station_name: KTTV, KCN, Chi cục BVMT, Other"
        tests:
          - not_null
          - accepted_values:
              values: ['KTTV', 'KCN', 'Chi cục BVMT', 'Other']

      - name: station_datetime
        description: "Station-reported local time parsed from station_time. Nullable — 41 stations in raw data have NULL station_time from AQICN API."
        tests: []

      - name: aqi
        description: "Current AQI value from the station. Nullable — stations may not report AQI."
        tests: []

      - name: is_vietnam
        description: "Flag indicating Vietnam station — always true"
        tests:
          - not_null
          - accepted_values:
              values: [true]

      - name: location_key
        description: "Unique location key: AQICN_{station_id}"
        tests:
          - unique
          - not_null

      - name: sensor_quality_tier
        description: "Sensor quality classification — 'research' for AQICN stations"
        tests:
          - not_null
          - accepted_values:
              values: ['research']

      - name: ingest_time
        description: "Timestamp when the record was ingested into ClickHouse"
        tests:
          - not_null

      - name: ingest_batch_id
        description: "Batch identifier for this ingestion run"
        tests:
          - not_null

      - name: raw_payload
        description: "Full raw JSON payload from AQICN API"
        tests:
          - not_null

  - name: stg_aqicn__forecast
    description: "Staged AQICN forecast data — deduplicated on (station_id, measurement_time_v, forecast_type, pollutant, day). Forecast values converted to Float64."
    columns:
      - name: source
        description: "Data source identifier"
        tests:
          - not_null

      - name: station_id
        description: "AQICN station ID"
        tests:
          - not_null

      - name: measurement_datetime
        description: "Datetime of the measurement this forecast applies to. Nullable — 1372 rows have NULL because measurement_time_v is missing in raw data."
        tests: []

      - name: forecast_type
        description: "Type of forecast: daily, hourly, etc."
        tests:
          - not_null

      - name: pollutant
        description: "Pollutant being forecasted (standardized name)"
        tests:
          - not_null

      - name: forecast_date
        description: "Date for which the forecast was made"
        tests:
          - not_null

      - name: forecast_date_str
        description: "Original forecast date string from API"
        tests:
          - not_null

      - name: forecast_avg
        description: "Average forecast value. Nullable — 418 rows have unparseable avg values in raw data."
        tests: []

      - name: forecast_max
        description: "Maximum forecast value. Nullable — 152 rows have unparseable max values in raw data."
        tests: []

      - name: forecast_min
        description: "Minimum forecast value. Nullable — 3441 rows have unparseable min values in raw data."
        tests: []

      - name: forecast_lead_days
        description: "Number of days between forecast generation and forecast date. Nullable — 1372 rows are NULL when measurement_datetime is NULL."
        tests: []

      - name: ingest_time
        description: "Timestamp when the record was ingested"
        tests:
          - not_null

      - name: ingest_batch_id
        description: "Batch identifier for this ingestion run"
        tests:
          - not_null

      - name: raw_forecast_item
        description: "Full raw forecast JSON item from API"
        tests:
          - not_null
