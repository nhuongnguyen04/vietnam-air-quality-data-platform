version: 2

sources:
  - name: openaq
    description: "Raw OpenAQ data from ClickHouse"
    database: air_quality
    schema: air_quality
    tables:
      - name: raw_openaq_locations
        description: "Raw OpenAQ locations metadata"
        columns:
          - name: location_id
            description: "OpenAQ location ID"
            tests:
              - not_null
              - unique
          - name: country_code
            description: "ISO country code"
            tests:
              - not_null
          - name: country_name
            description: "Country name"
          - name: name
            description: "Location name"
          - name: locality
            description: "Locality/city name"
          - name: latitude
            description: "Latitude as Float64"
            tests:
              - not_null
          - name: longitude
            description: "Longitude as Float64"
            tests:
              - not_null
          - name: ingest_time
            description: "Timestamp when data was ingested"
            tests:
              - not_null

      - name: raw_openaq_parameters
        description: "Raw OpenAQ parameters reference table"
        columns:
          - name: parameter_id
            description: "OpenAQ parameter ID"
            tests:
              - not_null
              - unique
          - name: name
            description: "Parameter name (pm25, pm10, o3, etc.)"
            tests:
              - not_null
          - name: display_name
            description: "Display name for parameter"
          - name: units
            description: "Measurement units"
            tests:
              - not_null
          - name: description
            description: "Parameter description"
          - name: ingest_time
            description: "Timestamp when data was ingested"
            tests:
              - not_null

      - name: raw_openaq_sensors
        description: "Raw OpenAQ sensors metadata"
        columns:
          - name: sensor_id
            description: "OpenAQ sensor ID"
            tests:
              - not_null
              - unique
          - name: location_id
            description: "Foreign key to locations table"
            tests:
              - not_null
          - name: parameter_id
            description: "Foreign key to parameters table"
            tests:
              - not_null
          - name: name
            description: "Sensor name"
          - name: ingest_time
            description: "Timestamp when data was ingested"
            tests:
              - not_null

      - name: raw_openaq_measurements
        description: "Raw OpenAQ measurements data"
        columns:
          - name: location_id
            description: "Foreign key to locations table"
            tests:
              - not_null
          - name: sensor_id
            description: "Foreign key to sensors table"
            tests:
              - not_null
          - name: parameter_id
            description: "Foreign key to parameters table"
            tests:
              - not_null
          - name: value
            description: "Measurement value as Float32"
            tests:
              - not_null
          - name: period_datetime_from_utc
            description: "Period start datetime in UTC"
            tests:
              - not_null
          - name: period_datetime_to_utc
            description: "Period end datetime in UTC"
            tests:
              - not_null
          - name: ingest_time
            description: "Timestamp when data was ingested"
            tests:
              - not_null

