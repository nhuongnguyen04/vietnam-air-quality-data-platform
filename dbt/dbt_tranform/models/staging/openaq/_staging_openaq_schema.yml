version: 2

models:
  - name: stg_openaq__measurements
    description: "Staged OpenAQ measurements data - filtered for Vietnam, deduplicated, and transformed"
    columns:
      - name: location_id
        description: "OpenAQ location ID"
        tests:
          - not_null
      - name: sensor_id
        description: "OpenAQ sensor ID"
        tests:
          - not_null
      - name: parameter_id
        description: "OpenAQ parameter ID"
        tests:
          - not_null
      - name: value
        description: "Measurement value (Float32)"
        tests:
          - not_null
      - name: period_datetime_from_utc
        description: "Period start datetime in UTC"
        tests:
          - not_null
      - name: is_vietnam
        description: "Flag indicating data is from Vietnam"
        tests:
          - not_null
          - accepted_values:
              values: [true]

  - name: stg_openaq__locations
    description: "Staged OpenAQ locations metadata - filtered for Vietnam, deduplicated, and transformed"
    columns:
      - name: location_id
        description: "OpenAQ location ID"
        tests:
          - not_null
          - unique
      - name: country_code
        description: "ISO country code"
        tests:
          - not_null
          - accepted_values:
              values: ['VN']
      - name: is_vietnam
        description: "Flag indicating location is in Vietnam"
        tests:
          - not_null
          - accepted_values:
              values: [true]

  - name: stg_openaq__parameters
    description: "Staged OpenAQ parameters reference table - deduplicated and standardized"
    columns:
      - name: parameter_id
        description: "OpenAQ parameter ID"
        tests:
          - not_null
          - unique
      - name: parameter_name
        description: "Standardized parameter name"
        tests:
          - not_null
      - name: parameter_key
        description: "Standardized parameter key for mapping"

  - name: stg_openaq__sensors
    description: "Staged OpenAQ sensors metadata - filtered for Vietnam locations, deduplicated, and transformed"
    columns:
      - name: sensor_id
        description: "OpenAQ sensor ID"
        tests:
          - not_null
          - unique
      - name: location_id
        description: "Foreign key to locations table"
        tests:
          - not_null
      - name: is_vietnam
        description: "Flag indicating sensor is in Vietnam"
        tests:
          - not_null
          - accepted_values:
              values: [true]

