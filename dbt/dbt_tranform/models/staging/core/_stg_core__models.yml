version: 2

models:
  - name: stg_core__administrative_units
    description: |
      Ground truth reference for Vietnam administrative hierarchy (Ward -> Province).
      Derived from `vietnam_wards_with_osm.csv`.

      **Grain:** One row per ward_code.
    columns:
      - name: ward_code
        description: Unique administrative code for the ward.
        tests:
          - not_null
          - unique
      - name: ward_name
        description: Full name of the ward (phường/xã).
      - name: province
        description: Standardized province name.
      - name: lat
        description: Latitude of the ward centroid.
      - name: lon
        description: Longitude of the ward centroid.
      - name: population
        description: Projected 2026 population for this ward.
      - name: area_km2
        description: Land area in square kilometers.

    meta:
      openmetadata:
        tier: Tier.Tier3
        tags:
          - Certification.Bronze
  - name: stg_core__stations
    description: |
      Enriched station metadata with automated mapping to ward_code.

      **Grain:** One row per station_name.

      **Business Rules:**
      - Stations are mapped to the nearest ward centroid from `stg_core__administrative_units` using spatial distance.
    columns:
      - name: station_name
        description: Primary key for station identification.
        tests:
          - not_null
          - unique
      - name: ward_code
        description: Mapped administrative ward code.
      - name: province
        description: Administrative province.
      - name: station_source
        description: Data source provider.

    meta:
      openmetadata:
        tier: Tier.Tier3
        tags:
          - Certification.Bronze
  - name: stg_core__pollutants
    description: |
      Reference table of criteria pollutants with EPA AQI breakpoint values.
    columns:
      - name: pollutant_key
        description: Pollutant identifier (pm25, pm10, etc).
        tests:
          - not_null
      - name: display_name
        description: Human-readable pollutant name.
      - name: unit
        description: Standard measurement unit for the pollutant.
      - name: epa_aqi_bp_lo
        description: Lower bound of the EPA AQI range for the breakpoint.
      - name: epa_aqi_bp_hi
        description: Upper bound of the EPA AQI range for the breakpoint.
      - name: conc_bp_lo
        description: Lower bound of the concentration range for the breakpoint.
      - name: conc_bp_hi
        description: Upper bound of the concentration range for the breakpoint.
      - name: health_effects
        description: Business description of health effects associated with this
          pollutant level.

    meta:
      openmetadata:
        tier: Tier.Tier3
        tags:
          - Certification.Bronze
  - name: stg_core__population
    description: |
      Vietnam provincial population aggregated from ward-level statistics.

      **Grain:** One row per province.
    columns:
      - name: location_name
        description: Standardized province name.
        tests:
          - not_null
      - name: original_location_name
        description: Unprocessed source location name (for mapping traceability).
      - name: total_population
        description: Sum of ward populations in this province.
      - name: area_km2
        description: Total land area of the province in square kilometers.
      - name: density_per_km2
        description: Population density (People / km²).
    meta:
      openmetadata:
        tier: Tier.Tier3
        tags:
          - Certification.Bronze
