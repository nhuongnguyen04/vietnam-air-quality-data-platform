version: 2

sources:
  - name: aqiin
    description: "AQI.in web scraper — Vietnam air quality dashboard. Regional parsing: station_name split into ward, district, province."
    database: air_quality
    schema: air_quality
    tables:
      - name: raw_aqiin_measurements
        description: "Real-time measurements scraped from aqi.in"
        freshness:
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: ingest_time
        columns:
          - name: station_name
            tests:
              - not_null
          - name: timestamp_utc
            tests:
              - not_null
          - name: parameter
            tests:
              - not_null
          - name: value
            tests:
              - not_null
          - name: aqi_reported

