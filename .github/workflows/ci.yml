name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: '8123'
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ''
      CLICKHOUSE_DB: air_quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install dbt-core==1.10.13 dbt-clickhouse==1.10.0 sqlfluff==3.5.0 'sqlfluff-templater-dbt==3.5.0' ruff==0.11.0
      - run: cd dbt/dbt_tranform && dbt deps
      - run: ruff check python_jobs/ airflow/dags/ --config .ruff.toml
      - run: sqlfluff lint dbt/dbt_tranform/ --format github-annotation

  python-unit:
    name: Python Unit
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/python -m "not integration and not live"
        env:
          INGEST_MODE: csv

  python-integration:
    name: Python Integration
    runs-on: ubuntu-latest
    needs: python-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest tests/python -m integration
        env:
          INGEST_MODE: csv

  text-to-sql-tests:
    name: Text-to-SQL Quality Gate
    runs-on: ubuntu-latest
    needs: python-unit
    env:
      TEXT_TO_SQL_PREVIEW_SECRET: ci-preview-secret
      TEXT_TO_SQL_VANNA_CLIENT: chromadb
      TEXT_TO_SQL_VANNA_PERSIST_DIRECTORY: /tmp/vanna-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pytest python_jobs/text_to_sql/tests -m "not integration"

  compile:
    name: Compile
    runs-on: ubuntu-latest
    needs:
      - lint
      - python-unit
      - python-integration
      - text-to-sql-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install dbt-core==1.10.13 dbt-clickhouse==1.10.0
      - run: cd dbt/dbt_tranform && dbt deps
      - run: cd dbt/dbt_tranform && dbt compile --target dev
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: '8123'
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DB: air_quality

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: compile
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.12
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install dbt-core==1.10.13 dbt-clickhouse==1.10.0 clickhouse-connect
      - run: |
          python -c "import clickhouse_connect; c = clickhouse_connect.get_client(host='localhost', port=8123); c.command('CREATE DATABASE IF NOT EXISTS air_quality')"
      - run: cd dbt/dbt_tranform && dbt seed --target dev
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: '8123'
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DB: air_quality
      - run: cd dbt/dbt_tranform && dbt run --select +dm_air_quality_overview_daily +dm_aqi_current_status +dm_traffic_hourly_trend --target dev
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: '8123'
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DB: air_quality

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.12
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install dbt-core==1.10.13 dbt-clickhouse==1.10.0 clickhouse-connect
      - run: |
          python -c "import clickhouse_connect; c = clickhouse_connect.get_client(host='localhost', port=8123); c.command('CREATE DATABASE IF NOT EXISTS air_quality')"
      - run: cd dbt/dbt_tranform && dbt seed --target dev
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: '8123'
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DB: air_quality
      - run: cd dbt/dbt_tranform && dbt run --target dev
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: '8123'
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DB: air_quality
      - run: cd dbt/dbt_tranform && dbt test --target dev
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: '8123'
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ''
          CLICKHOUSE_DB: air_quality
