name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install sqlfluff==3.5.0 'sqlfluff-templater-dbt==3.5.0' ruff==0.11.0
      - run: ruff check python_jobs/ airflow/dags/ --config .ruff.toml || true
      - run: sqlfluff lint dbt/dbt_tranform/ --format github-annotation || true

  compile:
    name: Compile
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install dbt-core==1.10.13 dbt-clickhouse==1.10.0
      - run: cd dbt/dbt_tranform && dbt deps
      - run: cd dbt/dbt_tranform && dbt compile --target dev
        env:
          DBT_CH_HOST: localhost
          DBT_CH_PORT: '8123'
          DBT_CH_USER: default
          DBT_CH_PASSWORD: ''
          DBT_CH_DATABASE: air_quality

  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: compile
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.12
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install dbt-core==1.10.13 dbt-clickhouse==1.10.0 clickhouse-connect
      - run: |
          python -c "import clickhouse_connect; c = clickhouse_connect.get_client(host='localhost', port=8123); c.command('CREATE DATABASE IF NOT EXISTS air_quality')"
      - run: cd dbt/dbt_tranform && dbt seed --target dev
        env:
          DBT_CH_HOST: localhost
          DBT_CH_PORT: '8123'
          DBT_CH_USER: default
          DBT_CH_PASSWORD: ''
          DBT_CH_DATABASE: air_quality
      - run: cd dbt/dbt_tranform && dbt run --select +mart_air_quality__dashboard --target dev
        env:
          DBT_CH_HOST: localhost
          DBT_CH_PORT: '8123'
          DBT_CH_USER: default
          DBT_CH_PASSWORD: ''
          DBT_CH_DATABASE: air_quality

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.12
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install dbt-core==1.10.13 dbt-clickhouse==1.10.0 clickhouse-connect
      - run: |
          python -c "import clickhouse_connect; c = clickhouse_connect.get_client(host='localhost', port=8123); c.command('CREATE DATABASE IF NOT EXISTS air_quality')"
      - run: cd dbt/dbt_tranform && dbt seed --target dev
        env:
          DBT_CH_HOST: localhost
          DBT_CH_PORT: '8123'
          DBT_CH_USER: default
          DBT_CH_PASSWORD: ''
          DBT_CH_DATABASE: air_quality
      - run: cd dbt/dbt_tranform && dbt run --target dev
        env:
          DBT_CH_HOST: localhost
          DBT_CH_PORT: '8123'
          DBT_CH_USER: default
          DBT_CH_PASSWORD: ''
          DBT_CH_DATABASE: air_quality
      - run: cd dbt/dbt_tranform && dbt test --target dev
        env:
          DBT_CH_HOST: localhost
          DBT_CH_PORT: '8123'
          DBT_CH_USER: default
          DBT_CH_PASSWORD: ''
          DBT_CH_DATABASE: air_quality
