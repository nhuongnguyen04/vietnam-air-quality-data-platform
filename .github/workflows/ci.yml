name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop, "feature/**", "fix/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.10"
  DBT_PROJECT_PATH: dbt/dbt_tranform
  CLICKHOUSE_HOST: localhost
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ""
  CLICKHOUSE_DB: air_quality
  INGEST_MODE: csv

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements/dev.txt

      - name: Ruff
        run: ruff check python_jobs/ airflow/dags/ scripts/ --config .ruff.toml

      - name: Python syntax check
        run: python -m compileall -q python_jobs airflow/dags scripts

  python-unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements/ingestion.txt -r requirements/google-drive.txt -r requirements/dev.txt

      - name: Unit tests
        run: pytest tests/python -m "not integration and not live and not requires_clickhouse"

  airflow-dag-contracts:
    name: Airflow DAG Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements/dev.txt

      - name: DAG structure tests
        run: pytest tests/python/airflow -m integration

  text-to-sql-safety:
    name: Text-to-SQL Safety Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEXT_TO_SQL_PREVIEW_SECRET: ci-preview-secret
      TEXT_TO_SQL_VANNA_CLIENT: chromadb
      TEXT_TO_SQL_VANNA_PERSIST_DIRECTORY: /tmp/vanna-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements/text-to-sql.txt -r requirements/dev.txt

      - name: Safety and contract tests
        run: pytest python_jobs/text_to_sql/tests -m "not integration and not live"

  dbt-static:
    name: dbt Parse, Compile, SQL Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.12
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: air_quality
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt and SQL lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dbt.txt -r requirements/sql-lint.txt

      - name: dbt deps
        working-directory: ${{ env.DBT_PROJECT_PATH }}
        run: dbt deps

      - name: Prepare ClickHouse database
        run: |
          python - <<'PY'
          import clickhouse_connect

          client = clickhouse_connect.get_client(host="localhost", port=8123)
          client.command("CREATE DATABASE IF NOT EXISTS air_quality")
          PY

      - name: dbt parse
        working-directory: ${{ env.DBT_PROJECT_PATH }}
        run: dbt parse --target dev

      - name: dbt compile
        working-directory: ${{ env.DBT_PROJECT_PATH }}
        run: dbt compile --target dev

      - name: SQL lint
        run: sqlfluff lint ${{ env.DBT_PROJECT_PATH }} --format github-annotation

  dbt-build-clickhouse:
    name: dbt Build on ClickHouse
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - python-lint
      - python-unit
      - airflow-dag-contracts
      - text-to-sql-safety
      - dbt-static
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.12
        ports:
          - 8123:8123
          - 9000:9000
        env:
          CLICKHOUSE_DB: air_quality
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
        options: >-
          --health-cmd "wget --spider -q localhost:8123/ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dbt.txt

      - name: dbt deps
        working-directory: ${{ env.DBT_PROJECT_PATH }}
        run: dbt deps

      - name: Initialize ClickHouse schema
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          import clickhouse_connect

          sql = Path("scripts/init-clickhouse.sql").read_text(encoding="utf-8")
          sql = sql.replace("${CLICKHOUSE_DB}", "air_quality")
          sql = re.sub(r"(?m)^\s*--.*$", "", sql)

          bootstrap = clickhouse_connect.get_client(host="localhost", port=8123)
          bootstrap.command("CREATE DATABASE IF NOT EXISTS air_quality")

          client = clickhouse_connect.get_client(host="localhost", port=8123, database="air_quality")
          for statement in [part.strip() for part in sql.split(";") if part.strip()]:
              command = statement.upper()
              if command.startswith("CREATE DATABASE") or command.startswith("USE "):
                  continue
              client.command(statement)
          PY

      - name: dbt seed
        working-directory: ${{ env.DBT_PROJECT_PATH }}
        run: dbt seed --target dev

      - name: dbt build
        working-directory: ${{ env.DBT_PROJECT_PATH }}
        run: dbt build --target dev
