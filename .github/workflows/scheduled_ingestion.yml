name: Hourly Data Ingestion  # Scheduled at minute 0
# Refresh comment to restart stalled schedule: 2026-04-12

on:
  workflow_dispatch:      # Allows manual trigger (e.g., from Google Apps Script)

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    env:
      INGEST_MODE: csv
      CSV_OUTPUT_DIR: landing_zone
      OPENWEATHER_API_TOKENS: ${{ secrets.OPENWEATHER_API_TOKENS }}
      OPENWEATHER_API_TOKEN: ${{ secrets.OPENWEATHER_API_TOKEN }}
      TOMTOM_API_KEYS: ${{ secrets.TOMTOM_API_KEYS }}
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
      # ClickHouse credentials (Optional, for direct write if needed)
      CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      AQIIN_TOKEN: ${{ secrets.AQIIN_TOKEN }}
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Create local landing zone
        run: mkdir -p landing_zone

      - name: Parallel Data Ingestion
        run: |
          echo "Starting parallel ingestion..."
          python python_jobs/jobs/aqiin/ingest_measurements.py &
          python python_jobs/jobs/openweather/ingest_openweather_unified.py &
          
          HOUR=$(date +%H)
          # Convert UTC hour to Vietnam time (UTC+7) before comparing
          VietnamHour=$(( (10#$HOUR + 7) % 24 ))
          
          if [ $VietnamHour -ge 7 ] && [ $VietnamHour -le 20 ]; then
            echo "Peak Hour ($VietnamHour:00 VN): Running TomTom V2 Ingestion..."
            python python_jobs/jobs/traffic/ingest_tomtom.py &
          else
            echo "Off-Peak Hour ($VietnamHour:00 VN): Generating Simulated Traffic..."
            python python_jobs/jobs/traffic/generate_offpeak_traffic.py &
          fi
          
          wait
          echo "All parallel ingestion jobs finished."

      - name: Upload to Google Drive
        run: python scripts/gdrive_uploader.py
