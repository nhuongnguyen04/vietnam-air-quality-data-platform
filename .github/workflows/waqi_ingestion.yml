name: WAQI 15-Minute Ingestion

on:
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    env:
      INGEST_MODE: csv
      CSV_OUTPUT_DIR: landing_zone
      GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
      GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
      GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
      GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
      WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ingest.txt

      - name: Create local landing zone
        run: mkdir -p landing_zone

      - name: Run WAQI Ingestion
        run: python python_jobs/jobs/waqi/ingest_measurements.py

      - name: Upload to Google Drive
        run: python scripts/gdrive_uploader.py

      - name: Notify Telegram on failure
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_SYS_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_SYS_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials are missing; cannot send failure notification."
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          MESSAGE="$(printf '%s\n' \
            "GitHub Actions failed (WAQI 15-Minute Ingestion)" \
            "" \
            "Workflow: ${GITHUB_WORKFLOW}" \
            "Repository: ${GITHUB_REPOSITORY}" \
            "Branch: ${GITHUB_REF_NAME}" \
            "Commit: ${SHORT_SHA}" \
            "Actor: ${GITHUB_ACTOR}" \
            "Run: ${RUN_URL}")"

          curl --fail --silent --show-error --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
