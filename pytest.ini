[pytest]
testpaths = tests/python
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --tb=short --strict-markers -m "not live"
pythonpath = .
markers =
    unit: Fast tests with mocks only. No network or secrets required.
    integration: Tests that exercise multiple modules or file-based integration.
    live: Tests that call external services and are disabled by default.
    requires_clickhouse: Tests that require a ClickHouse service.
filterwarnings =
    ignore::DeprecationWarning
