# Grafana Configuration — anonymous access + plugin allowlist
# ISSUE 1 FIX: grafana-clickhouse-datasource (NOT vertamedia-clickhouse-datasource)
# ISSUE 3 FIX: allow_embedding absent from [security] section — covered by env var

[anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[security]
cookie_samesite = lax

[users]
allow_sign_up = false
allow_org_create = false

[auth.anonymous]
enabled = true

[paths]
provisioning = /etc/grafana/provisioning

[plugins]
allow_loading_unsigned_plugins = grafana-clickhouse-datasource

[server]
http_port = 3000
domain = localhost
