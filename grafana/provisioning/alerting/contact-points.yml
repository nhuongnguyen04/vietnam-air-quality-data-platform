# Grafana Alerting Contact Points — Phase 3.1
# Telegram integration requires manual configuration via Grafana UI
# Reason: Go type system treats numeric chatid as int despite YAML string syntax

apiVersion: 1

contactPoints:
  - name: telegram-critical
    receivers:
      - uid: telegram-critical
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: "${TELEGRAM_CHAT_ID}"
