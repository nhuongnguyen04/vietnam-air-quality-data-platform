# Grafana Alert Rules — Plan 3.4
#
# D-06: Critical alerts → Telegram (pipeline failures + AQI > 200)
# D-07: Operational warnings → Grafana only, NO Telegram
#
# Grafana 11.x provisioning format: apiVersion: 1
# All expression data items MUST have a model: block with type + maxDataPoints
# to avoid "assignment to entry in nil map" panic.

apiVersion: 1

groups:
  - name: air-quality-alerts
    folder: Air Quality Alerts
    interval: 1m
    rules:

      # =============================================================
      # Rule 1: DAG Failure — CRITICAL → Telegram #data-ops
      # =============================================================
      - uid: dag-failure-critical
        title: DAG Failure — Critical
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: airflow-postgres
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT state, dag_id, MAX(end_date) as last_run
                FROM dag_run
                WHERE end_date >= NOW() - INTERVAL '10 MINUTE'
                  AND state IN ('failed', 'up_for_retry')
                GROUP BY state, dag_id
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "DAG {{ $labels.dag_id }} failed — immediate attention required"
          description: "DAG {{ $labels.dag_id }} entered {{ $labels.state }} state"
        labels:
          severity: critical
          team: data-ops
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 2: ClickHouse Down — CRITICAL → Telegram #data-ops
      # =============================================================
      - uid: clickhouse-down-critical
        title: ClickHouse Database Down
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT 1 AS clickhouse_up
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "ClickHouse database is unreachable"
          description: "Cannot reach ClickHouse — check database service and network connectivity"
        labels:
          severity: critical
          team: data-ops
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 3: AQI Critical (>200 Very Unhealthy) — CRITICAL → Telegram
      # =============================================================
      - uid: aqi-critical-200
        title: AQI Critical (>200 Very Unhealthy)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT MAX(normalized_aqi) AS max_aqi,
                       argMax(station_name, normalized_aqi) AS station,
                       argMax(city, normalized_aqi) AS city
                FROM fct_hourly_aqi
                WHERE timestamp_utc >= NOW() - INTERVAL 1 HOUR
                HAVING MAX(normalized_aqi) > 200
          - refId: C
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "AQI exceeded 200 (Very Unhealthy) at {{ $labels.city }}"
          description: |
            Station: {{ $labels.station }}
            City: {{ $labels.city }}
        labels:
          severity: critical
          team: air-quality
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 4: Data Freshness Warning (>3h old) — WARNING → Grafana only
      # =============================================================
      - uid: data-freshness-warning
        title: Data Freshness Warning (>3h old)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT source,
                       MAX(lag_seconds) AS max_lag,
                       MAX(last_success) AS last_data_time
                FROM ingestion_control
                GROUP BY source
                HAVING MAX(lag_seconds) > 10800
          - refId: C
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: "Data from {{ $labels.source }} is >3h old — check pipeline"
          description: |
            Source: {{ $labels.source }}
        labels:
          severity: warning
          team: data-ops

      # =============================================================
      # Rule 5: Station Stale (>2h no data) — WARNING → Grafana only
      # =============================================================
      - uid: station-stale-warning
        title: Station Stale (>2h no data)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT station_id, city, source,
                       MAX(timestamp_utc) AS last_seen
                FROM fct_hourly_aqi
                GROUP BY station_id, city, source
                HAVING MAX(timestamp_utc) < NOW() - INTERVAL 2 HOUR
          - refId: C
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
        noDataState: OK
        execErrState: OK
        for: 5m
        annotations:
          summary: "Station {{ $labels.station_id }} in {{ $labels.city }} has no data for >2h"
          description: |
            Station: {{ $labels.station_id }}
            City: {{ $labels.city }}
            Source: {{ $labels.source }}
        labels:
          severity: warning
          team: data-ops
