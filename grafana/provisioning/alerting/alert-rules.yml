# Grafana Alert Rules — Plan 3.4
#
# D-06: Critical alerts → Telegram (pipeline failures + AQI > 200)
# D-07: Operational warnings → Grafana only, NO Telegram
#
# Grafana 11.x provisioning format: apiVersion: 1
# All expression data items MUST have a model: block with type + maxDataPoints
# to avoid "assignment to entry in nil map" panic.

apiVersion: 1

groups:
  - name: air-quality-alerts
    folder: Air Quality Alerts
    interval: 1m
    rules:

      # =============================================================
      # Rule 1: DAG Failure — CRITICAL → Telegram #data-ops
      # =============================================================
      - uid: dag-failure-critical
        title: DAG Failure — Critical
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: airflow-postgres
            model:
              type: sql
              format: table
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT state, dag_id, MAX(end_date) as last_run
                FROM dag_run
                WHERE end_date >= NOW() - INTERVAL '10 MINUTE'
                  AND state IN ('failed', 'up_for_retry')
                GROUP BY state, dag_id
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "DAG {{ $labels.dag_id }} failed — immediate attention required"
          description: "DAG {{ $labels.dag_id }} entered {{ $labels.state }} state"
        labels:
          severity: critical
          team: data-ops
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 2: ClickHouse Down — CRITICAL → Telegram #data-ops
      # =============================================================
      - uid: clickhouse-down-critical
        title: ClickHouse Database Down
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT 1 AS clickhouse_up
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "ClickHouse database is unreachable"
          description: "Cannot reach ClickHouse — check database service and network connectivity"
        labels:
          severity: critical
          team: data-ops
        contactPoints: [telegram-critical]

# =============================================================
# Rule 3: AQI Critical (>200 Very Unhealthy) — CRITICAL → Telegram
# Schema fix: station_name → station_id (via JOIN), timestamp_utc → datetime_hour
# =============================================================
      - uid: aqi-critical-200
        title: AQI Critical (>200 Very Unhealthy)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT MAX(h.normalized_aqi) AS max_aqi,
                       argMax(h.station_id, h.normalized_aqi) AS station_id,
                       argMax(l.city, h.normalized_aqi) AS city,
                       argMax(h.dominant_pollutant, h.normalized_aqi) AS pollutant
                FROM air_quality.fct_hourly_aqi h
                LEFT JOIN air_quality.dim_locations l ON h.station_id = l.station_id
                WHERE h.datetime_hour >= NOW() - INTERVAL 1 HOUR
                GROUP BY l.city
                HAVING MAX(h.normalized_aqi) > 200
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              maxDataPoints: 300
              expression: B
              params: [200]
        noDataState: OK
        execErrState: Error
        for: 5m
        groupWait: 30s
        groupInterval: 1h
        repeatInterval: 1h
        annotations:
          summary: "🔴 CRITICAL: AQI exceeded 200 (Very Unhealthy) at {{ $labels.city }}"
          description: |
            🔴 AQI Alert — Minimize outdoor exposure
            City: {{ $labels.city }}
            Station: {{ $labels.station_id }}
            AQI: {{ $values.B.Value }}
            Pollutant: {{ $labels.pollutant }}
        labels:
          severity: critical
          team: air-quality
          alert_type: aqi_threshold
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 4: Data Freshness Warning (>3h old) — WARNING → Grafana only
      # D-07: No Telegram — operational warning
      # =============================================================
      - uid: data-freshness-warning
        title: Data Freshness Warning (>3h old)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT source,
                       MAX(lag_seconds) AS max_lag,
                       MAX(last_success) AS last_data_time
                FROM air_quality.ingestion_control
                GROUP BY source
                HAVING MAX(lag_seconds) > 10800
          - refId: C
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
        noDataState: OK
        execErrState: OK
        for: 5m
        groupWait: 30s
        groupInterval: 30m
        repeatInterval: 30m
        annotations:
          summary: "🟡 WARNING: Data from {{ $labels.source }} is >3h old"
          description: |
            Source: {{ $labels.source }}
            Max Lag: {{ $values.A.Max_lag }}s
        labels:
          severity: warning
          team: data-ops

      # =============================================================
      # Rule 5: Station Stale (>2h no data) — WARNING → Grafana only
      # Schema fix: city/source from GROUP BY, timestamp_utc → datetime_hour
      # D-07: No Telegram — operational warning
      # =============================================================
      - uid: station-stale-warning
        title: Station Stale (>2h no data)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT station_id,
                       argMax(l.city, h.datetime_hour) AS city,
                       argMax(h.source, h.datetime_hour) AS source,
                       MAX(h.datetime_hour) AS last_seen
                FROM air_quality.fct_hourly_aqi h
                LEFT JOIN air_quality.dim_locations l ON h.station_id = l.station_id
                GROUP BY h.station_id
                HAVING MAX(h.datetime_hour) < NOW() - INTERVAL 2 HOUR
          - refId: C
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
        noDataState: OK
        execErrState: OK
        for: 5m
        groupWait: 30s
        groupInterval: 30m
        repeatInterval: 30m
        annotations:
          summary: "🟡 WARNING: Station {{ $labels.station_id }} has no data for >2h"
          description: |
            Station: {{ $labels.station_id }}
            City: {{ $labels.city }}
            Source: {{ $labels.source }}
        labels:
          severity: warning
          team: data-ops

      # =============================================================
      # Phase 5: AQI Warning (>150 Unhealthy for Sensitive Groups)
      # D-02: AQI > 150 → WARNING → Telegram
      # D-05: Severity prefix = 🟡 WARNING:
      # D-06: Re-alert every 1h (groupInterval = 1h)
      # =============================================================
      - uid: aqi-warning-150
        title: AQI Warning (>150 Unhealthy for Sensitive Groups)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT MAX(h.normalized_aqi) AS max_aqi,
                       argMax(h.station_id, h.normalized_aqi) AS station_id,
                       argMax(l.city, h.normalized_aqi) AS city,
                       argMax(h.dominant_pollutant, h.normalized_aqi) AS pollutant
                FROM air_quality.fct_hourly_aqi h
                LEFT JOIN air_quality.dim_locations l ON h.station_id = l.station_id
                WHERE h.datetime_hour >= NOW() - INTERVAL 1 HOUR
                GROUP BY l.city
                HAVING MAX(h.normalized_aqi) > 150
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              maxDataPoints: 300
              expression: B
              params: [150]
        noDataState: OK
        execErrState: Error
        for: 5m
        groupWait: 30s
        groupInterval: 1h
        repeatInterval: 1h
        annotations:
          summary: "🟡 WARNING: AQI exceeded 150 (Unhealthy for Sensitive Groups) at {{ $labels.city }}"
          description: |
            🟡 AQI Alert — Sensitive groups should reduce outdoor activity
            City: {{ $labels.city }}
            Station: {{ $labels.station_id }}
            AQI: {{ $values.B.Value }}
            Pollutant: {{ $labels.pollutant }}
        labels:
          severity: warning
          team: air-quality
          alert_type: aqi_threshold
        contactPoints: [telegram-critical]

      # =============================================================
      # Phase 5: PM2.5 Warning (>75 µg/m³ Vietnam TCVN)
      # D-03: PM2.5 > 75 µg/m³ → WARNING → Telegram
      # D-05: Severity prefix = 🟡 WARNING:
      # D-06: Re-alert every 1h
      # Key: avg_value is µg/m³, NOT normalized_aqi (AQI scale)
      # =============================================================
      - uid: pm25-warning-75
        title: PM2.5 Warning (>75 µg/m³ Vietnam TCVN)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                SELECT MAX(h.avg_value) AS max_pm25,
                       argMax(h.station_id, h.avg_value) AS station_id,
                       argMax(l.city, h.avg_value) AS city,
                       argMax(h.dominant_pollutant, h.avg_value) AS pollutant
                FROM air_quality.fct_hourly_aqi h
                LEFT JOIN air_quality.dim_locations l ON h.station_id = l.station_id
                WHERE h.datetime_hour >= NOW() - INTERVAL 1 HOUR
                  AND h.pollutant ILIKE '%pm25%'
                GROUP BY l.city
                HAVING MAX(h.avg_value) > 75
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              maxDataPoints: 300
              expression: B
              params: [75]
        noDataState: OK
        execErrState: Error
        for: 5m
        groupWait: 30s
        groupInterval: 1h
        repeatInterval: 1h
        annotations:
          summary: "🟡 WARNING: PM2.5 exceeded 75 µg/m³ (Vietnam TCVN) at {{ $labels.city }}"
          description: |
            🟡 PM2.5 Alert — Sensitive groups should reduce outdoor activity
            City: {{ $labels.city }}
            Station: {{ $labels.station_id }}
            PM2.5: {{ $values.B.Value }} µg/m³
            Pollutant: {{ $labels.pollutant }}
        labels:
          severity: warning
          team: air-quality
          alert_type: pollutant_threshold
        contactPoints: [telegram-critical]

      # =============================================================
      # Phase 5: Multi-Source Divergence (AQICN vs OpenWeather >50 AQI)
      # D-04: |AQICN − OpenWeather| > 50 per city → WARNING → Telegram
      # D-05: Severity prefix = 🟡 WARNING:
      # D-06: Re-alert every 1h
      # =============================================================
      - uid: multi-source-divergence
        title: Multi-Source Divergence (AQICN vs OpenWeather >50 AQI)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: clickhouse-airquality
            model:
              interval: 1m
              maxDataPoints: 300
              rawSql: |
                WITH aqicn_city AS (
                    SELECT l.city,
                           round(avg(h.normalized_aqi), 2) AS aqicn_aqi
                    FROM air_quality.fct_hourly_aqi h
                    LEFT JOIN air_quality.dim_locations l ON h.station_id = l.station_id
                    WHERE h.datetime_hour >= NOW() - INTERVAL 1 HOUR
                      AND h.source ILIKE '%aqicn%'
                    GROUP BY l.city
                ),
                ow_city AS (
                    SELECT l.city,
                           round(avg(h.normalized_aqi), 2) AS ow_aqi
                    FROM air_quality.fct_hourly_aqi h
                    LEFT JOIN air_quality.dim_locations l ON h.station_id = l.station_id
                    WHERE h.datetime_hour >= NOW() - INTERVAL 1 HOUR
                      AND h.source ILIKE '%openweather%'
                    GROUP BY l.city
                )
                SELECT a.city,
                       a.aqicn_aqi,
                       o.ow_aqi,
                       abs(a.aqicn_aqi - o.ow_aqi) AS abs_diff
                FROM aqicn_city a
                INNER JOIN ow_city o ON a.city = o.city
                WHERE abs(a.aqicn_aqi - o.ow_aqi) > 50
          - refId: B
            datasourceUid: "-100"
            model:
              type: reduce
              maxDataPoints: 300
              reducer: last
              expression: A
          - refId: C
            datasourceUid: "-100"
            model:
              type: threshold
              maxDataPoints: 300
              expression: B
              params: [1]
        noDataState: OK
        execErrState: Error
        for: 5m
        groupWait: 30s
        groupInterval: 1h
        repeatInterval: 1h
        annotations:
          summary: "🟡 WARNING: AQICN-OpenWeather AQI divergence >50 at {{ $labels.city }}"
          description: |
            🟡 Multi-Source Divergence Alert — Verify data source quality
            City: {{ $labels.city }}
            AQICN AQI: {{ $values.B.aqicn_aqi }}
            OpenWeather AQI: {{ $values.B.ow_aqi }}
            Difference: {{ $values.B.abs_diff }} AQI units
        labels:
          severity: warning
          team: air-quality
          alert_type: multi_source_divergence
        contactPoints: [telegram-critical]
