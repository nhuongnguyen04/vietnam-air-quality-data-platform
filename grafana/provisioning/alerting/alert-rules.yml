# Grafana Alert Rules — Vietnamese Overhaul
apiVersion: 1

groups:
  - name: air-quality-alerts
    folder: Cảnh báo Chất lượng Không khí
    interval: 1m
    rules:

      # =============================================================
      # Rule 1: DAG Failure
      # =============================================================
      - uid: dag-failure-critical
        title: "[PIPELINE][NGHIÊM TRỌNG] Lỗi thực thi DAG Airflow"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: airflow-postgres
            model:
              type: sql
              format: table
              rawSql: |
                SELECT state, dag_id, MAX(end_date) as last_run
                FROM dag_run
                WHERE end_date >= NOW() - INTERVAL '10 MINUTE'
                  AND state IN ('failed', 'up_for_retry')
                GROUP BY state, dag_id
          - refId: B
            datasourceUid: "-100"
            model: { type: reduce, reducer: last, expression: A }
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Luồng dữ liệu {{ $labels.dag_id }} gặp lỗi — Cần kiểm tra ngay"
          description: "DAG {{ $labels.dag_id }} đang ở trạng thái {{ $labels.state }}. Pipeline bị gián đoạn."
        labels:
          severity: critical
          team: data-ops
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 2: ClickHouse Down
      # =============================================================
      - uid: clickhouse-down-critical
        title: "[HẠ TẦNG][NGHIÊM TRỌNG] ClickHouse Database Ngừng hoạt động"
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: clickhouse-airquality
            model: { rawSql: "SELECT 1 AS clickhouse_up" }
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Cơ sở dữ liệu ClickHouse không thể kết nối"
          description: "Hệ thống không thể truy cập ClickHouse. Vui lòng kiểm tra dịch vụ và kết nối mạng (Docker)."
        labels:
          severity: critical
          team: data-ops
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 3: AQI Critical (>200)
      # =============================================================
      - uid: aqi-critical-200
        title: "[CHẤT LƯỢNG][NGHIÊM TRỌNG] Chỉ số AQI nguy hại (>200)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickhouse-airquality
            model:
              rawSql: |
                SELECT MAX(h.current_aqi_us) AS max_aqi,
                       argMax(h.district, h.current_aqi_us) AS district,
                       argMax(h.province, h.current_aqi_us) AS province
                FROM air_quality.dm_aqi_current_status h
                WHERE h.latest_hour >= NOW() - INTERVAL 2 HOUR
                GROUP BY h.province, h.district
                HAVING MAX(h.current_aqi_us) > 200
          - refId: B
            datasourceUid: "-100"
            model:
              type: classic_conditions
              conditions:
                - evaluator: { params: [200], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "🔴 CẢNH BÁO NGUY HẠI: AQI vượt ngưỡng 200 tại {{ $labels.city }}"
          description: |
            🔴 Cảnh báo Sức khỏe - Hạn chế ra ngoài
            Thành phố: {{ $labels.city }}
            Trạm: {{ $labels.station_id }}
            Chỉ số AQI: {{ $values.A.max_aqi }}
        labels:
          severity: critical
          team: air-quality
        contactPoints: [telegram-critical]

      # =============================================================
      # Rule 4: Data Freshness (>3h)
      # =============================================================
      - uid: data-freshness-warning
        title: "[CHẤT LƯỢNG][CẢNH BÁO] Dữ liệu bị chậm cập nhật (>3 giờ)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: clickhouse-airquality
            model:
              rawSql: |
                SELECT source, MAX(lag_seconds) AS max_lag
                FROM air_quality.ingestion_control
                GROUP BY source
                HAVING MAX(lag_seconds) > 10800
          - refId: B
            datasourceUid: "-100"
            model: { type: reduce, reducer: last, expression: A }
        noDataState: OK
        execErrState: OK
        for: 10m
        annotations:
          summary: "🟡 CẢNH BÁO: Nguồn {{ $labels.source }} bị chậm dữ liệu"
          description: "Nguồn dữ liệu {{ $labels.source }} đã không cập nhật trong hơn 3 giờ (Độ trễ: {{ $values.A.max_lag }}s)."
        labels:
          severity: warning
          team: data-ops
        contactPoints: [telegram-critical]
